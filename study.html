


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Study — Thermoeconomics</title>
    <meta name="description" content="An open knowledge base for computational thermoeconomics. Explore the science connecting energy, entropy, and proof of work to economic value.">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #39FF14;
            --green-glow: rgba(57, 255, 20, 0.15);
            --green-subtle: rgba(57, 255, 20, 0.06);
            --bg: #FAFAFA;
            --bg-white: #FFFFFF;
            --text-primary: #0A0A0A;
            --text-secondary: #3A3A3A;
            --text-muted: #6B6B6B;
            --border: #E0E0E0;
            --border-light: #F0F0F0;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --sidebar-width: 280px;
            --topbar-height: 56px;
        }

        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text-secondary); line-height: 1.6; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* ============ TOPBAR ============ */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: var(--topbar-height);
            background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            display: flex; align-items: center; padding: 0 24px; gap: 16px;
        }
        .topbar-toggle {
            display: none; background: none; border: none; cursor: pointer; padding: 6px;
        }
        .topbar-toggle span { display: block; width: 20px; height: 2px; background: var(--text-primary); margin: 4px 0; }
        .topbar-logo {
            font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text-primary);
        }
        .topbar-logo span { color: var(--green); }
        .topbar-sep { width: 1px; height: 24px; background: var(--border); }
        .topbar-label { font-size: 14px; font-weight: 500; color: var(--text-muted); }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .topbar-search {
            font-family: var(--font-body); font-size: 13px; padding: 6px 14px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text-primary);
            width: 200px; outline: none; transition: border-color 0.2s;
        }
        .topbar-search:focus { border-color: var(--green); }
        .topbar-home {
            font-size: 13px; font-weight: 600; color: var(--text-primary);
            background: var(--green); padding: 6px 16px; border-radius: 5px;
            transition: box-shadow 0.2s;
        }
        .topbar-home:hover { box-shadow: 0 0 16px var(--green-glow); }

        /* ============ LAYOUT ============ */
        .layout {
            display: flex; min-height: 100vh; padding-top: var(--topbar-height);
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: var(--sidebar-width); min-width: var(--sidebar-width);
            background: var(--bg-white); border-right: 1px solid var(--border-light);
            height: calc(100vh - var(--topbar-height)); position: sticky; top: var(--topbar-height);
            overflow-y: auto; padding: 20px 0;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .sb-section { margin-bottom: 4px; }
        .sb-header {
            display: flex; align-items: center; gap: 8px; padding: 8px 20px; cursor: pointer;
            font-family: var(--font-display); font-size: 12px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted);
            user-select: none; transition: color 0.2s;
        }
        .sb-header:hover { color: var(--text-primary); }
        .sb-arrow {
            font-size: 10px; transition: transform 0.2s; display: inline-block; width: 12px; flex-shrink: 0;
        }
        .sb-section.open .sb-arrow { transform: rotate(90deg); }
        .sb-pages { display: none; padding: 0 0 8px 0; }
        .sb-section.open .sb-pages { display: block; }
        .sb-link {
            display: block; padding: 5px 20px 5px 32px; font-size: 13px; font-weight: 400;
            color: var(--text-muted); cursor: pointer; transition: color 0.15s, background 0.15s;
            border-left: 2px solid transparent; line-height: 1.4;
        }
        .sb-link:hover { color: var(--text-primary); background: var(--green-subtle); }
        .sb-link.active {
            color: var(--text-primary); font-weight: 600; background: var(--green-subtle);
            border-left-color: var(--green);
        }

        /* ============ MAIN CONTENT ============ */
        .main {
            flex: 1; min-width: 0; padding: 48px 64px 120px; max-width: 820px;
        }

        .page-section-tag {
            font-family: var(--font-body); font-size: 11px; font-weight: 600;
            letter-spacing: 2.5px; text-transform: uppercase; color: var(--green);
            background: var(--text-primary); display: inline-block; padding: 4px 10px;
            border-radius: 4px; margin-bottom: 20px;
        }
        .page-title {
            font-family: var(--font-display); font-size: 36px; font-weight: 700;
            color: var(--text-primary); line-height: 1.2; margin-bottom: 12px;
        }
        .page-meta {
            font-size: 14px; color: var(--text-muted); margin-bottom: 32px;
        }
        .page-body { font-size: 16px; font-weight: 300; line-height: 1.85; color: var(--text-secondary); }
        .page-body h2 {
            font-family: var(--font-display); font-size: 22px; font-weight: 700;
            color: var(--text-primary); margin: 40px 0 16px; line-height: 1.3;
        }
        .page-body h3 {
            font-family: var(--font-display); font-size: 17px; font-weight: 700;
            color: var(--text-primary); margin: 28px 0 12px;
        }
        .page-body p { margin-bottom: 16px; }
        .page-body strong { font-weight: 600; color: var(--text-primary); }
        .page-body a { color: var(--green); background: var(--text-primary); padding: 1px 6px; border-radius: 3px; font-size: 14px; font-weight: 500; }
        .page-body a:hover { opacity: 0.85; }
        .page-body blockquote {
            border-left: 3px solid var(--green); padding: 16px 20px; margin: 20px 0;
            background: var(--bg-white); border-radius: 0 8px 8px 0;
            font-size: 14px; color: var(--text-muted); line-height: 1.7;
        }
        .page-body .equation {
            background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 8px;
            padding: 20px 24px; margin: 24px 0; text-align: center;
            font-size: 18px; color: var(--text-primary); overflow-x: auto;
        }
        .page-body table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
        .page-body th {
            font-weight: 600; color: var(--text-primary); text-align: left;
            padding: 10px 14px; border-bottom: 2px solid var(--border); background: var(--bg-white);
        }
        .page-body td { padding: 10px 14px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
        .page-body ul, .page-body ol { margin: 12px 0 16px 24px; }
        .page-body li { margin-bottom: 6px; }

        /* Connection callout */
        .connection-box {
            background: var(--text-primary); border-radius: 10px; padding: 24px 28px; margin: 32px 0;
            border-left: 4px solid var(--green);
        }
        .connection-box-label {
            font-family: var(--font-display); font-size: 11px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 10px;
        }
        .connection-box-text { font-size: 15px; font-weight: 300; line-height: 1.8; color: rgba(255,255,255,0.82); }
        .connection-box-text strong { color: #fff; font-weight: 500; }

        /* Author's notes */
        .notes-box {
            background: var(--bg-white); border: 1px solid var(--border-light); border-left: 3px solid var(--green);
            border-radius: 0 10px 10px 0; margin: 28px 0; overflow: hidden;
        }
        .notes-toggle {
            display: flex; align-items: center; gap: 8px; padding: 14px 20px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: var(--text-muted); user-select: none;
            background: none; border: none; width: 100%; text-align: left; font-family: var(--font-body);
        }
        .notes-toggle:hover { color: var(--text-primary); }
        .notes-body { display: none; padding: 0 20px 16px; font-size: 14px; font-weight: 300; line-height: 1.8; color: var(--text-secondary); }
        .notes-box.open .notes-body { display: block; }
        .notes-date { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }

        /* Video embed */
        .video-embed {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
            border-radius: 10px; border: 1px solid var(--border-light); background: #000; margin: 24px 0;
        }
        .video-embed iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Transcript */
        .transcript-box {
            background: var(--bg-white); border: 1px solid var(--border-light);
            border-radius: 10px; margin: 24px 0; overflow: hidden;
        }
        .transcript-toggle {
            display: flex; align-items: center; gap: 8px; padding: 14px 20px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: var(--text-muted); user-select: none;
            background: none; border: none; width: 100%; text-align: left; font-family: var(--font-body);
        }
        .transcript-body { display: none; padding: 0 20px 16px; font-size: 13px; line-height: 1.8; color: var(--text-muted); max-height: 400px; overflow-y: auto; }
        .transcript-box.open .transcript-body { display: block; }

        /* Further reading links */
        .further-reading { margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--border-light); }
        .further-reading h3 { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .further-link {
            display: inline-block; font-size: 13px; font-weight: 500; color: var(--green);
            background: var(--text-primary); padding: 4px 12px; border-radius: 4px; margin: 0 6px 8px 0;
            cursor: pointer; transition: opacity 0.2s;
        }
        .further-link:hover { opacity: 0.8; }

        /* ============ PREV / NEXT NAV ============ */
        .page-nav {
            display: flex; justify-content: space-between; align-items: stretch; gap: 16px;
            margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--border-light);
        }
        .page-nav-btn {
            flex: 1; display: flex; flex-direction: column; gap: 4px; padding: 16px 20px;
            border: 1px solid var(--border-light); border-radius: 10px; cursor: pointer;
            transition: border-color 0.2s, transform 0.2s; background: var(--bg-white);
        }
        .page-nav-btn:hover { border-color: var(--green); transform: translateY(-2px); }
        .page-nav-btn.next { text-align: right; }
        .page-nav-dir { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
        .page-nav-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
        .page-nav-map {
            display: flex; align-items: center; justify-content: center; padding: 16px; min-width: 52px;
            border: 1px solid var(--border-light); border-radius: 10px; cursor: pointer;
            font-size: 18px; transition: border-color 0.2s, transform 0.2s; background: var(--bg-white);
        }
        .page-nav-map:hover { border-color: var(--green); transform: translateY(-2px); }
        .page-nav-placeholder { flex: 1; }

        /* ============ MAP MODAL ============ */
        .map-overlay {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }
        .map-overlay.open { display: flex; align-items: center; justify-content: center; }
        .map-modal {
            background: var(--bg-white); border-radius: 16px; padding: 36px; max-width: 900px;
            width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .map-modal h2 { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 24px; }
        .map-section-title {
            font-family: var(--font-display); font-size: 11px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; color: var(--green);
            background: var(--text-primary); display: inline-block; padding: 3px 8px;
            border-radius: 3px; margin: 16px 0 8px;
        }
        .map-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .map-node {
            font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 6px;
            border: 1px solid var(--border); color: var(--text-muted); background: var(--bg);
            cursor: pointer; transition: all 0.15s;
        }
        .map-node:hover { border-color: var(--green); color: var(--text-primary); }
        .map-node.active { border-color: var(--green); color: var(--text-primary); background: var(--green-subtle); font-weight: 700; }

        /* ============ SEARCH ============ */
        .search-results {
            display: none; position: absolute; top: calc(var(--topbar-height) - 4px); right: 24px;
            width: 320px; max-height: 400px; overflow-y: auto; background: var(--bg-white);
            border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            z-index: 150; padding: 8px;
        }
        .search-results.open { display: block; }
        .search-result {
            padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s;
        }
        .search-result:hover { background: var(--green-subtle); }
        .search-result-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .search-result-section { font-size: 11px; color: var(--text-muted); }

        /* ============ MISSION PROOF ELEMENTS ============ */
        .mission-bounty {
            background: var(--text-primary); border-radius: 12px; padding: 28px 32px;
            margin: 28px 0; display: flex; align-items: center; gap: 28px; flex-wrap: wrap;
        }
        .mission-bounty-reward { text-align: center; }
        .mission-bounty-amount {
            font-family: var(--font-display); font-size: 32px; font-weight: 800; color: #fff;
        }
        .mission-bounty-label {
            font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            color: rgba(255,255,255,0.35); margin-top: 2px;
        }
        .mission-bounty-paid {
            font-size: 12px; font-weight: 600; color: var(--green); margin-top: 6px;
        }
        .mission-bounty-divider { width: 1px; height: 52px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
        .mission-bounty-meta { display: flex; flex-direction: column; gap: 6px; }
        .mission-bounty-row {
            font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px;
        }
        .mission-bounty-row .mdot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        }
        .mission-bounty-row .mdot.g { background: var(--green); }
        .mission-bounty-row .mdot.a { background: #fbbf24; }
        .mission-bounty-row .mdot.b { background: #60a5fa; }
        .mission-bounty-row a { color: var(--green); text-decoration: none; border-bottom: 1px solid rgba(57,255,20,0.3); }

        .mission-video-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 24px 0;
        }
        .mission-video-card {
            border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 16/9;
        }
        .mission-video-card iframe { width: 100%; height: 100%; border: 0; display: block; }

        .mission-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 28px 0; }
        .mission-card {
            background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 12px;
            padding: 24px 20px;
        }
        .mission-card h4 {
            font-family: var(--font-display); font-size: 16px; font-weight: 700;
            color: var(--text-primary); margin-bottom: 8px;
        }
        .mission-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 14px; }
        .mission-card ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
        .mission-card li {
            font-size: 13px; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
        }
        .mission-card li .cd { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
        .mission-card li .cd.g { background: var(--green); }
        .mission-card li .cd.b { background: #60a5fa; }
        .mission-card li a { font-size: 13px; padding: 0; background: none; color: #60a5fa; }
        .mission-card li a:hover { opacity: 0.8; }
        .mission-btn {
            display: inline-block; padding: 9px 22px; font-size: 12px; font-weight: 700;
            border-radius: 100px; text-decoration: none; transition: opacity 0.15s; margin-top: 14px;
        }
        .mission-btn.green { background: var(--text-primary); color: var(--green); }
        .mission-btn.blue { background: #60a5fa; color: #fff; }
        .mission-btn:hover { opacity: 0.85; }

        .mission-pipeline {
            display: flex; gap: 0; margin: 24px 0; background: var(--bg-white);
            border: 1px solid var(--border-light); border-radius: 12px; overflow: hidden;
        }
        .mission-stage {
            flex: 1; padding: 20px 16px; text-align: center;
            border-right: 1px solid var(--border-light); display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .mission-stage:last-child { border-right: none; }
        .mission-stage-name { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text-primary); }
        .mission-stage-name.dim { color: var(--text-muted); }
        .mission-stage-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
        .mission-stage-badge {
            font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            padding: 3px 10px; border-radius: 100px;
        }
        .mission-stage-badge.done { background: rgba(57,255,20,0.1); color: var(--green); }
        .mission-stage-badge.active { background: rgba(251,191,36,0.12); color: #fbbf24; }
        .mission-stage-badge.pending { background: var(--bg); color: var(--text-muted); }

        @media (max-width: 860px) {
            .mission-bounty { flex-direction: column; gap: 16px; padding: 24px 20px; }
            .mission-bounty-divider { width: 80px; height: 1px; }
            .mission-video-grid { grid-template-columns: 1fr; }
            .mission-cards { grid-template-columns: 1fr; }
            .mission-pipeline { flex-direction: column; }
            .mission-stage { border-right: none; border-bottom: 1px solid var(--border-light); }
            .mission-stage:last-child { border-bottom: none; }
        }

        /* ============ MOBILE ============ */
        @media (max-width: 860px) {
            .topbar-toggle { display: block; }
            .topbar-search { width: 140px; }
            .sidebar {
                position: fixed; left: -300px; top: var(--topbar-height); z-index: 90;
                width: 280px; height: calc(100vh - var(--topbar-height));
                transition: left 0.3s ease; box-shadow: none;
            }
            .sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
            .sidebar-overlay {
                display: none; position: fixed; inset: 0; top: var(--topbar-height);
                background: rgba(0,0,0,0.3); z-index: 89;
            }
            .sidebar.open ~ .sidebar-overlay { display: block; }
            .main { padding: 32px 24px 100px; }
            .page-title { font-size: 28px; }
        }
        @media (max-width: 500px) {
            .topbar-search { display: none; }
            .page-nav { flex-direction: column; }
        }
    
        /* ============ RIGHT SIDEBAR (Mode Switcher) ============ */
        :root {
            --rsidebar-width: 52px;
        }
        .rsidebar {
            width: var(--rsidebar-width); min-width: var(--rsidebar-width);
            background: var(--bg-white); border-left: 1px solid var(--border-light);
            height: calc(100vh - var(--topbar-height)); position: sticky; top: var(--topbar-height);
            display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 6px;
            z-index: 10;
        }
        .rsidebar-btn {
            width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border-light);
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; position: relative;
            font-size: 16px; color: var(--text-muted);
        }
        .rsidebar-btn:hover { border-color: var(--green); color: var(--text-primary); }
        .rsidebar-btn.active {
            background: var(--text-primary); border-color: var(--text-primary);
            color: var(--green); box-shadow: 0 0 12px rgba(57, 255, 20, 0.15);
        }
        .rsidebar-btn .rs-tooltip {
            display: none; position: absolute; right: calc(100% + 10px); top: 50%; transform: translateY(-50%);
            background: var(--text-primary); color: #fff; font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 5px; white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .rsidebar-btn:hover .rs-tooltip { display: block; }
        .rsidebar-divider {
            width: 24px; height: 1px; background: var(--border-light); margin: 4px 0;
        }
        .rsidebar-label {
            writing-mode: vertical-rl; text-orientation: mixed;
            font-family: var(--font-display); font-size: 9px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; color: var(--border);
            margin-top: 8px; user-select: none;
        }

        /* Adjust main to account for right sidebar */
        .main {
            flex: 1; min-width: 0; padding: 48px 56px 120px; max-width: 820px;
        }

        /* Mobile: hide right sidebar */
        @media (max-width: 860px) {
            .rsidebar { display: none; }
            .main { padding: 32px 24px 100px; }
        }
        /* ============ TOOLKIT SCOPED STYLES ============ */
        .tk { --tkb: #ffffff; --tkt: #111111; --tkt2: #444444; --tkd: #999999; --tkc: #0099cc; --tka: #cc6600; --tkp: #7c3aed; --tkr: #cc2233; --tkg: #00994d; --tkbr: rgba(0,0,0,0.08); --tkcard: rgba(0,0,0,0.03); --tkmono: 'JetBrains Mono','Fira Code',monospace; background: var(--tkb); color: var(--tkt); padding: 24px; border-radius: 12px; margin: -4px -8px 0; font-weight: 500; }
        .tk h2 { color: #111; font-family: var(--font-display); font-size: 18px; margin: 28px 0 12px; font-weight: 800; }
        .tk p { color: var(--tkt2); font-size: 14px; line-height: 1.6; margin-bottom: 12px; font-weight: 500; }
        .tk .tk-def { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 8px; padding: 16px 20px; margin-bottom: 20px; }
        .tk .tk-def-label { font-family: var(--font-display); font-size: 9px; font-weight: 700; color: var(--tka); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .tk .tk-def-math { font-family: var(--tkmono); font-size: 13px; color: var(--tkt); line-height: 1.8; font-weight: 600; }
        .tk .tk-def-math .fn { color: var(--tkg); font-weight: 600; }
        .tk .tk-def-math .var { color: var(--tkc); font-style: italic; }
        .tk .tk-def-math .op { color: var(--tkd); }
        .tk .tk-well { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 10px; padding: 24px; margin-bottom: 20px; }
        .tk .tk-field { margin-bottom: 14px; }
        .tk .tk-label { font-family: var(--font-display); font-size: 10px; font-weight: 700; color: var(--tka); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
        .tk .tk-label .mv { font-style: italic; color: var(--tkc); margin-right: 4px; font-family: var(--tkmono); }
        .tk .tk-inp { width: 100%; background: rgba(0,0,0,0.04); border: 1px solid var(--tkbr); border-radius: 4px; padding: 10px 12px; color: var(--tkt); font-family: var(--tkmono); font-size: 13px; outline: none; resize: vertical; transition: border-color 0.2s; }
        .tk .tk-inp:focus { border-color: rgba(0,153,77,0.3); }
        .tk .tk-inp[disabled] { background: rgba(0,0,0,0.015); cursor: default; }
        .tk .tk-ho { font-size: 12px; letter-spacing: 0.04em; color: var(--tkg); font-weight: 600; }
        .tk .tk-ho.hash-valid { color: var(--tkg); }
        .tk .tk-ho.hash-invalid { color: var(--tkr); }
        .tk .tk-btn-row { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
        .tk .tk-btn { background: rgba(0,153,77,0.08); border: 1px solid rgba(0,153,77,0.2); border-radius: 6px; color: var(--tkg); font-family: var(--tkmono); font-size: 12px; padding: 10px 20px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .tk .tk-btn:hover { background: rgba(0,153,77,0.15); box-shadow: 0 0 12px rgba(0,153,77,0.1); }
        .tk .tk-btn.mining { animation: tk-pulse 0.5s infinite alternate; }
        @keyframes tk-pulse { from { box-shadow: 0 0 4px rgba(0,153,77,0.2); } to { box-shadow: 0 0 16px rgba(0,153,77,0.4); } }
        .tk .tk-diff { font-family: var(--tkmono); font-size: 11px; color: var(--tka); }
        .tk .tk-callout { background: rgba(0,153,77,0.03); border: 1px solid rgba(0,153,77,0.12); border-radius: 8px; padding: 16px 20px; margin: 24px 0; }
        .tk .tk-callout-header { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--tkg); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .tk .tk-callout p { color: var(--tkt2); font-size: 13px; margin: 0; font-weight: 500; }

        /* Chain blocks */
        .tk .chain-scroll { overflow-x: auto; padding: 8px 0 16px; margin: 0 -8px; scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.15) transparent; }
        .tk .chain-row { display: flex; align-items: flex-start; gap: 0; min-width: max-content; padding: 0 8px; }

        .tk .cb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .tk .cb-num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: #111; letter-spacing: 1px; }
        .tk .cb-status { width: 8px; height: 8px; border-radius: 50%; background: var(--tkd); }
        .tk .cb-status.valid { background: var(--tkg); box-shadow: 0 0 6px rgba(0,153,77,0.4); }
        .tk .cb-status.invalid { background: var(--tkr); }
        .tk .cb-row { display: flex; gap: 6px; }
        .tk .cb-row .cb-field { flex: 1; }
        .tk .cb-field { margin-bottom: 6px; }
        .tk .cb-label { font-size: 8px; font-weight: 600; color: var(--tkd); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; font-family: var(--tkmono); }
        .tk .cb-label .mv { color: var(--tkc); font-style: italic; }
        .tk .cb-input { width: 100%; background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06); border-radius: 3px; padding: 5px 6px; color: var(--tkt); font-family: var(--tkmono); font-size: 10px; outline: none; font-weight: 600; }
        .tk .cb-input[disabled] { background: rgba(0,0,0,0.01); cursor: default; color: var(--tkd); }
        .tk .cb-input.narrow { width: 50px; }
        .tk .cb-input.hash-valid { color: var(--tkg); }
        .tk .cb-input.hash-invalid { color: var(--tkr); }
        .tk .cb-input.prev-hash { font-size: 8px; color: var(--tkd); }
        .tk .cb-mine-row { text-align: right; margin-top: 6px; }
        .tk .btn-mine-sm { background: rgba(0,153,77,0.08); border: 1px solid rgba(0,153,77,0.2); border-radius: 4px; color: var(--tkg); font-family: var(--tkmono); font-size: 10px; padding: 6px 12px; cursor: pointer; }
        .tk .btn-mine-sm:hover { background: rgba(0,153,77,0.15); }
        .tk .peer-label { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--tkc); letter-spacing: 2px; margin: 16px 0 6px; }

        /* Transactions */
        .tk .tx-list { margin-bottom: 6px; }
        .tk .tx-row { display: flex; align-items: center; gap: 4px; padding: 3px 0; font-family: var(--tkmono); font-size: 10px; }
        .tk .tx-from, .tk .tx-to { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); border-radius: 3px; padding: 4px 5px; color: var(--tkt); font-family: var(--tkmono); font-size: 10px; outline: none; width: 60px; }
        .tk .tx-amt { width: 48px; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); border-radius: 3px; padding: 4px 5px; color: var(--tka); font-family: var(--tkmono); font-size: 10px; outline: none; text-align: right; }
        .tk .tx-arrow { color: var(--tkd); font-size: 10px; }
        .tk .tx-unit { color: var(--tkd); font-size: 8px; }
        .tk .tx-del { background: none; border: none; color: var(--tkr); cursor: pointer; font-size: 12px; padding: 2px 4px; opacity: 0.5; }
        .tk .tx-del:hover { opacity: 1; }
        .tk .tx-add { display: block; width: 100%; background: none; border: 1px dashed rgba(0,0,0,0.12); border-radius: 4px; color: var(--tkd); font-size: 9px; padding: 4px; cursor: pointer; margin-top: 4px; }
        .tk .tx-add:hover { border-color: rgba(0,153,77,0.2); color: var(--tkg); }
        .tk .tx-coinbase { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: rgba(240,160,48,0.06); border: 1px solid rgba(240,160,48,0.15); border-radius: 4px; margin-bottom: 6px; font-family: var(--tkmono); font-size: 10px; }
        .tk .tx-cb-label { color: var(--tka); font-weight: 700; font-size: 9px; }
        .tk .tx-cb-amt { color: var(--tka); font-weight: 600; margin-left: auto; }

        /* Keys & signatures */
        .tk .key-display { margin-bottom: 16px; }
        .tk .key-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .tk .key-col { flex: 1; min-width: 200px; }
        .tk .key-label { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .tk .key-label.private { color: var(--tkr); }
        .tk .key-label.public { color: var(--tkc); }
        .tk .key-label.sig { color: var(--tkp); }
        .tk .key-val { background: rgba(0,0,0,0.03); border: 1px solid var(--tkbr); border-radius: 4px; padding: 8px 10px; font-family: var(--tkmono); font-size: 9px; color: var(--tkt2); word-break: break-all; min-height: 32px; line-height: 1.4; }
        .tk .key-val.private-val { border-color: rgba(204,34,51,0.15); }
        .tk .key-val.public-val { border-color: rgba(0,153,204,0.15); }
        .tk .key-val.sig-val { border-color: rgba(124,58,237,0.15); }
        .tk .btn-gen { background: rgba(0,153,204,0.08); border: 1px solid rgba(0,153,204,0.2); border-radius: 6px; color: var(--tkc); font-family: var(--tkmono); font-size: 12px; padding: 10px 20px; cursor: pointer; font-weight: 600; }
        .tk .btn-gen:hover { background: rgba(0,153,204,0.15); }
        .tk .btn-sign { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2); border-radius: 6px; color: var(--tkp); font-family: var(--tkmono); font-size: 12px; padding: 10px 20px; cursor: pointer; font-weight: 600; }
        .tk .btn-sign:hover { background: rgba(124,58,237,0.15); }
        .tk .verify-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 4px; font-family: var(--tkmono); font-size: 11px; font-weight: 600; }
        .tk .verify-badge.verified { background: rgba(0,153,77,0.1); border: 1px solid rgba(0,153,77,0.25); color: var(--tkg); }
        .tk .verify-badge.failed { background: rgba(204,34,51,0.1); border: 1px solid rgba(204,34,51,0.25); color: var(--tkr); }
        .tk .verify-badge.none { background: rgba(0,0,0,0.03); border: 1px solid var(--tkbr); color: var(--tkd); }
        .tk .stx-sig-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; padding: 4px 8px; background: rgba(124,58,237,0.04); border: 1px solid rgba(124,58,237,0.12); border-radius: 4px; }
        .tk .stx-sig-label { color: var(--tkp); font-family: var(--tkmono); font-size: 9px; font-weight: 700; }

        /* SHA-256 Explorer */
        .tk .sha-section { margin-bottom: 28px; }
        .tk .sha-tag { font-family: var(--font-display); font-size: 10px; font-weight: 700; color: var(--tka); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; }
        .tk .sha-pad-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; font-family: var(--tkmono); font-size: 10px; max-height: 220px; overflow-y: auto; }
        .tk .sha-pad-cell { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); border-radius: 2px; padding: 5px 2px; text-align: center; font-size: 9px; color: var(--tkd); line-height: 1.2; }
        .tk .sha-pad-cell.msg { color: var(--tkc); background: rgba(0,153,204,0.04); }
        .tk .sha-pad-cell.pad { color: var(--tka); background: rgba(240,160,48,0.04); }
        .tk .sha-pad-cell.len { color: var(--tkp); background: rgba(124,58,237,0.04); }
        .tk .sha-hv-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
        .tk .sha-hv-box { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 6px; padding: 10px 6px; text-align: center; }
        .tk .sha-hv-box.final { background: rgba(0,153,77,0.03); border-color: rgba(0,153,77,0.2); }
        .tk .sha-hv-label { font-style: italic; font-size: 12px; color: var(--tkc); margin-bottom: 4px; }
        .tk .sha-hv-box.final .sha-hv-label { color: var(--tkg); }
        .tk .sha-hv-val { font-family: var(--tkmono); font-size: 10px; color: var(--tkt); }
        .tk .sha-sched-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .tk .sha-sched-word { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); border-radius: 4px; padding: 6px 4px; text-align: center; font-family: var(--tkmono); font-size: 9px; color: var(--tkt2); transition: all 0.2s; }
        .tk .sha-sched-word .wi { display: block; font-size: 7px; color: var(--tkd); margin-bottom: 2px; }
        .tk .sha-sched-word.from-msg { color: var(--tkc); border-color: rgba(0,153,204,0.12); }
        .tk .sha-sched-word.active { color: var(--tkg); border-color: rgba(0,153,77,0.3); background: rgba(0,153,77,0.05); }
        .tk .sha-round-ctrl { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(0,0,0,0.02); border: 1px solid var(--tkbr); border-radius: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .tk .sha-round-info { font-family: var(--tkmono); font-size: 11px; color: var(--tkt2); white-space: nowrap; }
        .tk .sha-round-num { color: var(--tkg); font-weight: 700; font-size: 15px; }
        .tk .sha-round-slider { flex: 1; min-width: 100px; accent-color: var(--tkg); }
        .tk .sha-round-btns { display: flex; gap: 3px; }
        .tk .sha-rbtn { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 3px; color: var(--tkt2); font-family: var(--tkmono); font-size: 11px; padding: 5px 10px; cursor: pointer; }
        .tk .sha-rbtn:hover { border-color: var(--tkg); color: var(--tkg); }
        .tk .sha-play-btn.playing { background: rgba(0,153,77,0.05); border-color: rgba(0,153,77,0.3); color: var(--tkg); }
        .tk .sha-vars-grid { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
        .tk .sha-var-box { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 6px; padding: 8px 10px; text-align: center; min-width: 80px; transition: all 0.2s; }
        .tk .sha-var-box.changed { border-color: rgba(0,153,77,0.3); box-shadow: 0 0 10px rgba(0,153,77,0.06); }
        .tk .sha-var-lbl { font-style: italic; font-size: 14px; color: var(--tkc); margin-bottom: 3px; }
        .tk .sha-var-val { font-family: var(--tkmono); font-size: 10px; color: var(--tkt); }
        .tk .sha-round-detail { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 8px; padding: 16px 20px; }
        .tk .sha-rd-title { font-family: var(--tkmono); font-size: 9px; font-weight: 600; color: var(--tka); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .tk .sha-rd-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; font-family: var(--tkmono); font-size: 11px; flex-wrap: wrap; }
        .tk .sha-rd-row .lbl { color: var(--tkc); font-style: italic; font-weight: 600; min-width: 28px; }
        .tk .sha-rd-row .eq { color: var(--tkd); }
        .tk .sha-rd-row .val { color: var(--tkt2); word-break: break-all; }
        .tk .sha-rd-row .res { color: var(--tkg); font-weight: 500; }
        .tk .sha-ref-card { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 8px; padding: 14px 18px; margin-bottom: 12px; }
        .tk .sha-ref-title { font-family: var(--tkmono); font-size: 9px; font-weight: 600; color: var(--tka); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
        .tk .sha-ref-row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; font-family: var(--tkmono); font-size: 11px; flex-wrap: wrap; }
        .tk .sha-ref-fn { color: var(--tkc); font-weight: 600; min-width: 70px; }
        .tk .sha-ref-eq { color: var(--tkd); }
        .tk .sha-ref-def { color: var(--tkt2); }
        .tk .sha-ref-note { color: var(--tkd); font-size: 9px; margin-left: 6px; }

        /* Merkle Tree */
        .tk .merkle-wrap { position: relative; margin: 24px 0; }
        .tk .merkle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .tk .merkle-svg line { stroke-width: 1.5; stroke: rgba(0,153,77,0.25); transition: stroke 0.3s; }
        .tk .merkle-level { display: flex; justify-content: center; gap: 12px; position: relative; z-index: 1; margin-bottom: 20px; }
        .tk .merkle-level:last-child { margin-bottom: 0; }
        .tk .merkle-node { background: var(--tkcard); border: 1px solid var(--tkbr); border-radius: 8px; padding: 10px 14px; text-align: center; transition: border-color 0.3s, box-shadow 0.3s; position: relative; }
        .tk .merkle-node.mk-root { border-color: rgba(0,153,77,0.25); background: rgba(0,153,77,0.02); min-width: 240px; }
        .tk .merkle-node.mk-branch { min-width: 180px; }
        .tk .merkle-node.mk-leaf { min-width: 160px; }
        .tk .mk-tag { font-family: var(--font-display); font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .tk .mk-tag-tx { color: var(--tkc); }
        .tk .mk-tag-hash { color: var(--tka); }
        .tk .mk-tag-branch { color: var(--tkp); }
        .tk .mk-tag-root { color: var(--tkg); }
        .tk .mk-label { font-family: var(--tkmono); font-size: 9px; color: var(--tkd); margin-bottom: 3px; }
        .tk .mk-hash { font-family: var(--tkmono); font-size: 8px; word-break: break-all; line-height: 1.3; padding: 5px 6px; border-radius: 3px; margin-top: 4px; transition: color 0.3s, background 0.3s; font-weight: 600; }
        .tk .mk-hash-leaf { color: var(--tkc); background: rgba(0,153,204,0.03); border: 1px solid rgba(0,153,204,0.08); }
        .tk .mk-hash-branch { color: var(--tkp); background: rgba(124,58,237,0.03); border: 1px solid rgba(124,58,237,0.08); }
        .tk .mk-hash-root { color: var(--tkg); background: rgba(0,153,77,0.04); border: 1px solid rgba(0,153,77,0.12); font-size: 9px; }
        .tk .mk-concat { font-family: var(--tkmono); font-size: 7px; color: var(--tkd); margin-top: 3px; word-break: break-all; max-height: 24px; overflow: hidden; opacity: 0.6; }
        .tk .mk-concat .mk-plus { color: var(--tka); font-weight: 700; margin: 0 2px; }
        .tk .merkle-op-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 14px; position: relative; z-index: 1; }
        .tk .mk-op-badge { font-family: var(--tkmono); font-size: 8px; color: var(--tkd); background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); border-radius: 3px; padding: 2px 8px; }
        .tk .mk-op-badge .fn { color: var(--tkg); font-weight: 600; }
        .tk .mk-tx-row { display: flex; align-items: center; gap: 3px; margin-top: 4px; }
        .tk .mk-tx-field { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); border-radius: 3px; padding: 4px 5px; color: var(--tkt); font-family: var(--tkmono); font-size: 10px; outline: none; transition: border-color 0.2s; text-align: center; font-weight: 600; }
        .tk .mk-tx-field:focus { border-color: rgba(0,153,204,0.3); }
        .tk .mk-tx-from, .tk .mk-tx-to { width: 52px; }
        .tk .mk-tx-amt { width: 40px; color: var(--tka); text-align: right; }
        .tk .mk-tx-arrow { color: var(--tkd); font-size: 9px; }
        .tk .mk-tx-unit { color: var(--tkd); font-size: 7px; font-family: var(--tkmono); }
        .tk .merkle-node.mk-fresh { animation: mk-glow 0.6s ease-out; }
        @keyframes mk-glow { 0% { box-shadow: 0 0 24px rgba(0,153,77,0.3); } 100% { box-shadow: none; } }

        @media (max-width: 840px) {
            .tk .chain-block { width: 220px; min-width: 220px; }
            .tk .merkle-level { flex-wrap: wrap; gap: 8px; }
            .tk .merkle-node.mk-leaf, .tk .merkle-node.mk-branch, .tk .merkle-node.mk-root { min-width: 140px; flex: 1 1 140px; }
            .tk .sha-pad-grid { grid-template-columns: repeat(8, 1fr); }
            .tk .sha-sched-grid { grid-template-columns: repeat(4, 1fr); }
            .tk .sha-hv-grid { grid-template-columns: repeat(4, 1fr); }
            .tk .sha-var-box { min-width: 65px; }
            .tk .key-col { min-width: 100%; }
        }
    </style>
</head>

slug: "info-theory", section: "info-theory", title: "Information Theory",
body: `<p><strong>Information is physical.</strong> It takes energy to create, store, and erase. Shannon quantified it. Landauer proved it has thermodynamic cost. Bennett showed computation can be reversible but erasure cannot. Jaynes connected entropy in physics to entropy in inference.</p>
<p>These four results — spanning 1948 to 1982 — underpin everything in thermoeconomics. They establish that information is not abstract: it is a physical quantity with measurable cost, and any system that processes information (including a proof-of-work blockchain) is subject to the laws of thermodynamics.</p>
<h2>The Thread</h2>
<p><strong>Shannon (1948)</strong> — Defined information as the reduction of uncertainty. Created the mathematical framework: entropy, channel capacity, source coding. Gave us the formula: H(X) = −Σ p(x) log₂ p(x).</p>
<p><strong>Jaynes (1957)</strong> — Proved that Shannon entropy and thermodynamic entropy are the same quantity. The Maximum Entropy Principle: assign probabilities that maximize entropy subject to constraints. This connects to the difficulty adjustment.</p>
<p><strong>Landauer (1961)</strong> — Erasing one bit of information dissipates at least kBT ln 2 of energy as heat. Information erasure is physically irreversible. This is the bridge between computation and thermodynamics.</p>
<p><strong>Bennett (1982)</strong> — Computation itself can be thermodynamically reversible. Only erasure costs energy. This means the thermodynamic cost of mining is specifically in the erasure of failed nonces — the mechanism by which work is proved.</p>`,

body: `<blockquote><strong>Paper:</strong> Claude E. Shannon, "A Mathematical Theory of Communication," <em>Bell System Technical Journal</em>, Vol. 27, pp. 379–423, 623–656, July & October 1948.<br><a href="https://people.math.harvard.edu/~ctm/home/text/others/shannon/entropy/entropy.pdf" target="_blank">PDF →</a></blockquote>
<h2>Summary</h2>
<p>Shannon established the mathematical framework for quantifying information. His key insight: <strong>information is the reduction of uncertainty</strong>. A message is informative to the extent that it tells you something you didn't already know.</p>
<h2>Key Concepts</h2>
<p><strong>Entropy (H)</strong> — The average information content of a message source, measured in bits:</p>
<div class="equation">H(X) = −Σ p(x<sub>i</sub>) log₂ p(x<sub>i</sub>)</div>
<p>This is identical in form to Boltzmann-Gibbs entropy in statistical mechanics — a connection that Jaynes would later prove is not coincidental.</p>
<p><strong>Channel Capacity</strong> — Every communication channel has a maximum rate at which information can be transmitted reliably. Noise sets the limit.</p>

slug: "jaynes", section: "info-theory", title: "Jaynes (1957) — Maximum Entropy Principle",
meta: "E.T. Jaynes · Physical Review · 1957",
body: `<blockquote><strong>Paper:</strong> E.T. Jaynes, "Information Theory and Statistical Mechanics," <em>Physical Review</em>, Vol. 106, No. 4, 1957.<br><a href="https://doi.org/10.1103/PhysRev.106.620" target="_blank">DOI →</a></blockquote>
<h2>Summary</h2>
<p>Jaynes showed that <strong>Shannon entropy and thermodynamic entropy are the same quantity</strong>, measured in different units. This is not analogy — it is mathematical identity. The connection was always there in the formalism; Jaynes made it explicit.</p>
<h2>The Maximum Entropy Principle</h2>
<p>When making inferences under incomplete information, assign the probability distribution that <strong>maximizes entropy subject to known constraints</strong>. This is the least biased inference given what you know — any other distribution would smuggle in unjustified assumptions.</p>
<p>Applied to statistical mechanics, MaxEnt derives the <strong>Boltzmann distribution</strong> as the unique distribution maximizing entropy subject to a constraint on average energy:</p>
<div class="equation">P(state) = (1/Z) exp(−E / k<sub>B</sub>T)</div>
<p>This is not an approximation. It is the mathematically necessary consequence of maximum entropy under an energy constraint.</p>
<h2>The Separation Principle</h2>
<p>Jaynes argued for a clean separation between the <strong>laws of physics</strong> (which constrain what's possible) and <strong>statistical inference</strong> (which tells us what to believe given those constraints). MaxEnt is the bridge: it tells you the least-biased probability assignment consistent with your physical knowledge.</p>`,

slug: "landauer", section: "info-theory", title: "Landauer (1961) — Irreversibility and Heat Generation",
meta: "Rolf Landauer · IBM Journal of Research and Development · 1961",
body: `<blockquote><strong>Paper:</strong> Rolf Landauer, "Irreversibility and Heat Generation in the Computing Process," <em>IBM Journal of Research and Development</em>, Vol. 5, No. 3, 1961.<br><a href="https://doi.org/10.1147/rd.53.0183" target="_blank">DOI →</a></blockquote>
<h2>Summary</h2>
<p>Landauer proved that <strong>erasing one bit of information dissipates at least k<sub>B</sub>T ln 2 of energy as heat</strong>. This is not an engineering limitation — it is a consequence of the second law of thermodynamics.</p>
<div class="equation">E<sub>erase</sub> ≥ k<sub>B</sub>T ln 2 ≈ 2.85 × 10<sup>−21</sup> J (at 300K)</div>
<h2>Why Erasure Matters</h2>
<p>Computation that merely moves information around can, in principle, be done reversibly — with no energy cost (Bennett would formalize this later). But computation that <strong>destroys information</strong> — maps many inputs to fewer outputs — is thermodynamically irreversible. The erased information must go somewhere, and "somewhere" is heat.</p>
<p>A hash function is the paradigmatic example. SHA-256 maps an arbitrarily large input space to a 256-bit output space. Information is destroyed with every hash. This destruction has a minimum thermodynamic cost that no engineering improvement can eliminate.</p>
<h2>The Landauer Limit vs. Reality</h2>
<p>The actual energy cost of a SHA-256 hash on modern hardware is roughly <strong>10 billion times</strong> the Landauer limit. But the limit matters because it proves the cost is <strong>fundamental</strong>. Even a perfect computer running at the thermodynamic limit would still pay an energy cost for every hash. The cost is physical law, not engineering overhead.</p>`,
connection: "Landauer's principle is the bridge between information theory and physics. It establishes that proof-of-work mining has an irreducible physical cost — not because hardware is inefficient, but because the hash function destroys information, and information destruction dissipates energy. This is what makes the proof unforgeable: you cannot prove you did the work without actually doing it, because the work is thermodynamic.",
notes: [{ date: "2025-12", text: "The 10-billion-times gap between Landauer and reality is actually a feature of the argument, not a weakness. It means the fundamental result is robust — we're not relying on being near the limit. We're saying: even at the limit, the cost is nonzero and irreducible. Everything above the limit is engineering overhead that may shrink. The limit itself cannot." }]

{
slug: "bennett", section: "info-theory", title: "Bennett (1982) — Thermodynamics of Computation",
meta: "Charles H. Bennett · International Journal of Theoretical Physics · 1982",
body: `<blockquote><strong>Paper:</strong> Charles H. Bennett, "The Thermodynamics of Computation — A Review," <em>International Journal of Theoretical Physics</em>, Vol. 21, 1982.<br><a href="https://doi.org/10.1007/BF02084158" target="_blank">DOI →</a></blockquote>
<h2>Summary</h2>
<p>Bennett showed that <strong>computation itself can be thermodynamically reversible</strong> — it is only the <strong>erasure of information</strong> that necessarily generates heat. This completes the Landauer argument by pinpointing exactly where the irreversibility lives.</p>
<h2>Reversible vs. Irreversible Computation</h2>
<p>A computation is <strong>logically reversible</strong> if you can reconstruct the input from the output. It is <strong>logically irreversible</strong> if you cannot — if the function maps many inputs to one output, discarding information in the process.</p>
<p>Bennett proved that any logically irreversible computation can be decomposed into: (1) a reversible computation that produces the output alongside a copy of the input, followed by (2) an erasure step that discards the input copy. Step 1 can be done with zero energy cost in principle. Step 2 — the erasure — is where Landauer's limit kicks in.</p>
<h2>Implication for Mining</h2>
<p>In proof-of-work mining, the miner tries nonce after nonce. Each failed nonce is <strong>erased</strong> — it served no purpose and is discarded. This erasure is the thermodynamically irreversible step. The accumulation of erased nonces is the physical trace of work that cannot be counterfeited.</p>`,
connection: "Bennett completes the chain: Shannon quantified information → Jaynes connected it to thermodynamics → Landauer proved erasure costs energy → Bennett showed that it is specifically the erasure (not the computation) that is irreversible. In mining, the irreversible step is discarding failed nonces. Each discarded nonce is a bit erased, a bit of heat generated, a bit of proof accumulated. The work is literally written in dissipated energy."
},

<p>Hashcash is a proof-of-work system originally designed to combat email spam and denial-of-service attacks. The sender must find a <strong>partial hash collision</strong> — an input whose SHA-1 hash starts with a required number of zero bits. This is computationally expensive to produce but trivial to verify.</p>
<h2>Key Concepts</h2>
<p><strong>Partial hash collision</strong> — The core mechanism. Finding an input <em>x</em> such that SHA(x) has <em>k</em> leading zeros requires on average 2<sup>k</sup> hash operations. Verification requires exactly one.</p>
<p><strong>Asymmetric cost</strong> — The defining property of proof of work: expensive to create, cheap to verify. This asymmetry is what makes the system useful as a cost mechanism.</p>
<p><strong>Tunable difficulty</strong> — By adjusting the number of required leading zeros, the cost can be set to any desired level. Nakamoto would later make this adjustment automatic via the difficulty algorithm.</p>`,

<p><strong>Transferability</strong> — The missing piece between proof of work and money. A hashcash stamp proves work was done, but it can't be spent twice or passed along. RPOW solved this with signed tokens from a trusted server.</p>

<p>Nakamoto's paper describes a system for electronic transactions without trusted third parties. It combines proof of work, a peer-to-peer network, and a chain of cryptographic hashes to create a decentralized ledger secure as long as honest nodes control a majority of computational power.</p>

slug: "pow-thermo", section: "pow", title: "Proof of Work as Thermodynamic Process",
body: `<p>This page synthesizes the connections between proof of work and all six scientific traditions. It is the central argument of thermoeconomics.</p>
<h2>The Claim</h2>
<p>Proof of work is not a computational metaphor for value. It is the literal, physical, thermodynamic process by which digital scarcity is created.</p>
<h2>The Nine-Step Argument</h2>
<p><strong>1. Computation is physical</strong> (Landauer) — Every hash operation is a physical event that consumes energy and produces entropy. Minimum cost per irreversible bit: k<sub>B</sub>T ln 2.</p>
<p><strong>2. PoW is irreversible computation</strong> (Bennett) — Each failed nonce is erased — a logically irreversible operation. The erasure generates heat. The thermodynamic cost is the <em>mechanism</em> of proof.</p>
<p><strong>3. The difficulty adjustment maximizes entropy subject to constraints</strong> (Jaynes) — The target constrains block production rate. Within that constraint, valid hashes are maximally random. This is the MaxEnt principle.</p>
<p><strong>4. The proof carries measurable information</strong> (Shannon) — A valid block hash at difficulty D carries ~log₂(D) bits of information. This is what makes the proof valuable.</p>
<p><strong>5. There is no shortcut</strong> (Wolfram) — The hash function is computationally irreducible. No algorithm finds valid hashes faster than brute-force search.</p>
<p><strong>6. The network converges without coordination</strong> (Causal Invariance) — Independent miners processing transactions in different orders converge on the same chain. Causal structure is invariant under reordering.</p>
<p><strong>7. The system maintains itself through constraint</strong> (Deacon) — Mining → tokens → value → incentivizes mining → mining. The constraint structure is self-generated and self-maintained.</p>
<p><strong>8. The network minimizes surprise</strong> (Friston) — Mining is active inference: the network maintains a model (the ledger) and acts on the world (consuming energy) to reduce uncertainty (achieving consensus).</p>
<p><strong>9. Complexity emerges at the boundary</strong> (Crutchfield) — SHA-256 output is random. But the mining <em>process</em> — blocks, difficulty adjustments, economic dynamics — has rich structural complexity.</p>
<h2>The Conclusion</h2>
<p>Proof of work is not an arbitrary engineering choice. It is the natural expression of a deep structure: <strong>the thermodynamic cost of irreversible computation is the only known physical basis for unforgeable digital scarcity.</strong></p>`,

slug: "irreducibility", section: "wolfram", title: "Computational Irreducibility",
body: `<h2>The Concept</h2>
<p>A process is <strong>computationally irreducible</strong> if there is no shortcut to predicting its outcome other than running the process itself, step by step. No closed-form formula, no polynomial-time algorithm can jump ahead to the answer.</p>
<p>Wolfram identified computational irreducibility as a pervasive feature of even simple computational systems. It is not the exception — it is the norm. Most computations that do anything interesting are irreducible.</p>
<h2>Why It Matters</h2>
<p>Computational irreducibility is <strong>the reason proof of work is secure</strong>.</p>
<p>SHA-256 hashing is computationally irreducible: there is no way to find an input producing a hash below the target except by trying inputs one at a time. You cannot algebraically invert the hash function. You cannot predict which nonce will work. You must do the work.</p>
<h2>In the Wolfram Model</h2>
<p>In Wolfram's physics, the evolution of the spatial hypergraph is computationally irreducible. The universe cannot "skip ahead" — it must compute each step to produce the next. This is why time exists: time <em>is</em> the computational process running.</p>
<p>The same applies to a blockchain: the chain cannot skip ahead. Each block must be computed to produce the next. Block height <em>is</em> the computational process running.</p>
<h2>Formal Definition</h2>
<p>A computation is irreducible if no other computation can predict its outcome in fewer steps than running it. Equivalently: the shortest program that computes the system's behavior <em>is</em> the system itself.</p>`,
connection: "Computational irreducibility is the foundation of proof-of-work security. It means there is no shortcut — no algorithm, no mathematical trick, no hardware optimization — that can find valid hashes faster than brute-force search. The only proof you did the work is the work itself."
},
{
slug: "causal-invariance", section: "wolfram", title: "Causal Invariance and Consensus",
body: `<h2>The Concept</h2>
<p>A rewriting system is <strong>causally invariant</strong> if, regardless of the order in which rules are applied, the resulting causal structure is the same. Different observers may apply rules in different sequences, but they all arrive at the same causal graph.</p>
<p>In the Wolfram model, causal invariance gives rise to relativistic invariance: different reference frames see events in different orders, but agree on causal relationships.</p>
<h2>The Connection to Blockchain Consensus</h2>
<p>This is structurally identical to how proof-of-work consensus works:</p>
<table>
<tr><th>Wolfram Physics</th><th>Proof-of-Work Blockchain</th></tr>
<tr><td>Hypergraph rewriting rules</td><td>Transaction validation rules</td></tr>
<tr><td>Different rule application orders</td><td>Different miners, different mempools</td></tr>
<tr><td>Causal invariance</td><td>Consensus (longest chain rule)</td></tr>
<tr><td>Same causal graph</td><td>Same blockchain</td></tr>
<tr><td>Observers in different frames</td><td>Nodes in different network positions</td></tr>
</table>
<h2>Why This Isn't Just Analogy</h2>
<p>Both systems solve the same fundamental problem: <strong>distributed convergence without central coordination</strong>. In physics, independent regions of space must agree on causal structure without a global clock. In blockchain, independent miners must agree on transaction ordering without a central authority. The solution in both cases: let the causal structure itself determine the canonical ordering.</p>`,
connection: "Causal invariance explains why proof-of-work consensus works without central coordination. Different miners, receiving transactions in different orders, constructing candidate blocks differently, all converge on the same canonical chain — the same causal history. This is not designed; it is a mathematical property of the system."
},
{
slug: "ruliad", section: "wolfram", title: "The Ruliad",
body: `<blockquote><strong>Primary source:</strong> Wolfram, "The Concept of the Ruliad" (2021) — <a href="https://writings.stephenwolfram.com/2021/11/the-concept-of-the-ruliad/" target="_blank">writings.stephenwolfram.com</a></blockquote>
<h2>The Concept</h2>
<p>The <strong>Ruliad</strong> is the entangled limit of all possible computations. It is the object you get when you apply all possible rules to all possible initial conditions and trace all possible paths simultaneously. It is not a model of the universe — it is the ultimate abstract structure from which all possible models, observers, and physical laws can be derived.</p>
<h2>Why It Matters</h2>
<p>The Ruliad provides a framework for understanding why computation, physics, and mathematics are not separate domains but aspects of the same underlying structure:</p>
<p><strong>Physics</strong> is what you see when you are an observer embedded in the Ruliad. <strong>Mathematics</strong> is what you can prove about the Ruliad from the outside. <strong>Computation</strong> is the process by which the Ruliad generates itself.</p>
<p>In this framework, proof of work exploits the computational irreducibility of the Ruliad — it harnesses the fact that certain computations must be <em>done</em> and cannot be <em>shortcut</em>.</p>`,
connection: "If the Ruliad is the ultimate computational structure, then thermodynamic dissipation is the cost of navigating it. Proof of work is a navigation protocol: miners explore the Ruliad (the space of all possible hashes) and report back coordinates (valid block hashes) that satisfy specified constraints. The economic value of the resulting tokens is a measure of the irreducible structure of the Ruliad in the neighborhood of the chosen hash function."
},

// -------- COMPUTATIONAL MECHANICS --------

slug: "comp-mech", section: "comp-mech", title: "Computational Mechanics",
body: `<p>James Crutchfield's <strong>computational mechanics</strong> provides a rigorous mathematical framework for understanding the information processing that occurs in natural systems. Where Shannon tells you <em>how much</em> information a system produces, Crutchfield tells you <em>how</em> that information is structured — what patterns exist, what is predictable, and what is genuinely random.</p>
<p>This is directly relevant to thermoeconomics because proof-of-work mining is a physical information-processing system, and computational mechanics gives us the tools to analyze exactly what it computes.</p>

<p><strong>Epsilon machines</strong> — The minimal, unique, optimal predictor of a stochastic process. The canonical representation of a system's computational architecture.</p>
<p><strong>Causal states</strong> — Equivalence classes of histories that lead to statistically identical futures. The memory states of the minimal predictor.</p>
<p><strong>Statistical complexity (C<sub>μ</sub>)</strong> — The Shannon entropy of the causal state distribution. Measures the memory a system uses — distinct from entropy, which measures randomness.</p>`,

},
{
slug: "crutchfield", section: "comp-mech", title: "Crutchfield — Physics of Information and Computation",
meta: "James P. Crutchfield · UC Davis Complexity Sciences Center",
body: `<blockquote><strong>Key paper:</strong> James P. Crutchfield, "Between Order and Chaos," <em>Nature Physics</em>, Vol. 8, pp. 17–24, 2012.</blockquote>
<h2>Overview</h2>
<p>Crutchfield's research program asks a deceptively simple question: <strong>how do physical systems process information?</strong></p>
<p>Not in the engineering sense (how do we build computers?) but in the physical sense (what computation is a river doing? a turbulent flame? a biological cell? a blockchain network?). Computational mechanics is the framework that detects, quantifies, and classifies the information processing that occurs spontaneously in natural systems.</p>
<h2>Core Ideas</h2>
<p><strong>Statistical complexity</strong> — A measure of the minimal memory a system needs to optimally predict its future behavior. Unlike Shannon entropy (which measures randomness), statistical complexity measures <em>structure</em>. Perfectly random: zero complexity. Perfectly ordered: zero complexity. Complexity is maximized in between.</p>
<p><strong>Intrinsic computation</strong> — Physical systems compute, whether or not we designed them to. A turbulent flow, a crystal growing, a proof-of-work network — each processes information in a measurable, quantifiable way.</p>
<p><strong>Process languages</strong> — The set of all possible patterns a system can produce forms a formal language. The structure of this language reveals the system's computational architecture.</p>`,
connection: "A proof-of-work blockchain is a physical system that processes information. Computational mechanics gives precise tools: What is the statistical complexity of SHA-256 output? (Maximal entropy, near-zero complexity — pseudorandom.) What is the complexity of block production? (Non-trivial — structured by difficulty adjustment, Poisson arrivals, hash rate dynamics.) The network is intrinsically computing: finding, through massively parallel search, the rare inputs that map to constrained outputs."
},
{
slug: "epsilon-machines", section: "comp-mech", title: "Epsilon Machines and Causal States",
meta: "Shalizi & Crutchfield · Journal of Statistical Physics · 2001",
body: `<blockquote><strong>Key paper:</strong> Shalizi &amp; Crutchfield, "Computational Mechanics: Pattern and Prediction, Structure and Simplicity," <em>Journal of Statistical Physics</em>, Vol. 104, 2001.</blockquote>
<h2>The Concept</h2>
<p>An <strong>epsilon machine</strong> (ε-machine) is the minimal, unique, optimal predictor of a stochastic process. It captures all the structure in a system's behavior and nothing more. It is defined by:</p>
<p><strong>Causal states</strong> — equivalence classes of histories that lead to statistically identical futures.</p>
<p><strong>Transitions</strong> — probabilistic rules for moving between causal states.</p>
<h2>Why "Minimal and Unique"?</h2>
<p>Many models can fit a given dataset. The epsilon machine is provably <strong>sufficient</strong> (captures all predictable structure), <strong>minimal</strong> (no simpler model captures the same), and <strong>unique</strong> (there is exactly one for any process).</p>
<h2>Statistical Complexity</h2>
<div class="equation">C<sub>μ</sub> = H(causal states) = −Σ p(s) log₂ p(s)</div>
<p>C<sub>μ</sub> = 0 for perfectly random (IID) processes — no memory needed. C<sub>μ</sub> = 0 for perfectly periodic processes — trivial memory. C<sub>μ</sub> is maximized at the "edge of chaos" — where structure and unpredictability coexist.</p>`,
connection: "The epsilon machine framework reveals the asymmetry at the heart of mining: SHA-256 output has maximal entropy and near-zero statistical complexity (indistinguishable from random). But the mining process — block discoveries over time — has non-trivial statistical complexity structured by difficulty adjustment and economic dynamics. The blockchain itself has rich causal structure encoding the network's entire economic history."
},
{
slug: "structural-complexity", section: "comp-mech", title: "Structural Complexity and Emergence",
body: `<h2>The Problem of Complexity</h2>
<p>What makes something complex? Not merely large, not merely random, not merely ordered — but <em>complex</em> in the sense of having rich internal structure that does meaningful work.</p>
<p>Crutchfield's answer: complexity is <strong>the amount of information required to specify a system's causal architecture</strong> — its epsilon machine.</p>
<h2>The Complexity Hierarchy</h2>
<table>
<tr><th>Regime</th><th>Shannon Entropy</th><th>Statistical Complexity</th><th>Example</th></tr>
<tr><td>Perfect order</td><td>0 (predictable)</td><td>0 (trivial memory)</td><td>Crystal lattice</td></tr>
<tr><td>Edge of chaos</td><td>Intermediate</td><td><strong>Maximum</strong></td><td>Life, economies, blockchains</td></tr>
<tr><td>Pure randomness</td><td>Maximum</td><td>0 (no memory)</td><td>Fair coin flips, SHA-256 output</td></tr>
</table>
<p>The key insight: <strong>complexity is not the same as entropy.</strong> A random string has maximum entropy but zero complexity — there is nothing to learn. A periodic signal has zero entropy and zero complexity — trivially predictable. Complexity lives in between.</p>
<h2>Emergence</h2>
<p>Emergence is the appearance of macroscopic structure not obvious from microscopic rules. In Crutchfield's framework: a system exhibits emergence when its macro-level epsilon machine has causal states that don't correspond to any simple grouping of micro-level states.</p>
<p>The blockchain is an emergent structure. The micro-level rules (hash functions, signature verification, difficulty adjustment) are simple. The macro-level behavior (economic value, market dynamics, security guarantees) is not derivable by simple aggregation — it emerges from interaction.</p>`,
connection: "Proof-of-work blockchains live at the edge of chaos: the hash function produces maximum-entropy output, but the system as a whole has rich structure. The emergence of economic value from simple mining rules is precisely the kind of phenomenon computational mechanics is designed to analyze and quantify."
},

<h2>Overview</h2>

<p>Deacon's answer: these phenomena are real but constituted by <em>absence</em> — by constraint, by what is <em>not</em> happening. They are "incomplete" in the sense that they require reference to what is missing, what is potential, what is excluded.</p>

meta: "Deacon · Incomplete Nature, Chapters 14–16",
body: `<h2>The Concept</h2>
<p>An <strong>autogen</strong> is the simplest possible system that generates and maintains the constraints that organize it. It combines:</p>

</table>`,

meta: "Deacon · Incomplete Nature, Chapters 1–3",
body: `<h2>The Concept</h2>
<p>Deacon introduces <strong>absential</strong> to describe features constituted by their relation to something <em>not</em> present:</p>
<p><strong>Function</strong> — defined by what a system is <em>for</em> (an absent purpose). <strong>Meaning</strong> — defined by what a sign <em>refers to</em> (an absent referent). <strong>Value</strong> — defined by what could be <em>exchanged</em> (an absent alternative). <strong>Purpose</strong> — defined by what is <em>not yet achieved</em> (an absent goal).</p>

// -------- ACTIVE INFERENCE --------
{
slug: "active-inference", section: "active-inference", title: "Active Inference",
body: `<p>Karl Friston's <strong>Free Energy Principle</strong> and its extension, <strong>Active Inference</strong>, provide a unifying framework for understanding how self-organizing systems — from cells to brains to economies — maintain themselves by minimizing surprise.</p>
<p>The relevance to thermoeconomics: proof-of-work networks can be understood as active inference systems that maintain a model of economic reality (the ledger) by continuously acting on the world (mining) to reduce uncertainty (achieving consensus).</p>
<h2>Key Concepts</h2>
<p><strong>Variational free energy</strong> — An upper bound on surprise. Systems that persist minimize this quantity.</p>
<p><strong>Generative model</strong> — The internal model a system uses to predict sensory inputs.</p>
<p><strong>Active inference</strong> — Systems don't just passively update models; they act on the world to make their predictions come true.</p>
<p><strong>Markov blankets</strong> — The mathematical boundary between system and environment.</p>`,
connection: "Proof-of-work mining is active inference: the miner maintains a model (protocol rules), generates predictions (candidate blocks), acts on the world (hashes), and updates when surprised (tries new nonces). The network collectively maintains a shared generative model (the blockchain) by continuously acting on the physical world (consuming energy) to reduce uncertainty (achieving consensus)."
},
{
slug: "free-energy", section: "active-inference", title: "Friston — The Free Energy Principle",
meta: "Karl Friston · Nature Reviews Neuroscience · 2010",
body: `<blockquote><strong>Key paper:</strong> Karl Friston, "The Free-Energy Principle: A Unified Brain Theory?" <em>Nature Reviews Neuroscience</em>, Vol. 11, pp. 127–138, 2010.</blockquote>
<h2>Overview</h2>
<p>The Free Energy Principle states that any self-organizing system that maintains itself must minimize <strong>variational free energy</strong> — an information-theoretic quantity that bounds surprise.</p>
<p>In plain terms: things that exist must be good at not being surprised. If they were constantly surprised, they would dissolve into their environment — they would cease to exist as distinct systems.</p>
<h2>Key Concepts</h2>
<p><strong>Variational free energy</strong> — An upper bound on surprise. Minimizing it is equivalent to maximizing model accuracy while minimizing model complexity. A formal Occam's razor.</p>
<p><strong>Generative model</strong> — The internal model predicting sensory inputs. In a brain: neural architecture. In a blockchain: protocol rules + chain state.</p>
<p><strong>Active inference</strong> — Systems don't just update models (perception); they act on the world to confirm predictions (action). A miner doesn't just observe the mempool — it constructs and hashes a block.</p>`,
connection: "Proof-of-work mining is active inference: (1) The generative model = protocol rules defining valid blocks. (2) Prediction = a specific nonce will produce a valid hash. (3) Action = hashing the candidate. (4) Surprise = hash doesn't meet target. (5) Update and try again. The network as a whole maintains a shared model (blockchain) by continuously acting on the physical world (consuming energy) to reduce uncertainty (consensus)."
},
{
slug: "ai-economics", section: "active-inference", title: "Active Inference and Economic Systems",
body: `<h2>Economic Agents as Inference Engines</h2>
<p>Under active inference, economic agents are not utility maximizers (the neoclassical assumption) but <strong>surprise minimizers</strong> — they act to confirm their models of the world, and they update those models when surprised.</p>
<p>An economic agent: (1) <strong>Maintains a generative model</strong> of the economic environment. (2) <strong>Generates predictions</strong> about future states. (3) <strong>Acts</strong> to make predictions come true. (4) <strong>Updates</strong> when outcomes diverge from expectations.</p>
<p>This is richer than utility maximization because it naturally accounts for information-seeking behavior (exploration), model uncertainty (risk), and the role of shared expectations (institutions, protocols).</p>
<h2>Proof-of-Work Networks as Collective Active Inference</h2>
<p><strong>Individual miners</strong> are active inference agents: they model profitability, adjust hash power, select transactions, and act to minimize surprise (maximize expected revenue).</p>
<p><strong>The network</strong> collectively maintains a shared generative model: the blockchain state. Consensus is the process by which individual agents converge on a single shared model.</p>
<p><strong>The difficulty adjustment</strong> is a collective free energy minimization mechanism: it ensures the network's "predictions" (one block per target interval) remain accurate despite changes in hash power.</p>
<p><strong>The token price</strong> encodes the network's collective model of its own value — a self-referential generative model maintained by the thermodynamic work of mining.</p>`,
connection: "The difficulty adjustment is the clearest example of collective active inference: the network continuously adjusts its behavior to maintain a prediction (constant block rate) in the face of environmental change (fluctuating hash rate). This is precisely what the Free Energy Principle describes — a self-organizing system minimizing surprise through action."
},
{
slug: "markov-blankets", section: "active-inference", title: "Markov Blankets and System Boundaries",
meta: "Friston · Journal of the Royal Society Interface · 2013",
body: `<blockquote><strong>Key paper:</strong> Karl Friston, "Life as We Know It," <em>Journal of the Royal Society Interface</em>, 2013.</blockquote>
<h2>The Concept</h2>
<p>A <strong>Markov blanket</strong> is the minimal set of variables that makes a system statistically independent of its environment. If you know the blanket's state, the environment gives you no additional information about the system's internal states.</p>
<h2>Structure</h2>
<p><strong>Sensory states</strong> — variables influenced by the environment. <strong>Active states</strong> — variables that influence the environment. <strong>Internal states</strong> — shielded from direct environmental influence by the blanket.</p>
<p>The Free Energy Principle says any system with a Markov blanket that persists must appear to minimize free energy.</p>
<h2>Markov Blankets in Blockchain</h2>
<p><strong>Individual node:</strong> Sensory = incoming transactions, block announcements. Active = mined blocks, broadcasts. Internal = mempool, local chain state, mining computation.</p>
<p><strong>The network:</strong> Sensory = new transactions from users, price signals. Active = confirmed transactions, difficulty adjustments. Internal = consensus chain, mining competition.</p>
<p><strong>Nested structure:</strong> Nodes are Markov-blanketed systems within the network, which is itself Markov-blanketed within the broader economy. This nesting — from individual hash computations to global monetary properties — is a hallmark of complex self-organizing systems.</p>
<p>Quai Network's hierarchical architecture (Prime → Region → Zone) is an explicit engineering of nested Markov blankets.</p>`,
connection: "The Markov blanket formalism gives a precise way to define system boundaries in blockchain networks. It explains how individual nodes maintain independence while contributing to collective consensus, and why Quai's hierarchical architecture works: each level is a Markov-blanketed system with its own sensory, active, and internal states."
},

<h2>Summary</h2>
