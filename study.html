// ===== TOOL 11: SHA-256 DEEP DIVE =====
let tkShaData=null, tkShaRound=0, tkShaPlayInterval=null;
function tkShaHex(v){return('00000000'+((v>>>0)).toString(16)).slice(-8);}
function tkShaCompute(){
  const inp=document.getElementById('tkShaInput');if(!inp)return;
  const msg=inp.value;tkShaData=SHA256.internals(msg);
  document.getElementById('tkShaDigest').value=tkShaData.digest;
  document.getElementById('tkShaDigest').className='tk-inp tk-ho hash-valid';
  // Padding grid
  const pg=document.getElementById('tkShaPadGrid');if(pg){
    const pd=tkShaData.padded;let h='';const msgLen=new TextEncoder().encode(msg).length;
    for(let i=0;i<pd.length;i++){
      let cls='sha-pad-cell';if(i<msgLen)cls+=' msg';else if(i===msgLen||i<pd.length-8)cls+=' pad';else cls+=' len';
      h+=`<div class="${cls}"><div style="font-size:7px;color:inherit;opacity:0.5;">${i}</div>${('00'+(pd[i]).toString(16)).slice(-2)}</div>`;
    }
    pg.innerHTML=h;
  }
  // Initial hash values
  const ig=document.getElementById('tkShaInitGrid');if(ig){
    const labels=['h₀','h₁','h₂','h₃','h₄','h₅','h₆','h₇'];
    ig.innerHTML=tkShaData.initH.map((v,i)=>`<div class="sha-hv-box"><div class="sha-hv-label">${labels[i]}</div><div class="sha-hv-val">${tkShaHex(v)}</div></div>`).join('');
  }
  // Message schedule
  const sg=document.getElementById('tkShaSchedGrid');if(sg){
    sg.innerHTML=tkShaData.W.map((v,i)=>`<div class="sha-sched-word ${i<16?'from-msg':''}" id="tkSw-${i}"><span class="wi">W${i}</span>${tkShaHex(v)}</div>`).join('');
  }
  // Final hash
  const fg=document.getElementById('tkShaFinalGrid');if(fg){
    const labels=['H₀','H₁','H₂','H₃','H₄','H₅','H₆','H₇'];
    fg.innerHTML=tkShaData.finalH.map((v,i)=>`<div class="sha-hv-box final"><div class="sha-hv-label">${labels[i]}</div><div class="sha-hv-val">${tkShaHex(v)}</div></div>`).join('');
  }
  tkShaRound=0;tkShaRenderRound();
}
function tkShaRenderRound(){
  if(!tkShaData)return;const rd=tkShaData.rounds[tkShaRound];if(!rd)return;
  document.getElementById('tkShaRoundNum').textContent=tkShaRound;
  const slider=document.getElementById('tkShaSlider');if(slider)slider.value=tkShaRound;
  // Highlight active W
  document.querySelectorAll('.sha-sched-word').forEach((el,i)=>{el.classList.toggle('active',i===tkShaRound);});
  // Working variables
  const vg=document.getElementById('tkShaVarsGrid');if(vg){
    const labels=['a','b','c','d','e','f','g','h'];const vals=[rd.a,rd.b,rd.c,rd.d,rd.e,rd.f,rd.g,rd.h];
    let prev=tkShaRound>0?tkShaData.rounds[tkShaRound-1]:null;
    vg.innerHTML=labels.map((l,i)=>{const changed=prev&&vals[i]!==([prev.a,prev.b,prev.c,prev.d,prev.e,prev.f,prev.g,prev.h][i]);
      return`<div class="sha-var-box ${changed?'changed':''}"><div class="sha-var-lbl">${l}</div><div class="sha-var-val">${tkShaHex(vals[i])}</div></div>`;}).join('');
  }
  // Round detail
  const det=document.getElementById('tkShaRoundDetail');if(det){
    det.innerHTML=`<div class="sha-rd-title">Round ${tkShaRound} Computation</div>
    <div class="sha-rd-row"><span class="lbl">W<sub>${tkShaRound}</sub></span><span class="eq">=</span><span class="val">${tkShaHex(rd.Wt)}</span></div>
    <div class="sha-rd-row"><span class="lbl">K<sub>${tkShaRound}</sub></span><span class="eq">=</span><span class="val">${tkShaHex(rd.Kt)}</span></div>
    <div class="sha-rd-row"><span class="lbl">Ch</span><span class="eq">=</span><span class="val">${tkShaHex(rd.ch)}</span></div>
    <div class="sha-rd-row"><span class="lbl">Maj</span><span class="eq">=</span><span class="val">${tkShaHex(rd.maj)}</span></div>
    <div class="sha-rd-row"><span class="lbl">Σ₁</span><span class="eq">=</span><span class="val">${tkShaHex(rd.S1)}</span></div>
    <div class="sha-rd-row"><span class="lbl">Σ₀</span><span class="eq">=</span><span class="val">${tkShaHex(rd.S0)}</span></div>
    <div class="sha-rd-row"><span class="lbl">T₁</span><span class="eq">= h + Σ₁ + Ch + K + W =</span><span class="res">${tkShaHex(rd.T1)}</span></div>
    <div class="sha-rd-row"><span class="lbl">T₂</span><span class="eq">= Σ₀ + Maj =</span><span class="res">${tkShaHex(rd.T2)}</span></div>`;
  }
}
function tkShaSetRound(r){tkShaRound=Math.max(0,Math.min(63,r));tkShaRenderRound();}
function tkShaStep(d){tkShaSetRound(tkShaRound+d);}
function tkShaTogglePlay(){
  const btn=document.getElementById('tkShaPlayBtn');if(!btn)return;
  if(tkShaPlayInterval){clearInterval(tkShaPlayInterval);tkShaPlayInterval=null;btn.textContent='▶ Play';btn.classList.remove('playing');return;}
  btn.textContent='⏸ Pause';btn.classList.add('playing');
  tkShaPlayInterval=setInterval(()=>{if(tkShaRound>=63){clearInterval(tkShaPlayInterval);tkShaPlayInterval=null;btn.textContent='▶ Play';btn.classList.remove('playing');return;}tkShaStep(1);},150);
}
function tkInitSha256Deep(){
  const inp=document.getElementById('tkShaInput');if(!inp)return;
  const slider=document.getElementById('tkShaSlider');
  inp.addEventListener('input',()=>{if(tkShaPlayInterval){clearInterval(tkShaPlayInterval);tkShaPlayInterval=null;}tkShaCompute();});
  if(slider)slider.addEventListener('input',()=>tkShaSetRound(parseInt(slider.value)));
  tkShaCompute();
}

// ===== MERKLE TREE ENGINE =====
const tkMerkleTxs = [
    { from: 'Alice', to: 'Bob', amt: '10' },
    { from: 'Bob', to: 'Charlie', amt: '5' },
    { from: 'Charlie', to: 'Dave', amt: '3' },
    { from: 'Dave', to: 'Alice', amt: '7' }
];
let tkMerklePrev = { leaf: ['','','',''], branch: ['',''], root: '' };

function tkMerkleSerialize(i) {
    return `${tkMerkleTxs[i].from}>${tkMerkleTxs[i].to}:${tkMerkleTxs[i].amt}`;
}
function tkMerkleShort(h) { return h.slice(0,8) + '···' + h.slice(-8); }

function tkMerkleFlash(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('mk-fresh');
    void el.offsetWidth;
    el.classList.add('mk-fresh');
    setTimeout(() => el.classList.remove('mk-fresh'), 600);
}

function tkMerkleCompute() {
    const leafH = tkMerkleTxs.map((_, i) => SHA256.hash(tkMerkleSerialize(i)));
    const branchH01 = SHA256.hash(leafH[0] + leafH[1]);
    const branchH23 = SHA256.hash(leafH[2] + leafH[3]);
    const rootH = SHA256.hash(branchH01 + branchH23);

    for (let i = 0; i < 4; i++) {
        const el = document.getElementById(`tkMkHashLeaf${i}`);
        if (el) { el.textContent = leafH[i]; if (tkMerklePrev.leaf[i] && tkMerklePrev.leaf[i] !== leafH[i]) tkMerkleFlash(`tkMkLeaf${i}`); }
    }

    const h01El = document.getElementById('tkMkHashBranch01');
    if (h01El) {
        h01El.textContent = branchH01;
        document.getElementById('tkMkConcat01').innerHTML = `<span style="color:var(--tkc);">${tkMerkleShort(leafH[0])}</span><span class="mk-plus">∥</span><span style="color:var(--tkc);">${tkMerkleShort(leafH[1])}</span>`;
        if (tkMerklePrev.branch[0] && tkMerklePrev.branch[0] !== branchH01) tkMerkleFlash('tkMkBranch01');
    }
    const h23El = document.getElementById('tkMkHashBranch23');
    if (h23El) {
        h23El.textContent = branchH23;
        document.getElementById('tkMkConcat23').innerHTML = `<span style="color:var(--tkc);">${tkMerkleShort(leafH[2])}</span><span class="mk-plus">∥</span><span style="color:var(--tkc);">${tkMerkleShort(leafH[3])}</span>`;
        if (tkMerklePrev.branch[1] && tkMerklePrev.branch[1] !== branchH23) tkMerkleFlash('tkMkBranch23');
    }

    const rootEl = document.getElementById('tkMkHashRoot');
    if (rootEl) {
        rootEl.textContent = rootH;
        document.getElementById('tkMkConcatRoot').innerHTML = `<span style="color:var(--tkp);">${tkMerkleShort(branchH01)}</span><span class="mk-plus">∥</span><span style="color:var(--tkp);">${tkMerkleShort(branchH23)}</span>`;
        if (tkMerklePrev.root && tkMerklePrev.root !== rootH) tkMerkleFlash('tkMkRoot');
    }

    tkMerklePrev = { leaf: [...leafH], branch: [branchH01, branchH23], root: rootH };
    tkMerkleDrawLines();
}

function tkMerkleDrawLines() {
    const svg = document.getElementById('tkMerkleSvg');
    const wrap = document.getElementById('tkMerkleWrap');
    if (!svg || !wrap) return;
    const wR = wrap.getBoundingClientRect();
    svg.setAttribute('width', wR.width);
    svg.setAttribute('height', wR.height);
    svg.setAttribute('viewBox', `0 0 ${wR.width} ${wR.height}`);

    function top(id) { const el = document.getElementById(id); if (!el) return {x:0,y:0}; const r = el.getBoundingClientRect(); return { x: r.left + r.width/2 - wR.left, y: r.top - wR.top }; }
    function bot(id) { const el = document.getElementById(id); if (!el) return {x:0,y:0}; const r = el.getBoundingClientRect(); return { x: r.left + r.width/2 - wR.left, y: r.bottom - wR.top }; }

    let lines = '';
    for (let i = 0; i < 4; i++) { const f = top(`tkMkTx${i}`), t = bot(`tkMkLeaf${i}`); lines += `<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}"/>`; }
    const l0=top('tkMkLeaf0'),l1=top('tkMkLeaf1'),b01=bot('tkMkBranch01');
    lines += `<line x1="${l0.x}" y1="${l0.y}" x2="${b01.x}" y2="${b01.y}"/>`;
    lines += `<line x1="${l1.x}" y1="${l1.y}" x2="${b01.x}" y2="${b01.y}"/>`;
    const l2=top('tkMkLeaf2'),l3=top('tkMkLeaf3'),b23=bot('tkMkBranch23');
    lines += `<line x1="${l2.x}" y1="${l2.y}" x2="${b23.x}" y2="${b23.y}"/>`;
    lines += `<line x1="${l3.x}" y1="${l3.y}" x2="${b23.x}" y2="${b23.y}"/>`;
    const br01=top('tkMkBranch01'),br23=top('tkMkBranch23'),rt=bot('tkMkRoot');
    lines += `<line x1="${br01.x}" y1="${br01.y}" x2="${rt.x}" y2="${rt.y}"/>`;
    lines += `<line x1="${br23.x}" y1="${br23.y}" x2="${rt.x}" y2="${rt.y}"/>`;
    svg.innerHTML = lines;
}

function tkInitMerkle() {
    tkMerklePrev = { leaf: ['','','',''], branch: ['',''], root: '' };
    document.querySelectorAll('.mk-tx-field').forEach(inp => {
        inp.addEventListener('input', () => {
            const i = parseInt(inp.dataset.mktx);
            const f = inp.dataset.mkf;
            tkMerkleTxs[i][f] = inp.value;
            tkMerkleCompute();
        });
    });
    tkMerkleCompute();
    window.addEventListener('resize', tkMerkleDrawLines);
}

// ===== TOOLKIT PAGE INIT DISPATCHER =====
function tkInitPage(slug){
  switch(slug){
    case 'tk-hash': tkInitHash(); break;
    case 'tk-block': tkInitBlock(); break;
    case 'tk-blockchain': tkInitBlockchain(); break;
    case 'tk-distributed': tkInitDistributed(); break;
    case 'tk-merkle': tkInitMerkle(); break;
    case 'tk-tokens': tkInitTokenChain(); break;
    case 'tk-coinbase': tkInitCoinbaseChain(); break;
    case 'tk-keys': break; // Button-driven
    case 'tk-signatures': break; // Button-driven
    case 'tk-signedtx': break; // Button-driven
    case 'tk-signedchain': if(!tkScKeyData)tkScGenKeys(); else tkInitSignedChain(); break;
    case 'tk-sha256deep': tkInitSha256Deep(); break;
  }
}
