slug: "alt-ch07-s4", section: "alt-ch07", title: "Section IV: Yield Generation and Optimization",
body: `<p>With lending protocols and DEXs providing the foundational infrastructure, DeFi enables a new layer of sophistication: yield optimization strategies that either don't exist or are not available to retail investors in traditional finance. These mechanisms transform how we think about earning returns on capital, creating entirely new categories of financial opportunity.</p>
<p>Each approach represents a different philosophy toward yield generation. The ecosystem spans from foundational mechanisms like staking and lending to more sophisticated strategies including liquidity provision, real-world asset yields, and complex derivative structures. To illustrate how these mechanisms work in practice, this section examines four innovative approaches that demonstrate DeFi's distinctive capabilities: delta-neutral hedging strategies that create stable returns, time-based derivatives that let traders exchange future yield itself, systematic options strategies that harvest volatility premiums, and speculative farming that bets on future token distributions.</p>
<h3>Ethena: Delta-Neutral Yield-Bearing Dollars</h3>
<p>Ethena demonstrates how DeFi can combine multiple financial primitives to create novel yield generation mechanisms. The protocol's USDe represents a new approach to synthetic dollar design through <strong>delta-neutral</strong> hedging, a strategy analogous to owning a stock while simultaneously shorting its futures. The gains and losses cancel out, leaving a stable position that still earns dividends. (For a broader examination of stablecoin categories including synthetic mechanisms like USDe, see Chapter IX.)</p>
<p>The protocol backs USDe with staked ETH, BTC, other liquid staking tokens, and reserve assets while taking offsetting short positions in perpetual futures markets (Chapter VI). When users mint USDe, their collateral generates staking rewards while the short positions neutralize directional price exposure.</p>
<p>Three revenue streams emerge. Staking rewards provide baseline yield from the underlying collateral. Funding rate payments from short perpetual positions typically generate additional returns, especially during bull markets when funding rates tend to be positive. Reserve income from T-bill-like assets provides a third yield component. The combination can produce attractive yields on what functions as a stable asset.</p>
<p>Ethena's innovation lies in transforming stablecoin issuance from a passive backing mechanism into an active yield generation strategy. Users can further compound returns through sUSDe, which stakes their USDe holdings. This demonstrates how DeFi's composability enables financial products impossible in traditional systems.</p>
<p>However, Ethena introduces unique risks worth noting. Funding rate risk becomes significant during bear markets when negative funding rates could erode yields. To mitigate this, Ethena maintains a reserve fund and dynamically reallocates backing assets into liquid stables earning Treasury-like rates during negative funding periods, protecting users from losses.</p>
<p>Custody risk emerges from reliance on centralized exchanges for hedging positions. The risk is partially mitigated by relying on Off-Exchange Settlement (OES) providers including Copper, Ceffu, and Fireblocks to hold backing assets. While these providers use bankruptcy-remote trusts or MPC wallets to protect assets, operational issues could temporarily impede minting and redemption functionality. Ethena diversifies this across multiple OES providers and frequent PnL settlement with exchanges.</p>
<p>Peg stability, while generally maintained through redemption mechanisms, is not absolute. USDe briefly traded as low as $0.62 on October 10th, 2025 during a Binance-specific event before recovering. Binance's yield programs had concentrated substantial leveraged USDe exposure on the exchange through looping opportunities, enabling 4-10x effective leverage. When the market crashed, Binance's internal pricing system triggered a liquidation cascade. Because this system relied primarily on its own spot market rather than broader multi-venue data, the thin USDe orderbook became severely illiquid.</p>
<p>Critically, on-chain pools remained near $1 throughout this event and USDe stayed over-collateralized, demonstrating that the issue was venue-specific rather than systemic to USDe itself. This episode highlights an important distinction: oracle design and exchange-specific leverage concentration can create severe localized price deviations even when the underlying collateral structure remains sound.</p>
<h3>Pendle: Trading Time Itself</h3>
<p>While Ethena demonstrates yield generation through hedging strategies that neutralize price risk, Pendle takes a fundamentally different approach by deconstructing yield itself. Rather than creating stable returns through derivatives, Pendle enables users to separate and trade the time value of money directly.</p>
<p>By taking yield-bearing assets like staked Ethereum or sUSDe and splitting them into two components, Pendle creates entirely new tradable instruments. The <strong>Principal Token (PT)</strong> represents a claim on the underlying asset at maturity, similar to a zero-coupon bond. The <strong>Yield Token (YT)</strong> represents a claim on all yield generated until maturity. The mathematical relationship ensures that PT price plus YT price tracks the underlying asset price, with small deviations that arbitrage typically closes, creating interesting trading opportunities.</p>
<p>This separation enables sophisticated strategies. Users seeking fixed rates can sell the YT immediately after depositing, locking in a guaranteed return. Those speculating on higher future yields can buy YT tokens for leveraged exposure to rate changes. Others use various PT and YT combinations to hedge interest rate risk across their portfolios.</p>
<p>PTs have become core collateral in lending markets like Aave, Euler, and Morpho. PT-sUSDe and PT-USDe markets on Aave grew from low nine figures into roughly low-single-digit billions in total PT supply across maturities, driven by aggressive fixed-yield leverage trades and incentives. For protocols, this became an appealing way to bootstrap TVL: every loop cycle locks more PT on the lending market and more underlying assets inside Pendle.</p>
<p>The dominant PT use case became looping, a strategy where users deposit PTs as collateral on a lending market, borrow stablecoins against that collateral, use those stablecoins to buy more PT on Pendle, and repeat the cycle. Because PTs trade at a discount to the underlying asset and rise to full value at maturity, this loop effectively creates leveraged exposure to a fixed yield. The strategy works as long as borrowing costs stay below the PT's implied yield.</p>
<p>Under favorable conditions with four to five times leverage, these loops have produced returns in the high double digits from the spread alone. Many setups also receive additional boosts from points programs and token incentives.</p>
<p>However, that fixed return comes with a specific and asymmetric risk profile. PT looping is heavily dependent on how different platforms price these assets. Aave prices PTs based on Pendle's implied yields, with protective guardrails such as minimum PT prices and LTV “killswitches.” The USDe side is typically priced in a way that reduces sensitivity to short-term price swings but concentrates risk in tail events where Ethena itself fails.</p>
<p>Other venues like Euler and some Morpho markets use more market-sensitive pricing that reacts to actual trading prices. This means short-lived price dislocations can make positions look undercollateralized even when the underlying collateral remains sound. Different pricing approaches across venues have already produced divergent outcomes in practice, with identical positions surviving on some platforms while being liquidated on others during the same market stress events.</p>
<p>PT loops also create unwinding frictions. To exit, a user must reverse several steps: repay the borrowed stablecoin, withdraw PT collateral, and sell PT back into often thin Pendle liquidity. This makes positions far stickier than simple lending arrangements and adds execution risk, slippage, and transaction costs exactly when markets are stressed.</p>
<p>PT looping is also extremely sensitive to borrowing costs and liquidity. The upside is capped once you lock in a fixed yield, but the downside remains open-ended. If borrowing rates spike above the PT's implied yield, the spread that made the strategy attractive can disappear or even turn negative. At the same time, PT liquidity on Pendle can be shallow relative to position sizes. In some cases, PT supply has exceeded ten times the available trading liquidity, leaving large positions exposed to severe price impact if forced to unwind quickly.</p>
<p>The split-token model also creates more traditional vulnerabilities. YT tokens can be illiquid, especially for less popular assets, and their value is highly sensitive to changes in expected yields. Unwinding YT positions before maturity can involve substantial slippage, particularly during market stress when investors most want to exit.</p>
<p>In contrast, PT-focused looping strategies offer a cleaner payoff structure but carry their own risks from pricing mechanisms, market liquidity, and variable borrowing costs. The overall result is a strategy where upside is capped at a fixed yield, while various factors can significantly reduce or even erase the expected return, despite the apparent safety of holding principal tokens.</p>
<h3>Points Farming: Speculative Yield Through Future Tokens</h3>
<p>Where Ethena offers stable returns through market-neutral strategies and Pendle enables sophisticated yield trading, points farming represents an entirely different category: betting on future protocol success before a token even exists. This approach involves participating in protocols that haven't yet distributed tokens, earning "points" or accrual metrics that may eventually convert into valuable airdrops.</p>
<p>The mechanics are straightforward but the outcomes uncertain due to protocols generally being very secretive about the criteria. Participants supply liquidity, execute trades, stake assets, or run infrastructure nodes on pre-token protocols to accumulate points based on their activity levels. Successful farming requires targeting programs with transparent, on-chain accrual rules and sustainable underlying activity rather than purely extractive point systems.</p>
<p>Optimization becomes a complex balancing act between cost and potential returns. Farmers must manage gas fees, borrowing costs, and opportunity costs across multiple accounts while avoiding Sybil detection filters that could disqualify their participation. The most sophisticated farmers develop systematic approaches to evaluate program quality, estimate token values, and allocate capital across multiple simultaneous campaigns.</p>
<p>The uncertain nature of these rewards introduces distinct challenges. Points farming yields depend entirely on future protocol decisions, with protocols frequently changing rules mid-campaign. Not all points translate proportionally to tokens, and distributions can face delays, dilution, caps, KYC requirements, or complete cancellation. The primary risks are opportunity cost and program risk, with standard protocol vulnerabilities adding additional exposure.</p>
<p>Despite these uncertainties, points farming has generated substantial returns for early participants in successful protocols. Major airdrops like Hyperliquid, Ethena, and Usual have created significant wealth for active users, validating the strategy's potential. The approach represents a bet on both protocol success and fair token distribution, two variables entirely outside participants' control.</p>
<h3>Options Vaults: Systematic Premium Collection</h3>
<p>In contrast to points farming's uncertain future payoffs, options vaults offer a more structured approach to yield generation by automating classic institutional income strategies. Where points farming bets on eventual token distributions, options vaults generate immediate returns through systematic premium collection. The most common implementations include covered call vaults and cash-secured put vaults, each targeting different market conditions and risk profiles.</p>
<p>Covered call vaults operate by accepting deposits of volatile assets like ETH or BTC, then systematically selling out-of-the-money call options against these holdings. When users deposit ETH, the vault sells weekly call options at strikes typically 5-15% above current market prices. If prices remain below the strike, the vault keeps the premium and rolls to new options at expiry. If prices exceed the strike, the options get exercised and the vault delivers the underlying assets at the predetermined price.</p>
<p>Cash-secured put vaults follow the inverse strategy, holding stablecoins and selling put options on volatile assets. These vaults collect premiums by agreeing to buy assets at below-market prices. If the underlying asset's price remains above the strike, the vault keeps the premium. If prices fall below the strike, the vault purchases the asset at the strike price using its stablecoin reserves.</p>
<p>The yield generation comes primarily from option premiums, which vary widely depending on market volatility, strike selection, fees, and incentive structures. Many vaults also receive additional incentives from protocols seeking to bootstrap liquidity or from option market makers paying for flow. Performance depends critically on volatility levels, strike selection algorithms, and fee structures, with most vaults operating on weekly cycles.</p>
<p>Premium collection strategies carry inherent trade-offs worth considering. Upside capping represents the primary risk for covered call strategies, during strong rallies, the vault's assets get called away at predetermined strikes, limiting participation in further gains. Assignment risk affects put strategies when market downturns force the vault to purchase assets at above-market prices. Volatility crush can rapidly erode recent gains when implied volatility collapses, making previously profitable premiums insufficient to cover subsequent losses. The complexity of options pricing and settlement creates additional attack surfaces compared to simpler yield strategies, requiring robust security measures and careful risk management protocols.</p>`
},

slug: "alt-ch07-s5", section: "alt-ch07", title: "Section V: Infrastructure Dependencies",
body: `<p>The sophisticated DeFi mechanisms explored above (from AMMs and lending protocols to complex yield strategies) all rest on shared infrastructure layers that operate beneath the application surface. While protocol teams focus on optimizing their specific mechanisms, understanding these dependencies reveals where systemic risks concentrate. Oracle failures, flash loan exploits, and bridge vulnerabilities have historically caused more devastating protocol failures than flaws in core protocol logic. A perfectly designed lending protocol can still be drained by oracle failures, and robust DEXs can lose funds when flash loans amplify subtle reentrancy bugs. This section examines the critical infrastructure that determines whether DeFi protocols succeed or fail under stress.</p>
<h3>Oracle Networks</h3>
<p>Smart contracts face a fundamental limitation: they cannot directly access external data like asset prices, weather information, or sports scores. This creates the <strong>oracle problem</strong>, where bringing off-chain data on-chain in a trustworthy way becomes essential for protocol operation.</p>
<p>Price oracles serve as critical infrastructure for decentralized finance. Lending protocols depend on accurate prices to calculate collateral ratios and trigger liquidations. Stablecoin systems require price feeds to maintain pegs and manage collateral positions. Decentralized exchanges need reference prices to detect arbitrage opportunities and set fair exchange rates.</p>
<p>Chainlink dominates the oracle space through its Off-Chain Reporting system, where multiple nodes aggregate data off-chain and submit single transactions to reduce gas costs. (Chainlink's LINK token utility model is discussed in Chapter XII.) Updates trigger based on two mechanisms: deviation thresholds when prices move by preset percentages, and heartbeats that ensure regular updates regardless of price movement.</p>
<p>Pyth Network uses a "pull" model where applications fetch the latest attested price on demand rather than continuous pushing. This approach proves more cost-effective for applications that don't need constant updates, particularly on high-throughput chains where frequent updates would be prohibitively expensive.</p>
<p>Alternative networks like RedStone and Band provide different architectures and redundancy. Many protocols use multiple oracle sources and implement medianization to improve reliability and resist manipulation attempts, reducing single points of failure.</p>
<p>#### Oracle Configuration Types in Lending Markets</p>
<p>Lending protocols implement oracles in fundamentally different ways, each carrying distinct risk profiles. Understanding these configurations is essential for assessing liquidation risk and potential bad debt accumulation.</p>
<p>##### Fundamental Oracles</p>
<p>Fundamental oracles derive prices from internal exchange rates and on-chain accounting rather than secondary market trading. For liquid staking tokens and credit vaults, these oracles calculate prices based on the underlying asset ratio, essentially the net asset value per share. A liquid staking derivative might be priced using the vault's exchange rate (exchangeRate \\= totalAssets / totalShares) multiplied by the underlying asset's USD price, reflecting its redeemable value regardless of secondary market prices.</p>
<p>These oracles resist DEX price manipulation and flash loan attacks since they don't rely on DEX spot prices. However, they create severe bad debt risk during liquidity crises or backing failures. If secondary market prices crash below the oracle price and redemptions become impossible due to insufficient liquidity or smart contract failures, the protocol cannot liquidate positions effectively. Lenders face losses as the collateral's real market value falls below borrowed amounts while the oracle continues reporting an inflated price based on theoretical backing that may no longer be accessible.</p>
<p>##### Hardcoded Oracles</p>
<p>Hardcoded oracles fix the price relationship between assets, typically for stablecoins assumed to maintain pegs. Aave's current configuration for USDe exemplifies this approach: the protocol prices USDe 1:1 versus USDT (using Chainlink's USDT/USD feed), effectively treating USDe \\= USDT ≈ $1. This creates dependency on both USDe and USDT maintaining their pegs.</p>
<p>The oracle logic is trivial and updates are rare, reducing gas costs and implementation complexity compared to dedicated dynamic price feeds. The risks mirror those of fundamental oracles. During a depeg event, liquidations fail to trigger at appropriate thresholds. Bad debt accumulates as the real market value diverges from the hardcoded assumption, especially when LTVs are high and the depeg is severe. The protocol effectively bets its solvency on both assets maintaining their pegs indefinitely.</p>
<p>##### Market-Reliant Oracles</p>
<p>Market-reliant oracles source prices from secondary market trading, whether through direct on-chain pool queries like Uniswap V3 TWAPs or through aggregated feeds like Chainlink and Pyth that combine CEX and DEX prices across multiple sources. These oracles reflect actual tradeable prices and enable real liquidations during market stress. Positions can be unwound at prices that match where assets can actually be sold.</p>
<p>Direct DEX oracle implementations introduce manipulation vulnerabilities if poorly designed. Flash loan attacks against shallow pools represent the canonical example. During liquidity crises, market-reliant oracles may report accurate but rapidly moving prices that create liquidation cascades, potentially overwhelming the protocol's ability to process liquidations efficiently.</p>
<p>##### Fundamental Tradeoffs and Hybrid Solutions</p>
<p>The choice between these configurations represents fundamental tradeoffs. Fundamental and hardcoded oracles optimize for manipulation resistance at the cost of bad debt risk during market dislocations or backing failures. Market-reliant oracles accept manipulation risk and potential volatility cascades in exchange for liquidatable positions that reflect actual market conditions.</p>
<p>Sophisticated protocols increasingly deploy hybrid risk oracles that combine multiple approaches. These systems might use fundamental exchange rates as a baseline while monitoring market prices, implementing circuit breakers or LTV adjustments when the two diverge significantly, and incorporating freeze guardians that can pause operations during extreme events. Aave's ongoing USDe governance discussions and risk-oracle development work illustrate this trend, moving from simple fixed ratios toward more dynamic risk management with redemption-based logic and emergency controls.</p>
<h3>Oracle Attack Vectors and Defense Mechanisms</h3>
<p>Oracle failures have caused some of DeFi's largest losses, making understanding attack patterns essential.</p>
<p>#### Common Attack Vectors</p>
<p>Flash loan price manipulation represents a frequent attack vector where attackers use flash loans to manipulate prices in thin liquidity pools, then use these inflated prices as collateral to borrow from lending protocols. The entire attack and profit extraction happens in a single transaction, highlighting how atomic transactions can amplify risks.</p>
<p>Stale price exploitation occurs when oracles fail to update during volatile periods, allowing attackers to exploit gaps between oracle prices and market reality. More subtle attacks use callbacks and reentrancy to manipulate prices within the same transaction that consumes them, bypassing simple time-weighted average protections.</p>
<p>#### Defense Layers</p>
<p>Robust protocols implement multiple defense mechanisms. Staleness checks reject prices older than specified thresholds. Circuit breakers pause operations when prices move too dramatically. Medianization uses multiple oracle sources and takes median values to resist outliers. Read-only reentrancy guards prevent price manipulation through callbacks. Time-weighted averages smooth out short-term manipulation attempts.</p>
<p>#### Practical Considerations</p>
<p>When oracle design is inadequate, even the most robust protocol logic becomes vulnerable. The March 2023 USDC depeg provided a stress test of how protocols handle extreme oracle challenges. Curve's 3pool worked mathematically as designed but couldn't prevent liquidity flight during the crisis. This underscores why understanding oracle architecture and failure modes matters as much as understanding the protocols themselves.</p>
<p>Before depositing into any lending protocol, research its oracle configuration for each supported asset. Understand whether prices come from internal exchange rates, fixed relationships between stablecoins, direct DEX pools, or aggregated market feeds. Assess the liquidity backing any market-reliant oracles. Consider what happens if an asset depegs, loses liquidity, or faces redemption failures. The oracle design determines whether you face manipulation risk, bad debt risk, or some combination thereof, and whether the protocol has guards in place to handle edge cases.</p>
<h3>Flash Loans: Double-Edged Innovation</h3>
<p>Flash loans represent one of DeFi's most innovative and dangerous features, having powered both groundbreaking financial operations and some of the ecosystem's most damaging hacks. Understanding their mechanics reveals the fundamental tension of atomic composability.</p>
<p>Flash loans allow borrowing up to the available liquidity and/or protocol-set limits in a pool, using it within a transaction, and repaying it plus a fee before the transaction completes. If repayment fails, the entire transaction reverts as if it never happened. This is only possible because of Ethereum's atomic transaction execution (Chapter II), where all operations within a transaction either succeed together or fail together. This mechanism enables capital-efficient operations impossible in traditional finance.</p>
<p>However, flash loans are limited to a single transaction on one chain or L2. Cross-chain "flash" behaviors rely on bridges and trust assumptions, making them not truly atomic end-to-end.</p>
<p>Legitimate use cases include arbitrage across exchanges without holding capital, collateral swaps in lending protocols executed atomically, liquidations where liquidators can liquidate positions and immediately sell collateral, and refinancing to move debt between protocols in single transactions.</p>
<p>The dark side emerges when flash loans amplify other vulnerabilities. As detailed in the previous section on oracles, flash loans are a primary tool for amplifying price manipulation attacks, enabling attackers to manipulate thin liquidity pools with borrowed capital and exploit those distorted prices in lending protocols, all within a single atomic transaction.</p>
<p>Complex exploit chains leverage flash loans to provide capital for multi-step attacks that would otherwise require significant upfront investment. While attackers remain bounded by pool liquidity, per-asset caps, and per-transaction gas limits, these constraints often still allow for substantial damage.</p>
<p>Beyond price oracles, flash loans can facilitate governance-related attacks, such as borrowing voting power when governance systems aren't snapshot- or anti-flash-loan-hardened.</p>
<p>Protocol defenses require multiple layers of safeguards. First, implement the checks-effects-interactions pattern and apply reentrancy guards with appropriate granularity, typically on externally callable, state-changing entry points. Overly broad or global guards can hinder intended callbacks, though they may be acceptable for some contracts. The key is preserving intended composability while blocking unsafe reentrancy.</p>
<p>Oracle protections form another critical defense layer. Use multi-block TWAPs (time-weighted average prices) or medians sourced from venues that cannot be dominated within a single block, such as Chainlink. Incorporate independent data sources with staleness checks. While using only previous-block prices can help, this approach is brittle around reorgs or thin markets. Where feasible, prefer market-scoped circuit breakers, escalating to protocol-wide pauses for systemic issues.</p>
<p>Additional protective measures include isolation modes with debt ceilings and supply/borrow caps per asset. Conservative LTV (loan-to-value) ratios and liquidation thresholds provide further safeguards. Implement per-block rate limits on oracle consumers and slippage checks with minimum-out protections on DEX operations within transactions.</p>
<p>Flash loans exemplify DeFi's core tension: the same composability that enables innovation also amplifies risks. They don't create vulnerabilities but rather amplify existing ones, requiring protocols to be designed securely even when attackers have substantial capital available within the constraints of pool liquidity and transaction limits.</p>
<p>Fees are typically small but not uniform, some protocols set or dynamically adjust them, which can render thin arbitrage opportunities unprofitable, providing some natural economic protection. Some tokens also support flash minting (mint and burn within a single transaction), which functions similarly to a flash loan for that specific token.</p>`
},

slug: "alt-ch08", section: "alt-ch08", title: "Chapter 8: MEV",
body: `<p>Control over transaction ordering creates and redistributes value on-chain. This chapter explores who extracts that value, how it impacts regular users, and what protections exist to return value or reduce harm.</p>`
},
{
slug: "alt-ch08-s1", section: "alt-ch08", title: "Section I: MEV Fundamentals",
body: `<p>Picture a busy marketplace with a peculiar setup. A big whiteboard where everyone must post their intended purchases before they can buy anything. A trader writes "buying 10 tomatoes from Stall A," and suddenly chaos erupts.</p>
<p>A fast-moving reseller spots the order, sprints to Stall A, buys the tomatoes first, then offers them back to the trader at a markup. Another reseller notices the trader is about to make a large purchase that will drive up tomato prices, so they buy just before the trader and sell immediately after, pocketing the price difference the trade created. Meanwhile, the market manager starts auctioning off the right to decide who gets served first: whoever pays the highest tip jumps to the front of the line.</p>
<p>This market chaos mirrors exactly what happens in the mempool, the public waiting area where transactions sit before being added to the blockchain (introduced in Chapter I for Bitcoin and Chapter II for Ethereum). While both networks use mempools, MEV primarily manifests on Ethereum and other smart contract platforms where complex DeFi transactions create extraction opportunities. The environment resembles what researchers call a "dark forest," borrowing from Liu Cixin's science fiction novel to describe a place where any visible movement attracts predators. In the mempool, revealing a profitable trade is that visible movement.</p>
<p><strong>Maximal Extractable Value</strong> (MEV) is the profit that emerges from this system. Originally called "Miner Extractable Value" during Ethereum's proof-of-work era, MEV represents revenue extracted beyond standard block rewards and transaction fees by strategically ordering, including, or excluding transactions within blocks.</p>
<p>In our market analogy, the key players have clear roles: <strong>searchers</strong> are the fast-moving resellers scanning for opportunities, <strong>builders</strong> are market managers who construct blocks and bid their value to proposers (validators), and <strong>proposers</strong> are the market owners who choose which manager's arrangement to accept. This relationship has been formalized through auction systems that create a liquid market for block space by essentially letting market managers bid for the right to organize transactions.</p>
<p>The fundamental insight is that MEV arises from controlling transaction visibility and ordering. Some activities, like ensuring prices stay aligned or liquidating bad debt, can stabilize the market. However, the overall effect imposes an implicit tax on regular users through worse execution, while only well-funded professionals with the fastest infrastructure consistently win.</p>
<p>This creates the core tension: how transaction ordering, designed to be neutral infrastructure, becomes a sophisticated value extraction mechanism that threatens the very decentralization it's meant to serve.</p>`
},
{
slug: "alt-ch08-s2", section: "alt-ch08", title: "Section II: How Value Gets Extracted",
body: `<h3>Benevolent vs. Malignant MEV</h3>
<p>Before examining specific extraction strategies, we need a framework for evaluating their market impact. Not all MEV harms markets equally, and distinguishing productive from predatory extraction matters for both protocol design and user protection.</p>
<p>Benevolent MEV serves necessary economic functions. CEX-DEX arbitrage keeps execution prices for the same asset roughly aligned across venues, so traders see broadly similar prices wherever they trade once you account for liquidity and fees, rather than some venues being systematically “worse” to trade on. Liquidations preserve the solvency of lending protocols by ensuring under-collateralized positions get closed before they become bad debt that would burden all protocol users. These activities extract value, but they also deliver clear benefits: tighter price spreads and healthier lending markets.</p>
<p>Malignant MEV extracts value without providing commensurate benefits. <strong>Sandwich attacks</strong> exemplify this: the victim pays more, the searcher profits, and the market gains nothing. This is pure wealth transfer enabled by privileged information and ordering control.</p>
<p><strong>Just-in-time liquidity</strong> demonstrates this ambiguity. When searchers see a large trade pending, they quickly add liquidity to the relevant pool just for that block, capture the swap fees from executing the trade, and then remove their liquidity in the next block. On one hand, this provides liquidity exactly when needed and can reduce slippage for the trader. On the other hand, it crowds out passive liquidity providers who can't compete with such precision, potentially degrading liquidity depth over time.</p>
<p>Similarly, oracle updates create another ambiguous MEV channel. When a price feed like Chainlink posts a new price on-chain, searchers try to <strong>back-run</strong> that update by placing their arbitrage trade in the very next transaction. They use the fresh quote to trade against AMMs or perpetual futures that are still priced off the old level, snapping prices back into line. The system benefits from faster price correction, but in practice the profits accrue almost entirely to specialized operators with the fastest infrastructure.</p>
<p>The key distinction isn't whether value gets extracted (it always does), but whether that extraction serves a necessary function or merely exploits information and ordering advantages. This framework helps us evaluate the strategies that follow.</p>
<h3>MEV Extraction Strategies</h3>
<p>From this chaos emerged a hierarchy of exploitation strategies, each more sophisticated than the last. Arbitrage, as described above, sits at the benevolent end. But when competition heats up, searchers get more aggressive.</p>
<p>They start <strong>front-running</strong>, which means copying a trader's transaction but paying extra to go first. For example, when a trader spots an arbitrage opportunity where they can buy ETH for $3,000 on one DEX and immediately sell it for $3,050 on another, a bot sees the pending transaction and submits the exact same trade with a higher fee to jump ahead in line, capturing that $50 profit before the original trader can.</p>
<p>Understanding why these strategies work requires recalling how AMMs function (covered in Chapter VII). The deterministic pricing curves mean the price impact of any proposed swap can be calculated in advance. Combined with the public mempool where transactions sit before inclusion, searchers can see a pending trade, estimate exactly how far it will move the price, and position their own transactions around it. Predictable pricing, visible intent, and reorderable transactions create a perfect environment for extraction.</p>
<p>Consider a representative sandwich attack. A trader submits a transaction to swap ETH for USDC on Uniswap. A searcher's bot detects this pending transaction in the mempool and immediately constructs a three-transaction bundle. First, the bot front-runs by buying USDC using ETH, which pushes the pool price higher. Then the victim's trade executes at this inflated price, receiving significantly less USDC than expected based on the original pool state. Finally, the bot back-runs by immediately selling its USDC position back to the pool. As the price settles back down, the bot exits with a profit after accounting for fees and slippage.</p>
<p>The trader pays an invisible tax for revealing their intent publicly. The bot risks minimal capital (the trade bundle either executes atomically or reverts entirely) while extracting pure profit. This single transaction illustrates the MEV extraction dynamic in miniature: sophisticated actors use privileged information about pending transactions to extract value from regular users through strategic positioning and timing.</p>
<p>Beyond price manipulation, liquidations represent another MEV category. Lending protocols (such as Aave, discussed in Chapter VII) set collateral ratios that are safe at the time of borrowing, and positions only become liquidatable when market moves push collateral value down (or debt value up) enough that they fall below the liquidation threshold. When an oracle update reflects that new price, searchers race to be first to repay part of the debt, seize a slice of the collateral, and collect the liquidation bonus. In practice they often back-run oracle updates by placing their liquidation transactions immediately after the price feed update in the same block. Unlike sandwiching, this competition serves a necessary function by clearing under-collateralized positions and keeping the protocol solvent, but it still turns user stress events into MEV auctions and concentrates rewards in the fastest operators.</p>
<p>Priority-gas-auction bidding historically spiked gas costs as bots competed for transaction priority; today much of that competition is off-chain via specialized auction systems where searchers bid for transaction ordering rights, reducing broad mempool fee spikes but often shifting costs into worse execution for users or rebates captured by intermediaries. This harm is far from theoretical. Every sandwich attack represents value directly transferred from a user to a well-capitalized operator, even if the fee externalities now appear less in the public mempool and more in private routing markets.</p>
<h3>How Users Can Protect Themselves</h3>
<p>Given the MEV extraction landscape described above, what practical steps can users take? When submitting transactions to public mempools, assume exploitation is likely.</p>
<p>The first line of defense is setting tight slippage tolerances to control how much worse a price you will accept. Starting with 0.5 to 1 percent works for most trades, though tokens with low liquidity may still be vulnerable. Setting tolerances too tight, below 0.3 percent, risks failed transactions during normal market swings.</p>
<p>Private transaction routing offers stronger protection. Services like Flashbots Protect route transactions through private channels instead of broadcasting them to the public mempool. This shields your intent until inclusion, protecting against front-running and sandwich attacks. Failed transactions through these services typically do not cost fees, and some services rebate part of the MEV they help you avoid. The tradeoff is weaker propagation: your order depends on a smaller set of relays and builders rather than the full public network, so inclusion can be less predictable.</p>
<p>Batch auction systems provide protection through mechanism design rather than just hiding intent. CoW Swap groups orders into batches and uses competitive solvers to find the best execution paths (as introduced in Chapter VII's intent-based systems section), which prevents sandwich attacks that rely on sequential processing. UniswapX uses a declining-price auction where parties compete to fill orders at progressively better prices for the user. Both approaches make extraction structurally harder.</p>
<p>For large trades, splitting orders across multiple blocks reduces per-trade price impact and makes sandwich attacks less profitable. Time-weighted average price strategies, covered in Chapter VI, break trades into smaller pieces executed over time. Combining this approach with private routing or batch auctions provides layered protection.</p>
<p>Some platforms build protection directly into their design. Encrypted-mempool systems like Shutter Network keep transaction contents hidden until ordering is fixed, making frontrunning much harder. Over time, Uniswap v4 may add MEV-aware features like dynamic fees or anti-sandwich protections at the pool level.</p>
<p>The goal is not complete MEV elimination, which is impossible, but making extraction harder and less profitable. These protections help against sandwich attacks but cannot stop all MEV types. The battle constantly evolves as new attack methods emerge.</p>
<h3>A Warning About "Easy Money"</h3>
<p>Observing the profitability of MEV extraction, some newcomers wonder whether they should become searchers themselves. A reality check: being a searcher is not free money. Winning priority requires paying fees and accepting price impact, and poorly calibrated attempts often lose money. Because AMM pricing makes each additional unit more expensive to buy, naive bots frequently donate value to professional searchers, builders, and validators when they misjudge fees or slippage. Without precise simulation and risk controls, frontrunning or sandwich attempts often overpay for execution and end up losing rather than extracting value.</p>`
},
{
slug: "alt-ch08-s3", section: "alt-ch08", title: "Section III: Flashbots: Taming the Dark Forest",
body: `<p>These user-facing protections emerged partly because the industry recognized that individual defenses alone weren't enough. By 2020, Ethereum faced exactly this market chaos at scale. The priority gas auctions described earlier were creating network congestion, while miners were capturing MEV through opaque, off-chain deals that favored well-capitalized participants.</p>
<p>Enter Flashbots, a research organization founded in 2020 with a radical proposition: instead of trying to eliminate MEV, create transparent infrastructure to make it more fair and efficient. Their insight was that the current system was wasteful, and that channeling extraction through better infrastructure could reduce harm.</p>
<h3>MEV-Geth and the First Solution</h3>
<p>In January 2021, Flashbots released MEV-Geth, a modified Ethereum client that let miners accept transaction bundles over a private Flashbots channel instead of only from the public mempool. Rather than spamming ever-higher gas bids in priority gas auctions, searchers could submit bundles directly to miners running MEV-Geth. Miners simulated and ranked these bundles and included the most profitable ones in their blocks. This moved most of the competition off-chain, cutting down on bidding wars in the public mempool while still letting professional searchers compete for MEV opportunities.</p>
<h3>The Transition to Proof-of-Stake</h3>
<p>When Ethereum moved to proof-of-stake in September 2022 (a transition detailed in Chapter II), the entire MEV landscape needed rebuilding. Flashbots developed <strong>MEV-Boost</strong>, an open-source middleware that provides <strong>Proposer-Builder Separation</strong> (PBS), a design where specialized builders construct blocks and validators simply choose which block to propose, rather than validators doing both jobs themselves. This expanded the builder-validator relationship introduced earlier into a full competitive marketplace via relays. As of early 2026, approximately 90% of Ethereum blocks are built via MEV-Boost.</p>
<p>This separation currently exists outside Ethereum's core protocol, implemented through MEV-Boost rather than built into the blockchain itself. Researchers continue working on enshrined PBS, which would make proposer-builder separation a native part of Ethereum, but that work remains in development.</p>
<h3>How MEV-Boost Works</h3>
<p>This process is facilitated by trusted entities called <strong>relays</strong>. Relays act as a neutral escrow and auctioneer: builders send them full blocks, and the relay verifies their validity and bid. The relay then forwards only the block header and the bid to the proposer (validators are also called proposers in this context). The proposer chooses a header without seeing the block’s contents, preventing them from stealing the MEV opportunity. The system evolved from individual miners making direct deals to a sophisticated auction where multiple builders compete for validator selection, with relays facilitating the bidding process.</p>
<p>These trust assumptions are not just theoretical. In April 2023, a validator exploited a vulnerability in MEV-Boost and relay handling to “unbundle” private bundles, copy profitable MEV transactions, and siphon more than $20 million from other searchers in a single block. The episode triggered urgent client patches and became the basis for the first high-profile U.S. criminal case about MEV infrastructure: in 2024, federal prosecutors charged two MIT-educated brothers with wire fraud and money laundering for allegedly orchestrating the exploit, with the case still being litigated as of early 2026\\. Whatever one thinks of the legal theory, it underscored that MEV relays and builders are no longer just technical plumbing but also legal and regulatory attack surfaces.</p>
<h3>Expanding User Protection</h3>
<p>Recognizing that infrastructure alone was not enough, Flashbots also launched the user-facing protection service mentioned earlier: Flashbots Protect. By routing transactions through private channels that bypass the public mempool, ordinary users gain protection from sandwich and frontrunning attacks while potentially receiving rebates from captured MEV. These transactions still compete in the builder auction but are never exposed to public mempool predation.</p>
<p>The Flashbots approach represents a pragmatic philosophy: given that extraction is baked into how ordering markets function, the goal should be making it transparent, efficient, and less harmful. Rather than fighting the economic forces, they built infrastructure to channel them constructively. However, this infrastructure-based solution revealed an uncomfortable truth: organizing MEV markets efficiently also created powerful chokepoints that concentrated control in unexpected ways.</p>`
},
{
slug: "alt-ch08-s4", section: "alt-ch08", title: "Section IV: The Centralization Crisis",
body: `<p>Despite Flashbots' innovations, the MEV ecosystem faces a fundamental challenge: concentration of power among a small number of operators.</p>
<p>The extent of this concentration becomes clear when examining recent data. In October 2024, just two builders produced 90% of blocks over a two-week period. From October 2023 through March 2024, three builders controlled approximately 80% of MEV-Boost blocks. During this same timeframe, a significant share of blocks, often around 60%, were relayed via OFAC-compliant infrastructure (adhering to U.S. Office of Foreign Assets Control sanctions). The pattern is unmistakable: these high barriers to entry have consolidated power among a handful of operators, directly undermining blockchain's decentralized principles.</p>
<p>The relay layer introduces additional centralization concerns. Because only a handful of trusted relays dominate the market, their compliance decisions (such as filtering transactions to adhere to OFAC sanctions) can have network-wide effects. These supposedly neutral intermediaries become powerful chokepoints that shape which transactions actually make it into blocks regardless of individual validator preferences. The choice of which relays to trust can determine transaction inclusion, making censorship resistance vulnerable to a small set of gatekeepers.</p>
<h3>Responses to Centralization</h3>
<p>The concentration revealed by these metrics made clear that MEV-Boost alone couldn't solve the centralization problem. The relay layer remained a chokepoint, and builder concentration continued unabated. The industry needed more fundamental restructuring.</p>
<p>In November 2024, major players launched BuilderNet, a decentralized block-building network jointly operated by Flashbots, Beaverbuild, and Nethermind. BuilderNet uses specialized hardware that creates secure enclaves where code runs in isolation, even from the machine's owner. This technology enables multiple operators to share transaction order flow and coordinate block building while keeping contents private until finalization, since no single party can see or manipulate the data being processed.</p>
<p>The goal is to create a more transparent and permissionless system for MEV distribution, replacing the opaque, custom deals that currently define the market. Beaverbuild has already begun transitioning its centralized builder to this network, with additional permissionless features planned for future releases.</p>
<p>Beyond BuilderNet, the ecosystem has developed several complementary approaches to combat centralization and return value to users.</p>
<p>One approach focuses on returning value directly to users. <strong>Order flow auctions</strong> let users auction off their transaction flow to the highest bidder, potentially earning rebates from the MEV their trades create. The private routing solutions discussed earlier represent one implementation, while encrypted mempools hide transaction details until execution.</p>
<p>At the protocol level, researchers are exploring ways to distribute MEV rewards more evenly across validators rather than letting them concentrate among the fastest operators. Enshrined PBS would build the proposer-builder separation directly into Ethereum's protocol rather than relying on external infrastructure like MEV-Boost.</p>
<p>More advanced attacks also require attention. <strong>Time-bandit attacks</strong>, where validators attempt to reorganize recent blocks to capture MEV, are constrained by stronger finality guarantees under proof-of-stake, though related attack vectors remain an active research concern.</p>
<p>While these solutions show promise, results in practice remain mixed, and the arms race between MEV extraction and protection continues to evolve.</p>`
},
{
slug: "alt-ch08-s5", section: "alt-ch08", title: "Section V: The Cross-Domain Challenge",
body: `<p>But even as these solutions emerge for single-chain MEV, a far larger threat looms. Just as the industry began addressing extraction within individual blockchains, a new challenge emerged that threatens to dwarf the current problems.</p>
<p><strong>Cross-Domain MEV</strong> represents extraction strategies that span multiple blockchains simultaneously, exploiting price differences and timing advantages across separate domains.</p>
<p>This is not theoretical. Advanced searchers are already executing arbitrage and other strategies across different blockchains, exploiting price differences between DEXs on separate networks. The timing and latency of blockchain bridges become critical factors, enabling complex, multi-block MEV strategies that are even harder to mitigate than their single-chain counterparts.</p>
<p>Researchers warn it could pose severe risks (sometimes described as 'existential') to decentralization. If specialized participants gain control over transaction ordering across multiple domains, the centralization pressures described earlier could compound exponentially. The cross-domain nature makes coordination harder and value extraction more opaque, potentially creating a new class of MEV that's both more profitable and more harmful to users.</p>
<p>The fundamental challenge: as the ecosystem grows and interconnects, each new bridge, each new chain, each new connection creates fresh opportunities for value extraction. The solutions that work for single-chain MEV (batch auctions, private orderflow, fair ordering) become exponentially more complex when they must coordinate across multiple domains with different consensus mechanisms, block times, and economic models.</p>`
},
{
slug: "alt-ch09", section: "alt-ch09", title: "Chapter 9: Stablecoins & RWAs",
body: `<p>The promise of cryptocurrency was always bigger than speculation, it was about rebuilding financial infrastructure from first principles. Nowhere is this transformation more visible than in the evolution of stablecoins and tokenized real-world assets. What began as experimental attempts to create "digital dollars" has matured into institutional-grade infrastructure handling trillions in annual volume and attracting Wall Street giants like BlackRock.</p>`
},
{
slug: "alt-ch09-s1", section: "alt-ch09", title: "Section I: Types of Stablecoins",
body: `<p>Stablecoins maintain their value through four distinct mechanisms, each offering different trade-offs between security, yield generation, and decentralization. The most established approach involves <strong>fiat-backed stablecoins</strong> (such as USDT and USDC), which maintain their <strong>peg</strong> by holding cash or cash equivalents such as treasuries and short-term government bonds in 1:1 proportion to circulating supply. Traditional fiat-backed stablecoins like USDT and USDC do not pass the interest they earn down to holders and instead keep it as revenue.</p>
<p>A second category, crypto-backed stablecoins like USDS from Sky (examined in detail in Chapter VII), uses other cryptocurrencies as collateral. These systems typically require <strong>overcollateralization</strong> where crypto holdings exceed the stablecoin's value to account for inherent asset volatility. This approach trades capital efficiency for the benefit of remaining within the cryptocurrency ecosystem.</p>
<p>More sophisticated synthetic stablecoins have emerged, exemplified by USDe from Ethena (discussed in Chapter VII's yield generation section). These maintain stability through automated hedging strategies using perpetual futures (detailed in Chapter VI) to offset the price movements of their underlying crypto assets. By holding crypto collateral while simultaneously taking short positions that profit when prices fall, these stablecoins neutralize volatility. They can also generate yield from funding rates, the periodic payments that flow between traders holding long and short positions in derivatives markets.</p>
<p>A new type of stablecoins, sometimes called "yieldcoins" (such as USDY from Ondo), uses the same backing mechanism as fiat-backed stablecoins but passes earned interest to holders, effectively creating tokenized money market funds that combine blockchain accessibility with traditional fixed-income returns. The distinction here is business model, not the mechanism for maintaining the peg.</p>
<p>Finally, <strong>algorithmic stablecoins</strong> represent perhaps the most ambitious but ultimately failed experiment in the space. These systems attempted to maintain stability through programmed mechanisms that automatically adjust token supply based on market demand, with no asset reserves. The fatal flaw emerged during confidence shocks: when users rushed to exit, the algorithms minted more of the backing token to maintain the peg, but this dilution crashed the backing token's value, further undermining confidence in the stablecoin and creating a reflexive death spiral where the stabilization mechanism itself accelerated collapse. While worth mentioning from a historical perspective, all major algorithmic stablecoins have failed, with the UST (Luna) collapse serving as the most prominent cautionary tale.</p>
<p>The remainder of this chapter focuses primarily on fiat-backed stablecoins, which dominate the market with over 95% of total stablecoin circulation and have proven most viable for institutional adoption.</p>`

slug: "alt-ch09-s2", section: "alt-ch09", title: "Section II: Fiat Stablecoins",
body: `<p>The dominant stablecoin model emerged from brutal market selection. USDT and USDC, which currently have about a quarter of a trillion dollars in circulation, survived multiple crypto winters by embracing a simple truth: stability requires tangible assets, not algorithmic promises.</p>
<p>These stablecoins maintain their peg through <strong>arbitrage</strong> mechanisms that create profit opportunities whenever price deviates from $1. When a stablecoin trades below $1, arbitrageurs buy the discounted tokens and redeem them from the issuer for exactly $1 worth of backing assets, pocketing the difference. Conversely, when price rises above $1, authorized participants can mint new tokens by depositing $1 of collateral with the issuer, then sell these tokens at a premium. This continuous arbitrage activity pulls the price back toward parity, but only if the underlying reserves and redemption mechanisms remain credible. Combined with strong reserve management, this mechanism has proven to be the winning formula for achieving both scale and institutional adoption.</p>
<h3>USDT</h3>
<p>USDT is a stablecoin issued by Tether and the most widely adopted stablecoin globally, with $187 billion in circulation as of early 2026\\. Since its 2014 launch, Tether faced early challenges around transparency and banking relationships, but the company has since achieved much better compliance and publishes quarterly attestations, which are third-party verifications of its reserves conducted by accounting firm BDO Italia.</p>
<p>Tether generates most of its revenue from yield earned on U.S. Treasury bills, reverse repos, and money market funds. This business model proved highly profitable in 2024, delivering $13 billion in net profit. The company has been reinvesting these profits into long-term growth areas including AI, renewable energy, and communications infrastructure. Tether also maintains approximately $10 billion each in Bitcoin and gold reserves on its balance sheet.</p>
<h3>USDC</h3>
<p>USDC is a stablecoin issued by Circle, a publicly traded company on the NYSE (CRCL). As the second most widely used stablecoin, USDC has $75 billion in circulation and Circle has established a strong reputation for transparency and regulatory compliance in the U.S.</p>
<p>Circle maintains its reserves primarily in the BlackRock-managed Circle Reserve Fund, a government money market fund, along with cash holdings. The company has demonstrated its commitment to transparency by publishing monthly assurance reports conducted by Deloitte since 2022\\.</p>
<p>Unlike Tether, Circle reported relatively modest profits of $156 million in 2024\\. This is partly explained by the revenue-sharing arrangement between Circle and Coinbase for USDC interest income: each platform retains 100% of the interest generated by USDC held on its own platform, while they split the interest from off-platform USDC holdings equally.</p>
<h3>PYUSD</h3>
<p>PayPal USD (PYUSD) is a stablecoin issued in collaboration between PayPal and Paxos. PYUSD can be used on PayPal or Venmo, and it is issued on Ethereum, Solana, and Arbitrum. There are no fees for transactions within PayPal. PYUSD is much smaller than USDT and USDC and currently has $1.4 billion in circulation.</p>
<h3>EUR Stablecoins</h3>
<p>EUR stablecoins remain negligible compared to their USD counterparts, representing less than 1% of the total stablecoin market. The two largest EUR stablecoins are EURC (Circle) with approximately $220 million in circulation and EURS (Stasis) with around $120 million. This disparity stems from the U.S. dollar's global dominance in international trade and finance, which naturally extends to crypto where USD-denominated assets have broader acceptance across centralized exchanges, decentralized exchanges, and DeFi protocols. The EU's MiCA regulation, discussed below, has compounded this structural advantage by creating additional compliance barriers that deter both issuers and users.</p>
<h3>Regulations</h3>
<p>While fiat-backed stablecoins are issued on permissionless blockchains, the assets themselves operate under existing financial regulations. They can be frozen if illegal activity is suspected, and Know Your Customer (KYC) protocols are required for both redemptions and new issuances. This hybrid model, combining blockchain efficiency with regulatory compliance, has enabled stablecoins to achieve both scale and institutional adoption while remaining subject to evolving regulatory frameworks across different jurisdictions.</p>
<p>#### United States</p>
<p>In the U.S., stablecoins are now governed by The GENIUS Act, which was signed into law in July 2025 and establishes a comprehensive regulatory framework for USD stablecoins. Only "permitted issuers" may issue stablecoins to U.S. people, specifically subsidiaries of insured banks, federally qualified issuers supervised by the Office of the Comptroller of the Currency, or state-qualified issuers (capped at $10 billion outstanding). Issuers must maintain strict 1:1 reserves in approved assets (USD cash, bank deposits, short-term Treasuries, and similar instruments), publish monthly reserve reports with independent accounting examinations, and comply with tailored Bank Secrecy Act and anti-money laundering obligations including customer identification and sanctions compliance.</p>
<p>The law requires issuers to maintain technical capabilities to block or freeze tokens pursuant to lawful orders, prohibits paying interest on the stablecoins themselves, and bars marketing that implies U.S. government backing. Foreign-issued stablecoins are generally prohibited unless Treasury deems the home country's regulatory regime comparable and the issuer meets additional U.S. requirements. The framework becomes effective by January 18, 2027 (or 120 days after final regulations), with a three-year phase-out period after which U.S. digital asset service providers cannot offer non-compliant payment stablecoins. Importantly, compliant stablecoins are not classified as securities or commodities, and stablecoin holders receive priority claims on reserves in issuer insolvency proceedings.</p>
<p>In September 2025, Tether announced the launch of USAT, a new U.S.-regulated stablecoin designed to comply with GENIUS Act. USAT will leverage Anchorage Digital as the federally regulated issuer and Cantor Fitzgerald as the reserve custodian.</p>
<p>#### European Union</p>
<p>Under the EU Markets in Crypto-Assets (MiCA) regulation, single-currency stablecoins are classified as e-money tokens (EMT) and subject to stringent reserve requirements designed to ensure liquidity and systemic stability. Standard EMT issuers must hold at least 30% of their reserves as deposits with EU-authorized credit institutions, with the remainder in high-quality liquid assets. However, "significant" tokens, those with higher systemic risk and potential monetary policy impact, face elevated requirements, including a 60% deposit floor and enhanced supervision by the European Banking Authority. This tiered approach reflects regulators' concern about redemption runs and contagion effects from larger stablecoin operations.</p>
<p>The framework also incorporates operational safeguards and concentration limits to prevent over-reliance on single institutions. Issuers must distribute deposits across multiple EU banks (often requiring six or more banking partners for significant EMTs), maintain formal liquidity management policies, conduct regular stress testing, and keep reserves segregated with detailed reporting to supervisors. Notably, while euro-denominated EMTs face no usage restrictions, non-EUR stablecoins are subject to means-of-exchange caps, if their daily transaction volume exceeds 1 million transactions or €200 million in any EU currency area, issuers must halt new issuance until compliance is restored. This regulatory architecture effectively anchors stablecoin liquidity to the EU banking system while maintaining supervisory control and limiting systemic exposure.</p>
<p>Circle achieved full MiCA compliance in July 2024 through a French Electronic Money Institution license, allowing both USDC and EURC to operate in the EU. Circle chose to comply to gain mainstream acceptance and regulatory clarity. Despite complying, Circle has also critiqued certain MiCA reserve requirements, particularly high bank deposit mandates, as introducing unnecessary bank risk, showing Circle supports the framework's clarity and market access while advocating for refinements to specific prudential details.</p>
<p>Tether chose not to comply with MiCA and exchanges had to delist or restrict USDT in the EU. The company said that it wouldn't comply primarily because the requirements for stablecoins to hold at least 60% of reserves in EU bank deposits creates "systemic risk" and makes both stablecoins and banks less safe than holding short-term U.S. Treasuries. Tether believes that bank deposits are inherently more fragile since banks re-lend them (citing the SVB/USDC incident as evidence), while Treasuries offer superior safety and liquidity as reserve assets. Additionally, Tether views MiCA's bank concentration limits and operational requirements as adding unnecessary complexity and risk, while the broader EU restrictions on non-euro stablecoin usage are seen as hostile to dollar-denominated stablecoins' everyday use in Europe.</p>
<h3>De-pegging risks</h3>
<p>Despite their robust stabilization mechanisms, fiat-backed stablecoins still face de-pegging risk, the failure to maintain 1:1 parity with the underlying asset. This risk is fundamentally tied to reserve-confidence shocks, where doubts about reserve quality or accessibility can trigger a crisis of confidence. When users lose faith in a stablecoin's backing, they rush to sell their holdings for BTC, ETH, or fiat currencies, creating intense selling pressure that pushes the token's market price below $1 until redemptions and arbitrage activities restore parity.</p>
<p>The March 2023 U.S. banking crisis (also discussed in Chapter VII's Curve section) provided a clear example of this dynamic. After Circle disclosed that approximately $3.3 billion of USDC's cash reserves was held at the failing Silicon Valley Bank, the stablecoin fell as low as $0.87 on March 11, 2023\\. This episode demonstrated how interconnected stablecoins are with legacy banking infrastructure and how external banking issues can directly impact stablecoin stability. The price recovered after the joint Treasury/Fed/FDIC statement on March 12, 2023 backstopped deposits and Circle resumed redemptions on March 13\\.</p>
<p>USDT experienced its most severe de-pegging crisis in October 2018 with intraday lows as low as $0.86 amid a perfect storm of banking and confidence issues. The crisis was precipitated by reports that Noble Bank, a key banking partner that had serviced Tether and Bitfinex in Puerto Rico, was seeking a buyer and had lost clients, with both Tether and Bitfinex reportedly looking elsewhere for banking support.</p>
<p>These episodes illustrate how banking infrastructure problems create feedback loops. Concerns about redemption capacity can fuel panic selling, effectively creating digital bank runs. These crises only resolve once normal banking relationships and redemption processes are restored. The interconnected nature of stablecoin reserves with incumbent banking systems means that external financial sector stress can directly threaten the stability mechanisms these tokens rely upon.</p>
<h3>Use Cases</h3>
<p>Stablecoins have become core crypto plumbing, accounting for more than 50% of global crypto transaction value each year. Visa estimates approximately $5.7 trillion in stablecoin settlement volume in 2024, after adjusting for artificial volume from bots and fake trades designed to inflate activity metrics. This massive scale demonstrates that stablecoins have evolved far beyond their origins as trading instruments to become genuine payment and transfer infrastructure. They have proven especially valuable in regions where legacy financial systems are inadequate, restricted, or unreliable.</p>
<p>#### Trading and Arbitrage</p>
<p>Trading and arbitrage remain the dominant applications, with arbitrage activity highly concentrated among a small set of professional firms. Market makers maintain capital reserves in USDT and USDC, positioning themselves to quickly capitalize on price differences across centralized exchanges, decentralized exchanges, and different geographic regions.</p>
<p>#### Cross-Border Payments and Remittances</p>
<p>Beyond trading, cross-border payments and remittances represent one of stablecoins' most transformative applications. The cost advantages are substantial: sending a $200 remittance from Sub-Saharan Africa costs approximately 60% less using stablecoins compared to traditional fiat-based methods. This dramatic cost reduction makes stablecoins attractive to migrant workers and underbanked populations. Strong adoption has followed in Latin America and Sub-Saharan Africa, where stablecoins provide both a hedge against local currency volatility and practical access to USD-denominated value. Geographic adoption data shows these regions experiencing over 40% year-over-year growth in retail and professional-sized stablecoin transfers.</p>
<p>#### Store of Value in High-Inflation Regions</p>
<p>Stablecoins also serve as a critical store of value in regions facing economic instability or high inflation. They allow individuals and businesses to preserve purchasing power when local currencies become unreliable. This use case has proven especially significant in countries experiencing monetary instability, where stablecoins often trade at premiums reflecting users' willingness to pay for stability and faster money movement. Turkey leads the world in stablecoin trading volume as a percentage of GDP. Meanwhile, countries across the Middle East and North Africa are seeing stablecoins capture larger market shares than traditionally dominant cryptocurrencies like Bitcoin and Ethereum.</p>
<p>#### Institutional Adoption</p>
<p>The institutional adoption of stablecoins has reached new heights. Banks and financial institutions increasingly integrate them into operations for liquidity management, settlement mechanisms, and as entry points into cryptocurrency markets. Major payment processors including Stripe, Mastercard, and Visa have launched products enabling users to spend stablecoins through conventional payment rails. This infrastructure has enabled cross-border investment applications through tokenized assets. Investors now swap into stablecoins to access tokenized U.S. Treasury funds like Franklin's BENJI, BlackRock's BUIDL, and Ondo's OUSG, enabling 24/7 settlement capabilities. (These tokenized treasuries are discussed in more detail in Section II of this chapter.)</p>
<p>#### Looking Forward</p>
<p>While trading and arbitrage continue to dominate global stablecoin flows, the infrastructure is expanding into broader economic applications. The significant growth in retail usage across high-inflation economies, combined with emerging institutional applications through tokenized assets, signals an important shift. Stablecoins are transitioning from primarily serving sophisticated financial players toward becoming genuine alternatives to incumbent banking systems, especially in regions where legacy infrastructure fails to meet local needs.</p>`
},
