<p>The EVM operates as a stack-based virtual machine, processing instructions like a stack of plates where you can only add or remove from the top. It uses low-level instructions called opcodes. These include operations like ADD, MULTIPLY, STORE, and CALL. When developers write smart contracts in high-level languages like Solidity or Vyper, compilers translate that code into EVM bytecode (a series of opcodes) that every Ethereum node can execute. This standardization ensures contracts behave identically whether running in New York, Singapore, or Dubai.</p>
<p>What distinguishes the EVM is its combination of deterministic execution with persistent state management. Every smart contract maintains its own storage space where it saves data between transactions. When someone interacts with a contract, like swapping tokens on Uniswap or borrowing from Aave, the EVM executes the relevant bytecode, reads and writes to storage, and updates account balances. Every node independently performs these same computations and verifies they reach identical final states. This process creates <strong>decentralized consensus</strong>: Ethereum becomes trustworthy without requiring trust in any single party, since thousands of independently run nodes all verify the same results.</p>
<p>Each operation consumes <strong>gas</strong>, a fee measured in computational work. Gas serves two critical purposes: it compensates node operators for executing computations and prevents spam by making every operation cost something. More complex operations require more gas, which explains why simple transfers cost less than deploying intricate smart contracts. This metering ensures no transaction runs indefinitely, mitigating resource-exhaustion attacks.</p>
<p>The gas mechanism aims to price operations roughly in line with their actual resource usage. Early attacks exploited underpriced operations, prompting Ethereum to adjust opcode costs over time. These adjustments increased prices for operations that proved too cheap relative to their computational demands, reducing opportunities for denial-of-service attacks and better reflecting underlying resource costs.</p>
<p>The EVM has evolved into a de facto standard extending far beyond Ethereum itself. Most <strong>rollups</strong> (Arbitrum, Optimism, Base) and many alternative L1s have adopted EVM compatibility, meaning they execute the same bytecode. This compatibility creates enormous value: applications like Uniswap and Aave deploy to these networks with minimal changes, while the entire infrastructure ecosystem (wallets like MetaMask, block explorers, developer tools, indexers) functions almost identically across EVM chains. New blockchains can bootstrap activity by inheriting Ethereum's mature tooling and attracting existing users and developers without requiring them to learn new paradigms. These network effects reinforce Ethereum's dominance.</p>
<p>This computational model explains Ethereum's scaling challenges. Since every full node replays every transaction in order, Ethereum functions as a globally replicated computer. Protocol parameters like gas limits and block times must remain conservative enough for ordinary machines to keep up. Pushing more computation on-chain risks raising hardware requirements and eroding the decentralization that makes the network secure.</p>
<p>Rollups and other scaling solutions address this constraint by moving most execution off Ethereum while using the base layer primarily for data availability and final settlement. They batch many off-chain transactions together, posting only compressed data and (in some designs) validity proofs back to Ethereum. This allows many users to share the gas cost of a single L1 transaction, dramatically lowering fees and increasing effective throughput while still inheriting Ethereum's security.</p>
<p>Understanding the EVM reveals both Ethereum's power (arbitrary programmable logic secured by neutral consensus) and its limitations. The base layer remains a fully replicated machine where every computation is verified everywhere, making raw throughput fundamentally scarce. Higher scale must therefore come from layering and smarter use of that scarce resource.</p>
<h3>Ethereum's Fee System</h3>
<p>We've seen how the EVM measures computational work in gas. Now let's examine how Ethereum's fee system actually prices that gas and how it evolved to become more user-friendly.</p>
<p>Gas powers Ethereum's computational engine like fuel powers a car. Every operation, from sending ETH to a friend to executing a complex smart contract, consumes a specific amount of this computational fuel. A simple ETH transfer between regular wallets burns through 21,000 units of gas, while interacting with smart contracts requires proportionally more. Swapping tokens on Uniswap might use 150,000 gas, while deploying a new smart contract could consume millions.</p>
<p>When discussing fees, Ethereum users work with specific denominations (unit sizes). While wei represents the smallest possible unit of ether (1 ETH equals 1,000,000,000,000,000,000 wei), fee discussions typically happen in <strong>gwei</strong> (1 gwei equals 1,000,000,000 wei, or one billionth of an ether). This makes gas prices easier to discuss. Instead of saying "the gas price is 50,000,000,000 wei," people say "50 gwei."</p>
<p>A key development came with EIP-1559, which radically transformed Ethereum's protocol-level fee market. Before this August 2021 upgrade, users participated in a chaotic auction system, constantly trying to outbid each other for block space: you guessed a single gas price and hoped it was neither too low nor unnecessarily high. EIP-1559 introduced a new, more predictable default fee mechanism with two components: a dynamically adjusting <strong>base fee</strong> and a user-set tip. Most modern wallets use this mechanism by default. Legacy type-0 "gasPrice" transactions are still supported and behave more like the old auction, so the extra predictability is available but not strictly mandatory for all transactions.</p>
<p>Users set maxFeePerGas (the absolute maximum they'll pay per unit of gas) and maxPriorityFeePerGas (an optional tip to validators for faster inclusion) when submitting transactions. The actual gas price paid is calculated as the minimum of either your maximum fee or the sum of the base fee plus your priority fee. The total transaction cost equals the gas used multiplied by this effective gas price.</p>
<p>Each Ethereum block has a gas limit that defines its capacity: a maximum amount of gas that all transactions in that block can collectively consume. Since EIP-1559, the protocol targets using about half of that limit in each block and treats this target as “100% full” for pricing purposes. When demand spikes, blocks can temporarily expand up to roughly twice the target (up to the gas limit itself), creating so-called elastic blocks.</p>
<p>Historically, Ethereum used a 30 million gas limit (with a 15 million gas target). Since 2024-2025, validators have gradually raised this to around 45 million, and Fusaka’s EIP-7935 standardizes a 60 million default gas limit per block in client configs. The important rule remains the same: the target gas usage is always half the current gas limit, and blocks can stretch up to roughly twice that target during congestion.</p>
<p>The base fee is set algorithmically based on network congestion. When blocks use more than the target amount of gas (more than half the gas limit), the base fee rises by up to 12.5% in the next block. When they use less than the target, it falls by up to the same amount. High demand automatically increases prices; low demand decreases them through this self-balancing mechanism.</p>
<p>The most significant innovation is what happens to fees. Of the total fee paid, the portion covering the base fee (gas used multiplied by the base fee) gets burned, meaning it is destroyed forever and removed from circulation, introducing deflationary pressure on ETH's supply. Only the priority fee (the tip above the base fee) goes to validators. Any unused portion of your maxFeePerGas is refunded, not paid out. This gives users a way to incentivize faster inclusion during busy periods by offering higher tips without permanently overpaying for gas.</p>
<p>During periods of sustained demand, the base fee burn can exceed new ETH issuance from staking rewards, making the overall supply net deflationary (shrinking rather than growing). Higher network usage increases the burn rate, tightening supply and potentially supporting ETH's value. Since The Merge in September 2022, there have been extended periods where ETH supply has been deflationary. However, upgrades like Dencun and EIP-4844 also made L1 gas cheaper, which in turn reduced fee burn. Since 2024 there have been periods where ETH supply has turned net inflationary again despite the burn mechanism.</p>
<p>EIP-1559 reduced fee volatility and dramatically improved user experience by making fees more predictable. Users can set reasonable max fees without worrying about overpaying, and wallets can estimate costs more accurately. Importantly, this change modified how fees work without altering Ethereum's consensus mechanism (the system went through this upgrade during proof-of-work and kept it after transitioning to proof-of-stake). The upgrade introduced new validation rules that all nodes must enforce, including the base fee calculation algorithm and the burning mechanism. However, it didn't address all fee market concerns. Issues like transaction censorship (validators choosing to exclude certain transactions) remain active areas of research, with proposals like inclusion lists (rules forcing validators to include certain transactions) still being developed.</p>
<h3>How Ethereum Identifies Accounts and Assets</h3>
<p>While understanding gas helps users manage transaction costs, knowing how Ethereum identifies accounts and assets is equally important for navigating the ecosystem effectively.</p>
<p>Ethereum's account model differs fundamentally from Bitcoin's UTXO model (explained in Chapter I). Bitcoin tracks ownership through chains of unspent transaction outputs that must be consumed and recreated with each transfer. Ethereum maintains persistent accounts with balances that get updated directly. Think of it like the difference between using cash (UTXOs that get exchanged) versus a bank account (a balance that increases and decreases). This architectural choice enables the complex state management that smart contracts require, allowing contracts to store data and maintain balances across multiple transactions without the complexity of tracking individual UTXOs.</p>
<p>Ethereum has two types of accounts. <strong>Externally Owned Accounts (EOAs)</strong> are regular user wallets controlled by private keys (like hot wallets or hardware wallets). Smart contract accounts are programmable accounts that execute code when triggered. Every participant in Ethereum (whether a person or a smart contract) has a unique address that serves as their public identifier.</p>
<p>These addresses look like cryptographic gibberish: a 40 character string of numbers and letters such as 0x742d35Cc6634C0532925a3b844Bc454e4438f44e. Behind this seemingly random sequence lies mathematics. For EOAs, the address represents the last 20 bytes of a cryptographic hash (a one-way mathematical function) of the account's public key. The public key is derived from your private key, so your address is mathematically linked to your key without revealing it.</p>
<p>The Ethereum Name Service (ENS) addresses this usability challenge by allowing users to register human-readable names like <code>alice.eth</code> that resolve to these hexadecimal addresses. This naming system works similarly to DNS for websites, making it easier to send funds and interact with accounts without copying and pasting long strings of characters.</p>
<p>Smart contracts also receive addresses when they're deployed, generated deterministically from the deployer's address and other parameters.</p>
<p>This distinction between EOAs and smart contracts is beginning to blur. Account abstraction proposals like EIP-7702 (introduced in Pectra) allow EOAs to temporarily delegate control to smart contract code, enabling features like sponsored transactions, batch operations, and improved key recovery without requiring users to migrate to entirely new account types.</p>
<p>With accounts and addresses established, Ethereum's next key development was creating standards that allowed different applications to work together effectively. The most important example is the ERC-20 token standard, which created a universal language for digital assets.</p>
<p>Before ERC-20, every new token was essentially a unique snowflake, requiring custom code for wallets and exchanges to support it. ERC-20 changed this by establishing a common blueprint: every compliant token must implement the same basic functions like transfer(), approve(), and balanceOf(). This seemingly simple standardization unleashed what many call the "Cambrian explosion" of DeFi.</p>
<p>Suddenly, developers could build applications that worked with thousands of different tokens without writing custom code for each one. A decentralized exchange could list any ERC-20 token, a lending protocol could accept any ERC-20 as collateral, and users could seamlessly move assets between different applications. This <strong>composability</strong> (the ability for different protocols to work together like Lego blocks) became one of Ethereum's defining characteristics, enabling complex multi-step operations that either complete entirely or revert with no partial execution. Chapter VII explores these DeFi applications in detail.</p>
<p>The ecosystem continued to evolve with additional standards: ERC-721 and ERC-1155 for NFTs (which Chapter XI explores), and various other token standards that extended Ethereum's capabilities. But all of this (the EVM, the fee market, the account system, the token standards) depends on thousands of validators agreeing on the state of the network. Ethereum's approach to achieving that agreement transformed fundamentally in 2022\\.</p>`
},
{
slug: "alt-ch02-s2", section: "alt-ch02", title: "Section II: Ethereum Consensus and Staking",
body: `<p>This section explores how Ethereum reaches agreement on the state of its blockchain. While Bitcoin uses Proof of Work to achieve consensus (as explained in Chapter I), Ethereum transitioned to a fundamentally different approach called Proof of Stake. Understanding this shift requires first examining how Ethereum's upgrade process works.</p>
<h3>How Ethereum Evolves: The EIP Process</h3>
<p>That 2022 transformation happened through Ethereum's unique governance model. Unlike traditional software where a company decides what features to build, Ethereum evolves through a public, community-driven process centered on <strong>Ethereum Improvement Proposals (EIPs)</strong>. These formal proposals move through stages (Draft, Review, Last Call, and Final) with extensive technical review, security analysis, and testing on networks like Sepolia and Holesky before deployment to mainnet.</p>
<p>Core EIPs modify the protocol itself, requiring coordinated hard forks (backwards-incompatible protocol changes). ERC (Ethereum Request for Comment) proposals define application-level standards like ERC-20 tokens that make different applications compatible. Major upgrades bundle multiple EIPs together with names like Shapella (staking withdrawals), Dencun (blob transactions via EIP-4844), and Pectra (account delegation via EIP-7702).</p>
<p>This process intentionally prioritizes caution over speed. Changes to a system securing hundreds of billions of dollars require widespread coordination among thousands of node operators and thorough vetting to prevent catastrophic bugs. You will see EIP numbers referenced throughout this chapter. They represent the careful evolution that makes Ethereum both stable and capable of major transformations.</p>
<h3>The Great Transition: From Mining to Staking</h3>
<p>The most significant transformation to emerge from this process was The Merge. September 15, 2022, marked a watershed moment in Ethereum history. On that day, The Merge was completed, a years-long engineering effort that transitioned the network from energy-intensive mining to a proof-of-stake system. The upgrade represented a reimagining of how Ethereum secures itself.</p>
<p>The transformation was unprecedented in scope. Bitcoin miners race to solve computational puzzles using large amounts of electricity. Ethereum's new system relies instead on <strong>validators</strong> who lock up their own ETH as collateral. These validators earn rewards for honest behavior and face severe penalties for malicious actions. The result? Ethereum reduced its energy consumption by over 99.9% while maintaining comparable security guarantees.</p>
<p>Beyond energy efficiency, The Merge restructured Ethereum's architecture itself: it separated Ethereum's execution layer (which processes transactions) from its consensus layer (which decides on block order and finality). This separation, embodied in the Beacon Chain, created a foundation for future scalability improvements that would have been impossible under the old mining system.</p>
<h3>How Ethereum Achieves Consensus</h3>
<p>Ethereum's proof-of-stake system operates like a carefully choreographed dance, with thousands of validators working together in precise intervals to maintain network security.</p>
<p>Time in Ethereum moves in precise intervals: every 12 seconds marks a slot, and every 32 slots (about 6.4 minutes) forms an epoch. In each slot, the protocol randomly selects one validator to propose a new block using a cryptographic seed derived from the previous epoch, while hundreds of others provide attestations, which are cryptographic votes confirming that the proposed block follows all the rules.</p>
<p>The path to <strong>finality</strong> (the point where a transaction becomes irreversible) follows a two step process. First, a block becomes justified when it receives attestations from at least two thirds of validators. Then, in the following epoch, if another supermajority confirms that justification, the block becomes finalized. This process typically takes about 12.8 minutes. After finalization, reversing a transaction would require coordinated attacks triggering severe financial penalties called <strong>slashing</strong>, which scale with the number of validators involved.</p>
<p>Becoming a validator requires staking a minimum of 32 ETH to activate, but since the Pectra hard fork (EIP-7251), validators can now scale their effective balance (the amount of staked ETH that counts toward their voting power and rewards) up to 2048 ETH, reshaping the staking landscape. While 32 ETH remains the activation threshold per validator key, operators can now attach additional ETH to a single validator to increase its attestation weight, rewards, and penalties proportionally. This reduces operational overhead through fewer keys and attestations but concentrates stake and potential slashing risk per validator. The change reduces the incentive to run many 32 ETH validators. Large operators can consolidate into fewer, higher-stake validators, while solo stakers can continue running standard 32 ETH setups.</p>
<p>The system achieves efficiency through advanced cryptographic techniques. Ethereum uses BLS signatures, which allow thousands of individual validator signatures to be compressed into a single, compact proof. Instead of processing thousands of separate attestations, the network can verify the collective opinion of all validators with minimal computational overhead.</p>
<p>Security comes through slashing, the system's mechanism for punishing malicious behavior. Validators who break the rules (like proposing conflicting blocks or making contradictory attestations) face financial penalties. The base penalty is intentionally small: on the order of hundredths of an ETH for a 32 ETH validator and around half an ETH for a fully "scaled-up" 2048 ETH validator under the new Pectra rules. This means isolated mistakes aren't catastrophic. But correlated attacks are punished much more severely. When many validators misbehave together, a correlation penalty scales up with the share of the validator set that's slashed, and large coordinated attacks can destroy a substantial fraction of each participant's stake. The protocol also includes inactivity leaks that gradually drain the balances of offline validators during long network partitions, allowing the remaining active validators to regain a supermajority and finalize the chain.</p>
<h3>Liquid Staking</h3>
<p>The capital requirements described above shaped the evolution of Ethereum's staking ecosystem. Stakers face a difficult choice: lock up tokens to help secure the network and earn rewards, or keep them liquid for other uses. Even though withdrawals became possible after the Shapella upgrade, exiting your stake isn't instant. You have to wait in a queue that can take days or even longer when the network is busy. The problem is clear: staked capital becomes locked up and can't be used in the broader decentralized finance (DeFi) ecosystem. You're forced to choose between earning staking yields and having the flexibility to lend, trade, or provide liquidity with your assets.</p>
<p>Liquid staking protocols solve this problem by collecting deposits from many users, staking them with network validators, and issuing tradeable <strong>Liquid Staking Tokens (LSTs)</strong> that represent your share of the staked pool plus earned rewards. This means you earn staking yields while holding a liquid, transferable token usable across DeFi protocols.</p>
<p>Two approaches dominate the space:</p>
<p>Lido is by far the largest LST provider, controlling over 85% of the market as of early 2026 and managing roughly 25% of all staked ETH. It issues stETH, a rebasing token whose balance automatically grows daily as staking rewards accumulate. In other words, the number of tokens in your wallet changes over time rather than each token’s price increasing. Lido uses a curated set of professional node operators (recently expanded to include permissionless participation) and relies on a committee that reports daily balance updates from the beacon chain to power the rebasing mechanism. This approach enabled Lido to scale rapidly and dominate the LST market.</p>
<p>Rocket Pool takes a more decentralized path. It's the second largest protocol with approximately 5% market share as of early 2026, enabling thousands of independent operators to run validators. It issues rETH, which works differently. Your token balance stays constant, but its exchange rate against ETH appreciates as rewards accumulate. The protocol allows operators to create validators with as little as 8 ETH of their own capital, with the rest coming from user deposits, making validator participation more accessible while maintaining permissionless entry.</p>
<p>Liquid staking offers clear advantages, but it also comes with risks you need to understand. Lido's dominance raises serious questions about protocol governance and network resilience. If too much staking power concentrates in one provider, it could threaten the security and decentralization of the underlying network. Smart contract vulnerabilities are another pressing concern. Today, most validator withdrawal credentials are managed off-chain, which limits a protocol bug's ability to directly drain validator balances. However, bugs can still break accounting, misroute rewards, or block withdrawals. If future upgrades shift more withdrawal control on-chain, the blast radius of such bugs could grow further.</p>
<p>Validator penalties from misbehavior or technical failures affect everyone in the pool. Finally, liquidity risk can surface during periods of market stress. LST tokens might trade below their true value (we saw this with stETH discounts in 2022), which creates potential losses if you need to exit your position quickly.</p>
<p>With consensus secured and staking economics established, Ethereum's remaining bottleneck is scale; hence the rise of Layer 2 rollups.</p>`
},
{
slug: "alt-ch02-s3", section: "alt-ch02", title: "Section III: Ethereum Scaling and Layer 2 Solutions",
body: `<h3>The Rollup Revolution</h3>
<p>Recall from the EVM section that every full node must process every transaction. This design choice, essential for decentralization and security, constrains throughput to what a typical node on consumer hardware can verify and propagate within a 12-second slot. The result is on the order of a few dozen simple transactions per second, far too slow for mainstream adoption. A single popular application can congest the entire network, sending gas fees soaring to hundreds of dollars per transaction during periods of extreme demand.</p>
<p>The solution cannot be to simply "make blocks bigger" or "process transactions faster." Raising gas limits or shortening block times would increase bandwidth, CPU, and storage requirements, quietly pushing slower nodes off the network. This would concentrate validation in the hands of fewer, more powerful operators and undermine decentralization. Ethereum's core developers therefore prioritize keeping node requirements low enough that anyone with reasonably affordable consumer hardware and a decent internet connection can participate in securing the network.</p>
<p>Rollups address this constraint by moving most computation off Layer 1 while anchoring security to Ethereum. Transactions execute on a separate Layer 2 chain that runs much faster and cheaper because it doesn't require every Ethereum node to re-run every step. The rollup then posts compressed transaction data (and, depending on the design, proofs or fraud-detection mechanisms) back to Layer 1, which provides data availability, dispute resolution, and final settlement.</p>
<p>This security inheritance only works fully when data availability lives on Ethereum itself. For a rollup to be truly secure, anyone must be able to reconstruct its state from data posted to Layer 1\\. If transaction data disappears or becomes unavailable, users can't prove they own their funds or challenge invalid state transitions. Rollups that use external data availability (called validiums, since they validate transactions but store data elsewhere) sacrifice this guarantee and require additional trust assumptions.</p>
<p>A common criticism of the rollup scaling approach claims that L2s extract value from Ethereum by launching their own tokens, pulling investor attention and capital away from ETH. The concern breaks down into two main issues. First, users end up speculating on L2 tokens rather than ETH itself. Second, valuable revenues from <strong>sequencers</strong> (the entities that order and batch transactions on L2s) and transaction fees get captured at the rollup level instead of flowing back to Ethereum's base layer.</p>
<p>However, rollups that post their data to Ethereum still generate L1 fees and contribute to ETH's deflationary burn mechanism, especially as L2 usage grows. The choice of gas token matters here: some rollups denominate user gas in a native L2 token, others in ETH, but in all cases sequencers ultimately need to acquire ETH to pay for L1 data availability. This forces part of the system's revenue back into ETH demand. Additionally, factors like sequencer decentralization and how tightly a rollup's economics couple to Ethereum's settlement layer all determine whether value flows back to ETH holders or gets mostly captured at the L2 level.</p>
<p>The rollup ecosystem has evolved into two primary approaches, each making different compromises:</p>
<p>#### Optimistic Rollups: Trust but Verify</p>
<p>Optimistic rollups, exemplified by Arbitrum and Optimism, embrace an "innocent until proven guilty" philosophy. They optimistically assume all transactions are valid and immediately post new state updates to Layer 1\\. This assumption allows for fast execution and low costs, but it comes with an important caveat: a challenge period of roughly seven days during which anyone can submit a <strong>fraud proof</strong> if they detect invalid transactions.</p>
<p>This security model balances speed against finality. While users enjoy fast, cheap transactions on the rollup itself, withdrawing funds back to mainnet requires patience. The seven day waiting period ensures that any fraudulent activity can be detected and reversed, but it means that optimistic rollups aren't ideal for users who need immediate access to their funds on Layer 1\\.</p>
<p>However, the market has responded to this friction with third-party fast withdrawal services. Liquidity providers like Hop Protocol and Across Protocol will front users their funds on Layer 1 immediately, charging a fee for the convenience. These providers assume the risk during the challenge period. If a fraud proof invalidates the transaction, they bear the loss. Users who need speed pay a premium; those willing to wait can withdraw for free.</p>
<p>#### ZK Rollups: Mathematical Certainty</p>
<p>ZK rollups, including Starknet, zkSync, and Scroll, take an entirely different approach. Instead of assuming validity and waiting for challenges, they use <strong>validity proofs</strong> (advanced cryptographic techniques that mathematically prove the correctness of every batch of transactions). These rollups first commit transaction data to Layer 1, then submit a proof that validates the entire batch.</p>
<p>These zero-knowledge proofs are advanced mathematical techniques. They allow a rollup to prove that thousands of transactions were processed correctly without requiring Layer 1 to re-execute them. The proof provides strong cryptographic certainty about the validity of an entire batch (though like all cryptography, this relies on certain mathematical assumptions being sound).</p>
<p>Different ZK rollups use different proof systems, each with distinct properties. Scroll uses pure SNARKs, generating tiny proofs of just a few hundred bytes that minimize L1 costs, but requiring a trusted setup where initial parameters must be securely generated and destroyed, like destroying the mold after casting a master key so nobody can secretly mint more keys later. Starknet uses STARKs, producing much larger proofs of hundreds of kilobytes, but offering stronger security properties: no trusted setup, transparency, and better resistance to potential future quantum computers. zkSync takes a hybrid approach, generating STARK proofs internally for security, then wrapping them in a SNARK for cost-efficient on-chain verification. This still requires a trusted setup for the SNARK wrapper.</p>
<p>The advantage over optimistic rollups is compelling. ZK rollups avoid the week long withdrawal delays that plague optimistic systems. Once a validity proof is verified on Layer 1, users can access their funds without any challenge period (though they still wait for proof generation and verification, which typically takes minutes to hours depending on system load). However, this security comes at a cost. The cryptographic machinery required to generate these proofs is more complex and computationally intensive than optimistic approaches.</p>
<p>#### Additional Rollup Considerations</p>
<p>Beyond the core differences between optimistic and ZK approaches, several other dimensions matter when evaluating rollups.</p>
<p>In practice, most rollups currently rely on centralized sequencers to achieve the fast confirmations users expect. Unlike Ethereum mainnet, which distributes block proposal across thousands of validators, these rollups use a single entity to order transactions and produce blocks. While this represents a temporary engineering choice rather than a permanent design, it introduces potential censorship risks and single points of failure. Leading rollups are actively developing solutions to eliminate sequencer centralization while preserving performance. Shared sequencing networks distribute ordering responsibility across multiple parties, creating redundancy without sacrificing speed. Sequencer rotation systems periodically change which entity handles transaction ordering, preventing long-term control by any single party. Inclusion lists require sequencers to include certain transactions within specified timeframes, making censorship more difficult. Preconfirmations allow sequencers to make soft commitments about transaction inclusion before formal consensus, improving user experience while maintaining reversion options through slashing mechanisms and dispute windows.</p>
<p>Proof systems continue to evolve in maturity and coverage. Many ZK-rollups still operate with "training wheels" (additional security mechanisms that can pause or override the system during early phases while the technology matures). Optimistic rollups depend on robust fault proof systems that are still being refined and battle-tested. Fee structures combine L2 execution costs with L1 data availability and inclusion fees. Additionally, rollups operate in different data availability modes. True rollups post all data to Ethereum, while validiums use external data availability or hybrid approaches that trade cost savings against stronger trust requirements.</p>
<p>Not all rollups prioritize decentralization equally. Some projects deliberately embrace centralized architectures to achieve consumer-app-like responsiveness. MegaETH, for example, uses a single active sequencer and 10-millisecond “miniblocks” to target millisecond-level latency and on the order of 100,000 transactions per second. This design accepts risks like single points of failure and potential censorship in exchange for high speed. Such approaches reveal the inherent tensions in blockchain design: decentralization, security, and performance exist in constant competition, with different applications requiring different balances.</p>
<h3>Solving the Data Availability Challenge</h3>
<p>With rollups defined, the dominant cost driver becomes data availability. Before March 2024, rollups had to store their data permanently in Ethereum's expensive execution layer, making data availability costs account for 80-95% of total rollup fees.</p>
<p>EIP-4844, implemented in the Dencun upgrade, fundamentally changed this economics by introducing blob-carrying transactions. EIP-4844 introduced <strong>blobs</strong> with a separate fee market and temporary retention (\\~18 days), cutting rollup DA costs. These blobs are large packets of data (about 128 KB each) that live temporarily on Ethereum's consensus layer before being automatically pruned, establishing a separate, much cheaper data market specifically designed for rollups.</p>
<p>The system maintains security through KZG commitments, which are cryptographic fingerprints that uniquely identify each blob's contents. Imagine rollups renting billboard space on mainnet: they paste a huge poster (the blob) that stays up for roughly 18 days, then the city takes it down. The city keeps only a sealed, signed thumbnail that uniquely commits to the poster (the KZG commitment). Later, anyone can verify a specific square of that poster with a tiny receipt (a proof) without the city storing the full poster forever.</p>
<p>Through this design, Ethereum created two separate fee markets: blob space operates with its own base fee mechanism (similar to regular gas pricing), while normal transaction fees continue unchanged. With Pectra, EIP-7691 raised blob limits (target 3→6, max 6→9 per block) and made blob fees fall more aggressively when blobs are underused, further reducing costs for rollups while keeping prices responsive without overshooting.</p>
<p>This design is the first step toward full danksharding, Ethereum's long-term vision for massive data availability scaling. KZG commitments enable nodes to verify blob integrity while remaining forward-compatible with future upgrades that will let even resource-constrained devices verify data availability by checking only small samples rather than downloading everything.</p>
<p>#### Alternative Data Availability Solutions</p>
<p>For applications requiring even lower costs than Ethereum's blobs provide, several alternative Data Availability (DA) layers have emerged. Each makes different security compromises to achieve cost reduction. Understanding these design choices is essential for evaluating which rollups to use.</p>
<p>Celestia represents the most ambitious alternative. It's a specialized blockchain that provides consensus and data availability only, without execution. Its key innovation is Data Availability Sampling, which allows even devices with limited resources to gain high confidence that full block data was published by checking only small, random pieces rather than downloading everything. The system also lets different rollups efficiently prove their data was included without downloading irrelevant information from other rollups. Security relies on validators and an honest majority of independent samplers, with full nodes able to produce fraud proofs if data is incorrectly encoded.</p>
<p>EigenDA leverages Ethereum's restaking ecosystem (described in Section IV) to provide high-throughput data availability. A disperser coordinates the encoding and distribution of data across operators who attest to its availability. Throughput can be high, but security depends on the value restaked by operators and the specific quorum assumptions of each deployment.</p>
<p>Validium and committee-based systems take a different approach entirely, keeping data off-chain under the control of a committee or bonded set of operators. This can be cheaper than on-chain alternatives but weakens security guarantees since data availability isn't enforced by Layer 1 protocol rules.</p>
<p>Many rollups operate in hybrid modes, posting state commitments to Ethereum while using external data availability for the bulk of their data, or switching between different DA providers based on market conditions.</p>
<p>The data availability landscape continues to evolve rapidly, with new solutions emerging and existing ones improving their efficiency and security models. As rollups mature and user adoption grows, the choice of data availability solution will likely become as important as the choice of consensus mechanism itself.</p>`
},
{
slug: "alt-ch02-s4", section: "alt-ch02", title: "Section IV: Restaking",
body: `<p>Rollups multiply Ethereum's transaction capacity by moving computation off-chain. Proof-of-stake enabled a different kind of multiplication: the ability to reuse staked capital across multiple protocols simultaneously. This innovation, called <strong>restaking</strong>, represents a new frontier in capital efficiency with its own set of risks and rewards.</p>
<h3>The Core Mechanism</h3>
<p>EigenLayer pioneered this approach by creating a system where validators can opt in to secure <strong>Actively Validated Services (AVSs)</strong>. These are external protocols that need the kind of security that comes from having real money at stake. For native restaking, validators point their withdrawal credentials to an EigenPod and delegate to an operator. Alternatively, liquid staking token holders can deposit their tokens into EigenLayer strategies. Either way, participants commit to follow the rules of their chosen AVSs, and breaking those rules means facing additional slashing penalties on top of any Ethereum-level punishments.</p>
<p>Multiple protocols can now tap into Ethereum's massive validator set and the billions of dollars they have at stake. This provides shared security rather than building separate systems from scratch. AVSs cover a wide range of applications: data availability layers like EigenDA, oracle networks that provide price feeds, cross-chain bridges, rollup sequencers, and automated keeper networks that maintain DeFi protocols. Each AVS defines its own slashing conditions, the specific rules validators must follow to avoid penalties. A data availability service might require validators to prove they're storing certain data, while an oracle network might slash validators who submit price feeds that deviate too far from consensus.</p>
<h3>Technical Architecture</h3>
<p>EigenLayer's design reflects careful consideration of how multiple protocols and validators interact. The architecture separates concerns into distinct layers that enable flexible composition while maintaining clear security boundaries.</p>
<p>Strategy contracts handle deposits and withdrawals for ERC-20-based restaking. When users deposit LSTs or other supported tokens, these strategies track ownership and manage the underlying assets. Each strategy represents a different restaked token: one for stETH, another for cbETH, EIGEN, and so on. Native restaking is tracked separately through EigenPods, contract instances that hold validator withdrawal credentials and account for restaked beacon-chain ETH. This modular split lets EigenLayer support both liquid staking derivatives and native staking without one monolithic contract trying to handle every asset type.</p>
<p>Slashing contracts enforce each AVS's specific rules independently. This separation is crucial: it prevents bugs in one AVS's slashing logic from affecting other services or compromising the core deposit/withdrawal mechanisms. When an AVS needs to slash a misbehaving operator, it interacts only with its own slashing contract, which then coordinates with the core system to execute penalties.</p>
<p>The system enables delegation, allowing users who don't want to run validator infrastructure to stake through professional operators. Delegators retain control over their withdrawal rights and can exit and delegate to a different operator after serving the required withdrawal delay, but they also inherit the operator's performance and slashing risks. Operators can signal their commission rates and which AVSs they support, creating a marketplace where delegators can choose based on expertise, fees, and risk profiles.</p>
<p>Different AVSs employ varying proof systems depending on their security needs. Some rely on fraud proofs that assume honest behavior unless challenged. If someone detects invalid behavior during a challenge window, they can submit evidence that triggers slashing. Others use validity proofs based on zero-knowledge cryptography that mathematically guarantee correctness before any state change occurs. Still others depend on committee signatures from trusted parties, which are faster and simpler but introduce trust assumptions about committee honesty and availability.</p>
<p>EigenLayer's security model includes veto committees as an extra layer for critical slashing decisions. Rather than allowing immediate, automated slashing for all violations, some conditions require committee approval. This prevents hasty or incorrect penalty enforcement. Imagine a bug in an AVS that incorrectly flags honest behavior as malicious. The veto committee can pause the slashing, investigate the issue, and prevent unjust penalties. However, this introduces governance risk and potential delays in enforcing legitimate slashing. The exact veto-committee design and implementation have been evolving alongside the rollout of slashing, so details may change over time.</p>
<p>Perhaps most intriguingly, EigenLayer introduces intersubjective slashing, where some violations can’t be proven purely on-chain and instead rely on shared human judgment (social consensus) to decide when to slash. Consider an oracle AVS where validators should report accurate price data. If a validator reports an obviously wrong price (claiming ETH trades at $1 when all exchanges show $3,000), the violation is clear to humans but hard to prove on-chain without introducing centralized price feeds. Intersubjective slashing allows such cases to be resolved through social consensus and governance processes. Token holders or designated committees vote on whether slashing should occur based on off-chain evidence. This flexibility enables the system to handle complex, real-world scenarios that pure algorithmic approaches might miss, but it introduces governance risks and the potential for contentious decisions that divide the community.</p>
<h3>Current Economic Reality</h3>
<p>On paper, restaking looks like a clean win: more protocols can "rent" Ethereum's security instead of bootstrapping their own validator sets. In practice, the system is still early and somewhat lopsided. A large amount of ETH and liquid staking tokens has been restaked into EigenLayer and liquid restaking wrappers, but only a subset of AVSs see meaningful real-world demand today. Most of the incremental rewards restakers currently earn come from incentive programs, airdrops, and protocol token emissions rather than durable fee revenue generated by AVSs themselves. For now, restaking behaves less like a mature cash-flow asset class and more like a leveraged bet on the future success of the EigenLayer ecosystem.</p>
<p>This timing mismatch matters significantly. The extra liabilities are live today (additional smart contract risk, governance risk, and correlated slashing exposure across multiple AVSs), while the long-run fee markets that are supposed to compensate restakers are still being designed and battle-tested. When you hear claims about "reusing security" or "unlocking capital efficiency," it's worth remembering that many restakers are currently taking on large tail risks for economics that depend on ongoing incentives and a still-uncertain AVS adoption curve.</p>
<h3>The Risk Landscape</h3>
<p>Understanding the technical architecture reveals why restaking carries significant risks. The most pressing concern is correlated slashing risk. When validators secure multiple AVSs simultaneously, a single mistake or malicious action can trigger penalties across all services at once, amplifying potential losses far beyond standard Ethereum staking. This makes AVS risk assessment essential, since each service brings its own slashing conditions, upgrade mechanisms, and governance structures that validators must understand and trust.</p>
<p>Choosing the right operator becomes pivotal in this environment. Most restakers delegate their validation duties to professional operators who must maintain infrastructure for multiple protocols at once. Poor operator performance or malicious behavior doesn't just affect one service; it impacts all delegated stake across every AVS that operator supports.</p>
<p>Withdrawal delays can extend well beyond Ethereum's standard unbonding periods. EigenLayer adds its own roughly two-week escrow period (currently about 14–17 days depending on the contract version) on top of Beacon Chain exit timing. Individual AVSs or LRT (liquid restaking token) protocols may impose additional withdrawal restrictions on top of this.</p>
<p>The liquid restaking ecosystem introduces systemic risks that compound on top of the liquid staking risks discussed earlier. Liquidity cascades could emerge if LRT tokens lose their peg to underlying ETH, potentially forcing mass withdrawals that create destructive feedback loops across the entire restaking ecosystem. There's also basis risk between the underlying ETH staking yields and LRT token prices, adding complexity for users who expect predictable returns. When you layer restaking on top of liquid staking protocols like Lido or Rocket Pool, you're compounding multiple layers of smart contract risk, economic assumptions, and potential failure points.</p>`
},
{
slug: "alt-ch03-s1", section: "alt-ch03", title: "Section I: Architecture and Execution",
body: `<p>Solana represents a fundamentally different approach to blockchain scaling. While Ethereum (Chapter II) and Bitcoin (Chapter I) are also Layer 1 (L1) blockchains, meaning they are base-layer networks that operate independently and settle their own transactions, Solana makes radically different engineering tradeoffs. It prioritizes raw speed and throughput over keeping hardware requirements low, betting that powerful computers will become cheaper faster than blockchain demand will grow.</p>
<p>Most blockchains execute transactions one at a time within blocks. When you send a transaction on Ethereum, it waits in line behind every other transaction, processed sequentially to avoid conflicts. Scaling typically happens by adding Layer 2 networks on top, as described in Chapter II. This approach keeps validator requirements modest and maximizes decentralization, but it introduces fragmentation. Users must navigate between different networks with different fee tokens, bridging experiences, and compatibility layers.</p>
<p>Solana takes a different path. The critical innovation is that every transaction must declare upfront which accounts it will read from or write to. This simple requirement unlocks something powerful: the network can identify transactions that don't overlap and run them simultaneously across multiple CPU cores. While Ethereum processes transactions one after another like a single checkout lane, Solana operates more like a supermarket with dozens of lanes open at once. This creates a direct relationship between hardware resources and network capacity. More CPU cores translate to higher transaction throughput.</p>
<p>This parallel execution model shapes Solana's data architecture. State is organized around an account model that cleanly separates program code from user data. Programs live in executable accounts whose code is effectively immutable. User-level state lives in separate data accounts owned by those programs. Composability, the ability for programs to interact with each other, is straightforward. Programs call into one another via <strong>cross-program invocations (CPIs)</strong>, essentially one program asking another to perform an operation, passing accounts as inputs. The runtime can verify that all necessary accounts are included before execution begins.</p>
<h3>Address Types and Account Management</h3>
<p>Within this account architecture, Solana introduces a novel address type that solves a fundamental problem in decentralized systems. The network uses two distinct types of addresses that serve different purposes in the ecosystem.</p>
<p>Regular addresses function like traditional crypto wallets. Users control these addresses with private keys, just like Bitcoin or Ethereum wallets.</p>
<p><strong>Program Derived Addresses (PDAs)</strong> represent a departure from this model. These addresses have no private keys at all. Instead, programs generate them mathematically using a combination of inputs that produce an address no one can control directly. The result is an address that only the program itself can authorize transactions from.</p>
<p>PDAs solve the fundamental custody problem that plagues traditional escrow systems. Traditional escrow requires someone to hold private keys, introducing inherent trust issues and potential points of failure. With PDAs, the escrow program itself controls the funds directly. No human can steal them because there is no private key to compromise.</p>
<p>Accounts must hold a minimum balance of <strong>lamports</strong> (Solana's smallest unit, similar to satoshis for Bitcoin) to remain rent-exempt, which prevents state bloat by requiring an economic commitment for persistent storage. In practice, this works like an upfront security deposit for using storage space rather than an ongoing subscription fee.</p>
<p>These execution constraints and the account model shape how users actually transact on Solana. The following section examines the transaction structure, fee mechanics, and the user experience they enable.</p>`
},
{
slug: "alt-ch03-s2", section: "alt-ch03", title: "Section II: Transactions, Fees, and UX",
body: `<h3>The Transaction Model</h3>
<p>Each transaction includes a message (which contains the account list, instructions, and recent blockhash) along with the required Ed25519 signatures (Ed25519 is a modern digital signature algorithm known for its speed and security). Every transaction pays a base fee of 5,000 lamports, roughly one tenth of a cent per signature. Users can also attach a compute budget and pay priority fees per compute unit, essentially trading cost for faster processing. These compute unit caps serve two purposes: they enforce fairness across users and help the scheduler predict execution time for optimal parallelization.</p>
<p>Fee policy has evolved significantly. Priority fees go entirely to the current leader (the validator producing the current block), while base fees are split between burning and validator rewards (detailed in Section IV). The critical innovation here is <strong>local fee markets</strong>, which price congestion at the account level rather than across the entire network. Ethereum's global fee market (Chapter II) works differently: all transactions compete for the same block space regardless of which contracts they interact with. Ideally, local fee markets mean heavily congested accounts pay more without degrading performance for the rest of the network. In practice, the current implementation is imperfect. During extreme spam events in 2024 and 2025, congested traffic still degraded global performance and caused elevated dropped-transaction rates.</p>
<p>Solana also offers preflight simulation, which lets developers and users preview what a transaction will do before actually submitting it. Combined with detailed program logs, this allows wallets to show users the expected outcome of a transaction before they commit to it, improving both safety and user experience.</p>
<p>It's important to distinguish "dropped" transactions from "failed" ones. Dropped transactions never reach a block due to network overload, insufficient priority fees, or expired blockhashes, and they leave no on-chain record. Failed transactions are actually processed and included in a block but revert due to program logic errors or unmet conditions (like excessive slippage). In practice, users and applications mitigate dropped transactions by retrying with higher priority fees or using services that forward transactions to multiple leaders.</p>
<h3>The User Experience Advantage</h3>
<p>These technical mechanics create a distinctively different user experience: users interact with one global state, a cohesive ecosystem of explorers and wallets, and <strong>atomic composability</strong> across the whole network. Users can compose multiple protocol interactions within a single transaction that either succeeds completely or fails completely, with no partial executions and no stuck funds. The result is fewer context switches and less UX friction compared to navigating fragmented multi-chain ecosystems.</p>
<p>The economic impact matters most. Sub-cent transaction costs allow entirely different user behaviors than networks with dollar-plus fees. Users can execute rapid position changes, experiment with small-ticket speculation, and interact with applications multiple times per session without fee anxiety. This economic accessibility, combined with near-instant transaction processing, has enabled particular use cases to flourish on Solana, most notably memecoin trading and high-frequency DeFi applications.</p>
<p>The network has evolved considerably through operational challenges. Early Solana suffered from congestion-related outages that critics frequently highlighted. Notably, in February 2024, Solana experienced an outage lasting roughly five hours, caused by a bug in the program loader's cache. However, systematic upgrades to networking, block propagation, and runtime performance have significantly reduced both the frequency and severity of these issues, delivering increased inclusion rates and overall reliability.</p>
<p>The fast confirmations users experience, along with the inclusion behavior described above, are direct consequences of the consensus, scheduling, and networking stack operating beneath the surface.</p>`
},
{
slug: "alt-ch03-s3", section: "alt-ch03", title: "Section III: Consensus, Scheduling, and Networking",
body: `<p>Solana achieves its rapid confirmations through an integrated stack of systems, each building on the others. Understanding this architecture requires seeing how the pieces connect rather than viewing them in isolation.</p>
<h3>The Foundation: Proof of History</h3>
<p>At the base layer sits Proof of History (PoH), Solana's cryptographic timekeeping mechanism. Think of it as a verifiable clock that produces a continuous sequence of hashes, so everyone can agree on the relative order of events before they are added to the blockchain. PoH creates a historical record that proves events occurred in a specific sequence, enabling validators to agree on transaction order without extensive back and forth communication. This ordering system becomes the foundation for everything else.</p>
<h3>Consensus Built on Time: Tower BFT</h3>
<p>Tower BFT leverages these PoH timestamps to handle finality. Rather than requiring validators to constantly communicate about block order, Tower BFT uses the timestamp record as a shared reference point. Validators cast stake-weighted votes on blocks, and the PoH timestamps help prevent equivocation (voting for conflicting blocks). This produces guaranteed finality currently around 12.8 seconds, though users typically experience faster economic finality in practice as transactions become increasingly unlikely to reverse after just a few confirmations.</p>
<h3>Leader Scheduling and Transaction Routing</h3>
<p>The PoH timekeeping mechanism makes predictable leader scheduling possible. Leaders are pre-scheduled in short slots (roughly 400 milliseconds each). These slots are organized into epochs, periods of roughly two days during which the validator schedule remains fixed. At the start of each epoch, the network determines which validators will lead which slots based on their stake. Your stake determines your chances of being selected as a leader, subject to warmup and cooldown periods and some randomness in the schedule.</p>
<p>This predictable scheduling enables <strong>Gulf Stream</strong>, Solana's transaction forwarding protocol. Unlike blockchains that broadcast transactions to a public mempool (as Bitcoin and Ethereum do, described in Chapters I and II), Solana sends them directly to the current and upcoming leaders. This direct routing reduces delays by eliminating the broadcast phase where transactions would otherwise wait in a public pool. Transactions can even be forwarded to future leaders before their slot begins, enabling rapid confirmations once the leader's slot starts.</p>
<h3>Data Propagation: Turbine</h3>
<p>Once leaders produce blocks, they need to propagate them efficiently across thousands of validators. Turbine solves this by breaking blocks into small chunks called "shreds." Rather than sending entire blocks point-to-point, Turbine organizes validators into a tree structure where each validator receives shreds and forwards them to a small set of other validators. The system includes redundancy built into how data is encoded, so even if some shreds are lost in transit, validators can reconstruct the full block from the pieces they do receive. This prevents bandwidth spikes and makes the network resistant to targeted spam against individual validators.</p>
<h3>Networking Infrastructure: QUIC</h3>
<p>The underlying transport layer uses QUIC, a modern internet protocol designed for faster, more reliable connections than traditional networking. QUIC can handle multiple data streams over a single connection, recovers more gracefully when data packets are lost, and establishes connections faster. Solana implements stake-weighted Quality of Service on top of QUIC, meaning validators with more stake get priority bandwidth treatment. This makes the network more resistant to spam from actors who have little stake in the system.</p>
<h3>DoubleZero: Dedicated Fiber Infrastructure</h3>
<p>While QUIC optimizes individual connections, DoubleZero addresses a more fundamental constraint: the public internet itself. DoubleZero is a private network overlay that connects validators through dedicated fiber optic links, the same infrastructure that traditional exchanges like Nasdaq and CME rely on for microsecond-level transmission.</p>
<p>As validator sets grow, propagation becomes harder. More nodes means more destinations, which introduces timing inconsistencies across the network. Messages bouncing through the public internet encounter variable latency depending on routing paths, congestion, and geographic distance. DoubleZero removes this variance by routing messages through optimal, dedicated paths rather than competing with general internet traffic.</p>
<p>This matters particularly for the consensus upgrades discussed below. Alpenglow's finality model depends on validators receiving and responding to messages within tight windows. If propagation is inconsistent, votes arrive late, quorum formation slows, and finality takes longer. By narrowing the latency gap across validators, DoubleZero enables faster finalization and more even block propagation. The infrastructure also supports multicast, replicating data inside the network and delivering it to validators simultaneously rather than through sequential point-to-point connections.</p>
<h3>Alpenglow: Upgrading the Entire Stack</h3>
<p>The integrated system of PoH, Tower BFT, Gulf Stream, Turbine, and QUIC described above represents Solana's current production infrastructure, evolved through years of mainnet operation. Understanding this foundation matters because Alpenglow, the planned upgrade, represents such a fundamental departure. Rather than incrementally improving individual components, Alpenglow reworks core consensus and voting communication entirely, with planned improvements to block dissemination in later phases.</p>
<p>Alpenglow replaces the core consensus mechanisms with redesigned alternatives. <strong>Votor</strong>, a new voting method, has validators exchange votes directly with each other and form certificates proving that enough stake has agreed on a decision. This replaces Tower BFT as the primary finality mechanism. Rather than chaining multiple voting rounds together as Tower BFT does, validators aggregate votes off-chain and commit to finality in one or two rounds.</p>
<p>Votor runs two finalization paths in parallel, adapting to network conditions. If a block receives overwhelming support (80% or more of stake) in the first round, it finalizes immediately. If support lands between 60% and 80%, a second round begins. If that second round also exceeds 60%, the block is finalized. This design ensures finality even when parts of the network are unresponsive, allowing the system to proceed gracefully rather than stalling.</p>
<p><strong>Rotor</strong>, a planned follow-on, refines how block data spreads through the network. It routes messages directly through high-stake validators with reliable bandwidth, using fewer relay steps for more efficient propagation. Combined with dedicated infrastructure like DoubleZero, Rotor enables the tight timing windows that fast finality requires.</p>
<p>Alpenglow also introduces the "20+20" resilience model: safety is preserved so long as no more than 20% of total stake behaves maliciously, and liveness is preserved even if an additional 20% is offline. This means Alpenglow can tolerate up to 40% of the network being either malicious or inactive while still maintaining finality, a significant improvement over current tolerance thresholds.</p>
<p>Under Alpenglow, Proof of History is effectively deprecated. The system replaces PoH with fixed slot scheduling and local timers, removing a core architectural element that has defined Solana since its inception. This represents the most significant protocol-level change in Solana's history.</p>
<p>In simulations, Alpenglow achieves roughly 100 to 150 milliseconds median finality, compared to the current 12.8 seconds. These are simulation-based numbers that don't yet account for full computation overhead. Beyond raw performance, faster finality has security benefits. It shrinks the window during which an attacker could attempt to reorganize recent blocks and limits opportunities for certain types of arbitrage that exploit the uncertainty period before transactions become final.</p>
<p>The rollout plan targets extensive testing on dedicated testnets, with mainnet activation aimed for early to mid 2026 if testing and security audits go well. That said, blockchain upgrade timelines frequently slip, and the scope of changes involved makes delays plausible.</p>
<h3>MEV and Block Building</h3>
<p>With leader routing via Gulf Stream and the potential for dramatically faster finality through Alpenglow, the dynamics of how value is extracted and transactions are ordered within blocks become particularly important.</p>
<p>The leader-centric architecture we've described, with Gulf Stream routing transactions directly to scheduled leaders, creates important implications beyond latency. On most blockchains, pending transactions sit in a public waiting area called the mempool, where anyone can see them before they're included in a block. This visibility enables MEV (maximal extractable value, explored in depth in Chapter VIII), the profit that can be captured by reordering, inserting, or censoring transactions. Traders might see your pending swap and place their own trade first, profiting at your expense. Because Solana routes transactions directly to leaders rather than broadcasting them publicly, its MEV landscape operates quite differently.</p>
<p>Many validators now run Jito-Solana, a modified client that enables bundle auctions. This is optional infrastructure (not built into the protocol) that has achieved significant adoption. Searchers can package transactions into "bundles," simulate them off-chain, and pay tips for inclusion. Validators running Jito then build blocks combining both regular transactions (ordered by priority fees) and profitable bundles (ordered by tips). This system emerged organically from the direct-to-leader transaction flow, creating a MEV market that's integrated at the validator level rather than through separate relay infrastructure.</p>
<p>Two complementary trends are reshaping this block building layer further. BAM (Block Assembly Marketplace) is Jito's reimagining of Solana's transaction pipeline. Rather than letting the slot leader unilaterally determine ordering, BAM inserts a marketplace and privacy layer that separates ordering from execution. Transactions are ingested into Trusted Execution Environments (TEEs), meaning neither validators nor builders can see raw transaction content before ordering takes effect. This prevents opportunistic pre-execution behavior like frontrunning, addressing one of the most persistent concerns in MEV dynamics.</p>
<p>Harmonic addresses a different part of the pipeline: who builds the blocks. It introduces an open block-builder aggregation layer so validators can accept block proposals from multiple competing builders in real time. Think of Harmonic as a meta-market for block construction and BAM as the micro-market for transaction ordering within those blocks. Together, they create a more competitive and transparent block building ecosystem.</p>
<h3>Raiku: Deterministic Execution Guarantees</h3>
<p>Even with faster consensus and improved block building, Solana does not natively offer guaranteed latency or programmable execution guarantees to specific applications. High-frequency trading and on-chain CLOBs (central limit order books, where buyers and sellers post specific prices rather than trading against liquidity pools) require more granular control than a general-purpose L1 can reasonably provide at the protocol level.</p>
<p>Raiku fills this gap. It provides a scheduling and auction layer that runs adjacent to Solana's validator set, giving applications a programmable, deterministic pre-execution environment without modifying L1 consensus. Raiku achieves guaranteed execution through two transaction types: Ahead-of-Time (AOT) transactions for pre-committed workflows where execution timing can be scheduled in advance, and Just-in-Time (JIT) transactions for real-time execution needs that require immediate response. This infrastructure layer enables applications to offer execution guarantees approaching those of centralized systems while retaining the settlement benefits of an on-chain environment.</p>
<p>The technical infrastructure described throughout this section, from consensus mechanics to MEV dynamics to emerging execution layers, creates costs and revenue streams that shape who participates in the network and how.</p>`
},
{
slug: "alt-ch03-s4", section: "alt-ch03", title: "Section IV: Economics, Staking, and Governance",
body: `<p>The technical architecture tells only part of the story. Economic design, staking mechanics, and governance processes determine who can profitably participate and how the network evolves over time.</p>
<h3>Token Economics and Monetary Policy</h3>
<p>SOL serves as Solana's native token with multifaceted roles: transaction fees, staking collateral, and governance weight. The initial supply launched at approximately 500 million tokens, with a disinflationary schedule designed to balance network security incentives against long-term supply predictability.</p>
<p>The inflation schedule began at 8% annually and decreases by 15% per year (the disinflationary rate) until reaching a terminal 1.5% annual inflation rate. This terminal rate should be reached around 2031, after which inflation stabilizes permanently. This design aims to ensure sufficient staking rewards to incentivize validator participation even as the network matures, while avoiding the runaway inflation that would erode token value over decades.</p>
<p>However, inflation represents only one side of the supply equation. Fee burning introduces deflationary pressure. Solana burns 50% of the base transaction fee permanently, removing SOL from circulation; the other 50% goes to the block leader. Priority fees (compute-price tips) go entirely to the leader and are not part of the burn mechanism.</p>
<p>During periods of extreme network activity, burn rates can theoretically exceed inflation, making SOL temporarily deflationary. In practice, current transaction volume doesn't consistently achieve this threshold, but the mechanism creates a direct relationship between network usage and token supply dynamics.</p>
<p>The practical impact: staking yields on Solana are roughly 7% APY (varying with inflation rate and total staked percentage), reflecting the need to compensate validators for substantial hardware costs and operational complexity.</p>
<h3>Staking Mechanics and Validator Economics</h3>
<p>Staking on Solana works through a delegation model where SOL holders can delegate tokens to validators without surrendering custody. Unlike Ethereum's staking model (Chapter II), which requires 32 ETH minimums for solo validators and uses liquid staking derivatives like stETH for smaller holders, Solana allows native delegation of any amount directly to validators. Delegators earn rewards proportional to their stake minus the validator's commission rate, typically ranging from 0% to 10%, though validators can set any rate. This establishes a competitive marketplace where validators must balance commission revenue against attracting sufficient delegation to maintain profitability.</p>
<p>The mechanics involve several time-based constraints. Stake activation and deactivation occur at epoch boundaries (approximately 2-3 days) and often complete in one epoch, but can take multiple epochs due to network-wide cooldown limits that throttle large stake movements. These delays prevent rapid stake movement that could destabilize consensus but introduce liquidity constraints for delegators who may need quick access to funds.</p>
<p>#### The Economics of Running a Validator</p>
<p>Validator economics are complex and demanding: high-end hardware, terabytes of monthly bandwidth, enterprise networking, data center infrastructure, and vote transaction fees (approximately $4,000 monthly) typically total around $5,000 in monthly operational costs. Validators also require skilled personnel to maintain these systems reliably.</p>
<p>Revenue sources include multiple streams. Inflation rewards form the base layer, distributed proportionally to stake weight. Transaction fees add performance-based compensation, with both base fees (50% share) and priority fees flowing to block leaders. For validators running Jito-Solana, MEV tips from bundle auctions provide additional revenue that can substantially exceed standard transaction fees during high-value arbitrage opportunities.</p>
<p>The viability calculation is straightforward but unforgiving: validators need sufficient delegated stake to earn enough inflation rewards and fee revenue to cover operational costs plus commission margins. Absent external support, small validators with minimal delegation would struggle to break even. Foundation programs exist to help bootstrap new validators (discussed below), but these are explicitly time-limited, so structural pressure toward concentration among operators with durable external delegation never fully disappears.</p>
<p>#### Centralization Pressures and Network Security</p>
<p>The validator count has declined significantly, from a peak of around 2,000 validators to roughly 800 active validators as of January 2026\\. This raises obvious questions about network security and decentralization.</p>
<p>However, raw validator count tells only part of the story. A network could have thousands of validators but still be centralized if a handful control most of the stake. What matters more is how stake is distributed among validators, how concentrated the infrastructure is geographically, whether multiple independent software clients exist, and whether validators can actually operate profitably without subsidies.</p>
<p>Part of the recent validator churn reflects the economics of running a node. The Solana Foundation Delegation Program (SFDP) was designed as a temporary bootstrap mechanism. It subsidizes vote costs for new validators and delegates stake to help them get started, but this support tapers over 12 months and then ends. The program explicitly pushes participants to attract delegation from regular token holders rather than rely on foundation support indefinitely. When validators can't attract enough organic delegation to cover their costs, they shut down. This is working as intended, not a system failure.</p>
<p>But even accounting for SFDP transitions, the concentration of power remains concerning. Just 19 to 22 large validators control enough stake to reach the "<strong>superminority threshold</strong>," roughly one-third of total stake, which is the amount needed to halt network consensus. If these operators coordinated (or were somehow forced to coordinate), they could stop the network from producing blocks.</p>
<p>Geographic and infrastructure concentration makes this worse. Large portions of stake run through a small number of data centers and hosting providers, mostly concentrated in a handful of countries. This creates correlated risks. A problem at a major hosting provider, or coordinated government action in a key jurisdiction, could knock out enough validators to disrupt the network.</p>
<p>Future protocol changes may help, but they won't eliminate costs entirely. The planned Alpenglow consensus upgrade (detailed in Section III) is expected to reduce validator operating costs compared to the current system, but validators will still need meaningful stake and revenue to operate sustainably. Separately, lightweight verification clients could let more people verify the chain on modest hardware, though these verification nodes are fundamentally different from full consensus validators that vote on blocks and earn rewards.</p>
<p>Solana's security model adds another wrinkle. Unlike most proof of stake chains, Solana does not currently enforce slashing on mainnet. Validators do not automatically lose staked SOL for misbehavior like voting for conflicting blocks or staying offline for extended periods, though such mechanisms are being designed and tested. The Solana community has chosen to prioritize avoiding accidental stake loss from honest mistakes, and questions whether slashing would actually deter sophisticated attackers willing to absorb losses as a cost of doing business.</p>
<p>Without automatic penalties, the network relies more on reputation and economic opportunity cost. A validator that attacks the network risks losing future delegation and transaction fee revenue, along with the value of their hardware infrastructure and business relationships. Whether these incentives prove sufficient remains an open question. Most other major chains consider strong slashing fundamental to crypto-economic security. Meanwhile, ongoing work to reduce validator operating costs aims to make running a node more economically viable for smaller operators, which could improve decentralization over time regardless of slashing policy.</p>
<h3>Governance and Upgrade Mechanisms</h3>
<p>Solana's governance model lacks binding on-chain voting, instead operating through off-chain coordination, validator consensus, and Solana Foundation influence. This prioritizes velocity and pragmatism over formalized democratic processes, enabling rapid iteration when core developers and major validators align, though critics argue this concentrates power among fewer actors and reduces decision-making transparency.</p>
<p>Protocol changes follow a <strong>Solana Improvement Document (SIMD)</strong> process resembling Ethereum's EIP system. Anyone can propose a SIMD for community discussion through GitHub, Discord, and forums, with substantial changes requiring broad validator and developer buy-in. The Solana Foundation, alongside major ecosystem stakeholders like Solana Labs, Anza (which maintains the main Agave validator client), Jump Crypto, and Jito Labs, wield significant informal influence through technical expertise, resource control, and stake weight. The existence of multiple validator client implementations, discussed in Section VI, reduces the risk of a bug in one codebase bringing down the entire network.</p>
<p>Validators make ultimate decisions through social consensus by choosing whether to upgrade their client software. New releases use <strong>feature gates</strong>, which are disabled-by-default protocol changes the client understands but doesn't enforce. Once a supermajority of stake-weighted validators has upgraded and there is clear support, core contributors activate the relevant feature gates via an on-chain instruction, scheduling them to become active at a specific slot or epoch. From that point, upgraded clients enforce the new rules as part of consensus. Significant validator splits on upgrades or feature activation could theoretically fork the network, though strong coordination and communication have prevented this.</p>
<p>The Foundation maintains a substantial SOL treasury from initial token allocation, funding ecosystem development, grants, security audits, and infrastructure. This financial influence extends to governance, allowing the Foundation to credibly advocate for changes it can resource. However, the Foundation has progressively decentralized control, aiming to eventually reduce its role as the ecosystem matures.</p>
