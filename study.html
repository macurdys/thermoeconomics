<p>Breaking encryption with regular computers is like finding a needle in a haystack. You have to search through countless possibilities one by one, methodically checking each piece of straw. The haystack is so vast that it would take thousands of years to find the needle, making the task effectively impossible within any reasonable timeframe.</p>
<p>Breaking encryption with quantum computers is like using a magnet to find that needle. Suddenly, what seemed impossible becomes feasible. The quantum computer's ability to explore many possibilities simultaneously, combined with interference effects that amplify correct answers, acts like that magnet pulling the needle straight to you.</p>
<p>This is why cryptographers are developing <strong>quantum-resistant encryption</strong>. Think of it as changing the needle to aluminum. Now the magnet can't attract it anymore. These new encryption methods are designed so that even quantum computers lose their special advantage and must return to searching through the haystack piece by piece, just like their classical counterparts.</p>
<p>However, quantum computers don't make everything faster. They only provide major advantages for certain specific types of problems, like breaking certain codes and speeding up certain search operations.</p>
<h3>What's Vulnerable and What's Not</h3>
<p>Today's encryption relies on mathematical problems that are easy to verify but practically impossible to solve backwards. For example, it's easy to multiply two huge numbers together, but extremely difficult to take that final number and figure out what the original two numbers were. This asymmetry is the foundation of most internet security today, with problems that would take regular computers billions of years to crack.</p>
<p>The quantum threat isn't uniformly devastating across all cryptographic systems. Public key encryption systems like RSA and ECC are most at risk. A quantum algorithm called <strong>Shor's algorithm</strong> can break them by exploiting the mathematical structure these systems rely on. These mathematical patterns have elegant properties that quantum algorithms can exploit.</p>
<p>Symmetric encryption like AES-256 remains secure with only minor key size adjustments. Hash functions remain viable too, though using longer outputs preserves security against quantum attacks. The key insight is that quantum-resistant approaches use mathematical problems that lack the elegant structure quantum computers can exploit. These alternative problems remain hard even for quantum computers, which is why cryptographers have spent years developing new standards based on them.</p>
<h3>What's At Stake</h3>
<p>Today's digital world runs on encrypted communication in ways most people never think about. Every time someone checks their bank balance, sends a private message, makes an online purchase, or logs into their email, encryption protects that information.</p>
<p>Beyond personal data, encryption secures power grids, air traffic control systems, military communications, and the backbone of the internet itself. It enables secure voting systems, protects journalists' sources, and allows people to communicate safely under oppressive governments.</p>
<p>The "https" padlock in browsers, the security updates on phones, and even the chip in credit cards all depend on encryption that these machines could theoretically break.</p>
<h3>The Timeline Problem</h3>
<p>One of the trickiest aspects is that we don't know exactly when quantum computers will become powerful enough to break current encryption. In October 2025, Google announced a significant milestone with their algorithm called "quantum echoes." The system successfully computed molecular structures in ways that classical supercomputers cannot, demonstrating what experts call "quantum advantage."</p>
<p>However, current systems can't threaten encryption. Google's breakthrough computed a narrow scientific problem, but breaking modern cryptography would require machines with hundreds of thousands to millions of stable qubits. Today's systems struggle to maintain even smaller numbers in the extremely controlled conditions they need.</p>
<p>The timeline remains uncertain. Google estimates real-world applications remain about five years away, while quantum computers capable of breaking encryption will take considerably longer.</p>
<p>To put this in perspective, a quantum computer capable of cracking modern encryption would need specific capabilities. Early estimates suggested it would take about 20 million quantum bits (called "qubits") and 8 hours to crack RSA-2048 encryption. Recent work by Gidney brings this estimate down to fewer than 1 million qubits and less than a week. These estimates assume nearly perfect quantum computers with almost no errors, something today's quantum computers are nowhere near achieving.</p>
<p>Realistically, most experts seem to agree that we're looking at the early 2030s at the absolute earliest. More likely, it'll be sometime between the mid-2030s and 2040s. It could even take longer if engineers hit unexpected roadblocks or faster if breakthroughs happen quicker because of unforeseen AI progress.</p>
<p>However, not everyone shares this conservative outlook. In November 2025, Ethereum founder Vitalik Buterin predicted that quantum computers capable of breaking Ethereum's underlying security model could arrive before the next US presidential election in 2028\\.</p>
<p>There's also a "steal now, decrypt later" risk where bad actors could be collecting encrypted data today, planning to crack it once powerful quantum computers become available. This makes protecting long-term secrets especially important.</p>
<p>It's like knowing a big storm is coming but not sure if it's next week or next decade. The smart approach is to start preparing now rather than wait and see.</p>
<h3>The Cryptographic Solution</h3>
<p>Cryptographers have been preparing for this "quantum transition" for over a decade. In 2024, the U.S. government approved the first set of new encryption standards designed to resist quantum computers. Think of it like upgrading from mechanical locks to smart locks throughout an entire city. It's a big project, but manageable with proper planning.</p>
<p>This effort is part of a global, coordinated response led by organizations like the U.S. National Institute of Standards and Technology (NIST). For nearly 10 years, NIST has been running a public competition to vet and select a portfolio of quantum-resistant cryptographic algorithms. The first set of these standards was finalized in 2024, providing a trusted foundation for the industry's transition.</p>
<p>These new standards include algorithms from different mathematical families. In August 2024, NIST finalized three initial standards based on two distinct approaches: <strong>lattice-based cryptography</strong>, which prioritizes efficiency, and <strong>hash-based signatures</strong>, which prioritize high security confidence through simpler mathematical assumptions. NIST continues evaluating additional approaches as well. Each offers different trade-offs between signature size, speed, and security assumptions. This diversity provides insurance: if one mathematical approach proves vulnerable, the ecosystem can shift to alternatives.</p>
<h3>Implementation Timeline</h3>
<p>Major tech companies, governments, and security organizations are already testing and implementing these quantum-resistant systems. Rather than a catastrophic overnight change, we're looking at a gradual, managed transition over the coming decades.</p>
<p>Critical systems like banking infrastructure, government communications, and power grids will upgrade first, followed by consumer applications. Many organizations are building flexibility into their systems now: the ability to quickly swap out encryption methods like changing the batteries in a device. The goal is that most of these security upgrades can be delivered through regular software updates, though some will require hardware changes too.</p>
<p>However, blockchains face unique implementation challenges that centralized systems don't encounter. Traditional organizations can mandate upgrades across their infrastructure, pushing updates through internal IT departments. Blockchain networks, by contrast, must coordinate changes across thousands of independent node operators, wallet providers, and users, all without central authority to enforce compliance. This coordination challenge becomes even more complex when considering dormant wallets, potentially lost private keys, and the philosophical tensions around whether networks should force upgrades or risk leaving vulnerable assets exposed.</p>
<p>While quantum computers pose a real future threat to current encryption, the cybersecurity community is actively preparing solutions. The transition will be gradual and planned for traditional systems, not a sudden crisis, though blockchain networks face unique coordination challenges in implementing these new standards across decentralized systems.</p>`
},
{
slug: "alt-ch14-s2", section: "alt-ch14", title: "Section II: Blockchain Vulnerability Assessment",
body: `<p>The coordination challenges described above are compounded by a feature unique to blockchains: permanent public records. Every signature ever published on-chain becomes a potential attack surface once quantum computers mature. Traditional financial systems can rotate their encryption keys behind closed doors, but blockchain addresses with exposed public keys remain vulnerable forever unless protocol-level changes intervene. This section examines which blockchain assets face the greatest quantum risk, why some addresses are more vulnerable than others, and what users can do to protect themselves while developers work on network-wide solutions.</p>
<h3>Technical Foundation</h3>
<p>Most blockchain networks secure transactions using digital signatures (the cryptographic foundation explained in Chapter I for Bitcoin and Chapter V for custody practices) that rely on mathematical problems classical computers cannot solve efficiently. The quantum threat to these systems comes in two forms, and it helps to think of them through analogy.</p>
<p>Shor's algorithm is like a master locksmith who can reverse-engineer any lock's blueprint from its face (the public key) and cut a matching key directly. This is catastrophic for the signature schemes that Bitcoin, Ethereum, and Solana use today. Once quantum computers are powerful enough to run Shor's algorithm at scale, they can derive private keys from public keys, breaking the fundamental security assumption of blockchain wallets.</p>
<p><strong>Grover's algorithm</strong> resembles a superhuman librarian who must still search through library stacks, but can do so far more efficiently, effectively halving the security strength of hash functions. This is less devastating because the defense is straightforward: use longer hashes. One algorithm breaks mathematical structure entirely; the other just accelerates brute-force search.</p>
<h3>Public Key Exposure Models</h3>
<p>Think of it like this: a Bitcoin address is like a safe whose combination (the public key) isn't revealed until someone opens it. Once the safe is opened, anyone listening can record the combination. Today's eavesdroppers can't use that combination to break into safes, but when quantum "lockpicks" arrive, they can replay those recorded combinations to steal whatever remains inside.</p>
<p>This analogy captures a fundamental principle: quantum computers can break public keys, but they cannot easily break the cryptographic hashes of those keys. This distinction determines which funds are at risk.</p>
<h3>Why Legacy Bitcoin Addresses Are More Vulnerable</h3>
<p>Legacy Bitcoin addresses face significantly higher quantum risk for two concrete reasons. First is direct public key exposure through P2PK outputs. Early Bitcoin (2009-2012) frequently used P2PK (Pay-to-Public-Key) outputs that publish the public key directly on the blockchain with no cryptographic protection.</p>
<p>The transaction literally says "here's the public key, anyone who can prove they control it can spend this." Over 1.5 million BTC (roughly 8.7% of Bitcoin's total supply, yet only 0.025% of UTXOs) remain locked in these completely exposed P2PK outputs, including Satoshi's early mining rewards. This is like having a safe with the combination written on the outside. Quantum computers won't need to break any locks; they can simply read the combination and walk in.</p>
<p>The second vulnerability comes from address reuse patterns. Early Bitcoin users commonly reused the same address for multiple transactions, a practice that was later discouraged. Each time someone spends from an address, they expose its public key on the blockchain. With address reuse, the first spend reveals the public key, and any remaining balance tied to that key becomes fair game for a future quantum attacker. Many legacy users accumulated large balances on a single address over time, then only spent portions, leaving substantial "change" outputs sitting behind already-exposed public keys. In the public-key-exposure model, those change outputs are effectively pre-targeted for quantum harvest.</p>
<h3>Current Standards</h3>
<p>Newer Bitcoin addresses use formats like P2PKH (Pay-to-Public-Key-Hash) and native SegWit (both covered in Chapter I) that only store a hash of the public key on the blockchain. The actual public key stays hidden until you spend your Bitcoin. When combined with the modern practice of using each address only once, this provides much stronger protection against quantum computers.</p>
<p>Unspent funds in these modern address formats are much more quantum-resilient because the public keys remain hidden. A quantum attacker would first need to crack the hash layer itself, which is much harder than attacking exposed public keys directly.</p>
<p>Using each address only once also reduces long-term risk. The public key is only revealed when you spend the funds. As long as the transaction confirms before attackers can derive your private key (which takes time even with quantum computers), you're effectively safe in practice. And since you've spent all the funds, there's no remaining balance left on that now-exposed key for future attacks.</p>
<p>However, Taproot addresses (introduced in Chapter I) present a different exposure pattern. When using the default key-path spend, Taproot embeds a public key directly in the output, placing it in the exposed-key category similar to the vulnerable legacy formats. While Taproot currently holds a relatively small share of Bitcoin's total supply, users should be aware that these addresses don't provide the same quantum protection as hash-based alternatives.</p>
<p>Ethereum's account model (Chapter II) creates different exposure patterns. Every transaction from an EOA exposes a recoverable public key, but accounts that have never sent transactions remain protected. However, once an Ethereum address sends its first transaction, the public key is permanently exposed for any future deposits to that same address.</p>
<p>While managing individual addresses has obvious challenges, smart contract wallets mainly provide architectural flexibility rather than an immediate solution to quantum threats. The authentication logic in these wallets lives in upgradeable code instead of being permanently tied to a single signature key, so in principle they could switch to quantum-resistant signature schemes without changing the wallet address. However, this only becomes practical once Ethereum adds efficient built-in support for verifying these new signature types. Today, verifying post-quantum signatures directly on the EVM is technically possible but far too expensive in gas, so this upgrade path remains mostly theoretical rather than something users can deploy at scale. In practice, whether any given smart contract wallet benefits from this flexibility depends entirely on its specific implementation and available upgrade mechanisms.</p>
<p>Multi-signature wallets (covered in Chapter V) present complex migration challenges, typically requiring all signers to coordinate simultaneous upgrades to post-quantum schemes. Social recovery mechanisms might provide alternative migration paths, though these require careful design to maintain security assumptions.</p>
<h3>Dormant and Potentially Lost Wallets</h3>
<p>Dormant addresses with exposed public keys represent significant systemic risk to the broader ecosystem. These include early adopter addresses where the owners may have lost their private keys but already exposed their public keys through past spending activity. They also include abandoned mining addresses from Bitcoin's early era, particularly those used for early block rewards that were subsequently spent, exposing their public keys to future quantum harvest.</p>
<p>The fundamental challenge lies in distinguishing between genuinely lost funds and dormant but recoverable wallets. Quantum attackers could potentially recover funds from addresses presumed permanently lost: imagine the market chaos if millions of "lost" Bitcoin suddenly became recoverable, creating unexpected supply shocks and complex ownership disputes that could destabilize the entire ecosystem.</p>
<p>This creates a high-stakes scenario often described as a "<strong>quantum rush</strong>." Should a powerful quantum computer emerge suddenly, it would trigger a frantic race. Malicious actors would rush to crack susceptible addresses and steal exposed funds, while network developers and the community would race to deploy emergency forks to freeze or migrate those same assets. The outcome of such an event would depend heavily on who acts first, introducing a stark game-theoretic dynamic into the security model.</p>
<p>At current valuations, those at-risk BTC represent over $100 billion in exposed value, effectively creating a massive bounty for whoever achieves quantum supremacy first. This transforms quantum computing development from purely scientific pursuit into strategic competition. Nation-states and well-funded private entities now have a concrete financial incentive, beyond military or intelligence applications, to accelerate their quantum programs: whoever breaks the threshold first gains the ability to seize billions in abandoned or lost Bitcoin before the network can coordinate defensive forks. The race extends beyond who builds the computer to who can extract maximum value before the window closes.</p>
<h3>Best Practices</h3>
<p>To protect against future quantum computing threats, users should adopt careful key management practices. For Ethereum, avoid keeping large amounts of funds in an address after its first transaction, since any on-chain signature reveals the public key to potential quantum attacks. Instead, migrate to a fresh, unused address or preferably a smart contract wallet that can be upgraded to post-quantum cryptographic schemes.</p>
<p>Bitcoin users should similarly avoid address reuse by spending entire UTXOs to fresh addresses, ensuring no value remains tied to previously exposed public keys. While multisig and multi-party computation solutions offer enhanced security today, they don't eliminate quantum risk if the underlying signature scheme remains vulnerable. Their primary value lies in providing an upgrade path to post-quantum algorithms when they become available.</p>
<h3>The Protocol-Level Challenge</h3>
<p>While individual users can adopt protective practices, the exposure patterns detailed above reveal a fundamental limitation: personal key management cannot protect the ecosystem as a whole. The massive amount of Bitcoin sitting in exposed legacy outputs, the countless reused addresses from Bitcoin's early days, and Ethereum's account model exposure all require coordinated protocol-level responses.</p>
<p>No amount of individual vigilance can secure funds whose public keys are already permanently visible on-chain, nor can it prevent the systemic chaos of a potential quantum rush. This reality has driven blockchain developers to move beyond user education toward concrete technical proposals for network-wide quantum resistance. The question is no longer whether blockchains need protocol changes, but rather how to implement them without breaking existing functionality or creating unacceptable economic disruption.</p>`
},
{
slug: "alt-ch14-s3", section: "alt-ch14", title: "Section III: Quantum-Resistance Transition",
body: `<p>Having established the threat landscape and vulnerability patterns, we now turn to how major blockchain networks are responding. Each network faces unique architectural constraints and governance challenges that shape their migration strategies. Bitcoin must balance immutability with security upgrades, while Ethereum leverages its more flexible upgrade culture. The technical solutions exist, but implementing them requires navigating complex social coordination problems that test the limits of decentralized governance.</p>
<h3>Bitcoin's Approach</h3>
<p>The Bitcoin developer community is actively working on concrete plans to protect the network against future quantum threats, with several serious proposals now under review. The vulnerable legacy outputs discussed in Section II, including coins from Bitcoin's earliest days, represent a disproportionately large amount of value concentrated in a small number of exposed transactions.</p>
<p>The technical solutions under consideration are sophisticated, building on Bitcoin's existing upgrade mechanisms. One prominent proposal, <strong>BIP-360</strong>, would introduce a new address type designed specifically for quantum resistance. The approach builds on Taproot's architecture but disables the features that expose public keys, replacing them with quantum-safe alternatives. This represents a gradual approach that could be adopted without breaking existing functionality.</p>
<p>However, the core challenge isn't technical but social and economic: should Bitcoin force users to migrate, or make it optional? Proposed solutions span a wide spectrum. Jameson Lopp's QBIP proposal outlines a multi-year deprecation plan with phased changes, including a widely publicized "flag day" about five years after activation for invalidating vulnerable spends. Agustín Cruz's more aggressive "QRAMP" protocol proposes hard deadlines for the upgrade, though this faces pushback over potentially making dormant funds unspendable. Other proposals explore commitment schemes allowing current holders to prove ownership and move assets safely, or deadline-based systems with grace periods.</p>
<p>The debate intensifies when considering what should happen to dormant holdings that can't or won't be moved before quantum computers arrive. Some propose permanently burning the at-risk assets to prevent quantum seizure. Others suggest doing nothing and allowing quantum-equipped actors to claim abandoned coins, treating it as a kind of digital salvage. A third approach would allow vulnerable coins to be claimed but impose transaction limits that slow the drainage process, creating competition among would-be claimants and driving fees to miners rather than letting the value be easily extracted.</p>
<p>Each option faces significant philosophical resistance within the Bitcoin community. The ethos strongly opposes burning holdings that are rightfully owned, even if the owner is presumed dead or absent. The principle of immutable property rights runs deep in Bitcoin culture; many view Satoshi-era holdings as legitimately belonging to their original owners, and any protocol change that makes them unspendable, whether through burning or redistribution, violates the fundamental promise that "your keys, your coins" means permanent ownership. This creates a painful tension: protecting the network from quantum attack may require violating the very property rights that make Bitcoin valuable in the first place.</p>
<p>Ultimately, for truly lost or abandoned assets where private keys are genuinely gone, developers face this difficult choice: either these funds will be stolen by whoever possesses quantum computing capabilities first, or they will become unspendable through protective consensus changes. While Satoshi himself discussed in 2010 the need to adopt a new cryptographically sound system in response to a cryptographic break, this solution only works for those who still control their private keys. No consensus has emerged on timelines or enforcement, but Bitcoin Optech continues tracking these debates as they evolve from early concepts toward potential consensus rules.</p>
<h3>Ethereum's Approach</h3>
<p>Unlike Bitcoin's philosophical tensions around property rights and coin burning, Ethereum faces primarily technical engineering trade-offs. The community's more flexible upgrade culture allows for iterative solutions, though the practical obstacles remain substantial. The signature schemes currently used by both user accounts and validators would be susceptible to the attacks discussed earlier.</p>
<p>The upgrade strategy centers on a multi-pronged, staged approach rather than a single protocol-wide switch. For user transactions, EIP-7932 proposes supporting multiple signature algorithms to enable post-quantum schemes while maintaining backward compatibility with existing accounts. Account Abstraction is serving as a key on-ramp, allowing smart wallets to implement these quantum-safe signatures without requiring immediate protocol changes. The Ethereum Foundation is actively funding research into post-quantum multi-signature schemes to address the larger signature sizes that come with quantum-resistant algorithms.</p>
<p>However, these new algorithms come with significant practical trade-offs. The most immediate challenge is the dramatic increase in data size. A current Ethereum signature is just 65 bytes. Quantum-resistant alternatives range from around 2,400 bytes to over 29,000 bytes depending on the algorithm and security level chosen. That represents a 37x to 450x increase in signature size.</p>
<p>These size increases directly impact blockchain operation in multiple ways. Transactions become larger, leading to increased storage requirements and blockchain bloat. Higher transaction fees follow naturally from the increased data that must be processed and stored. Slower verification times can also affect block processing and network throughput, presenting a major engineering hurdle for protocol developers who must balance security against usability.</p>
<p>Beyond user accounts, researchers are exploring alternatives for Ethereum's broader architectural foundations. The cryptographic techniques used for data availability, like KZG commitments discussed in Chapter II, also need quantum-resistant replacements. Hash-based and STARK-style constructions are promising candidates because they only face Grover's more manageable speedup rather than Shor's devastating advantage. The Ethereum Foundation is funding this research, and there are proposals for an emergency recovery fork that could quickly freeze exposed accounts if quantum breakthroughs happen suddenly.</p>
<h3>Solana’s Approach</h3>
<p>Solana faces a more immediate exposure concern: most Solana account addresses directly reveal the public key from the moment they are created, unlike Bitcoin or Ethereum where the public key can remain hidden until a transaction is made. This means every Solana address is already visible to potential future quantum attackers. In December 2025, the Solana Foundation collaborated with Project Eleven on a threat assessment and a testnet prototype using post-quantum digital signatures, treating this as a forward-looking migration exercise rather than an emergency response.</p>
<p>The prototype work focuses on stress-testing how quantum-resistant signatures would affect throughput, compute costs, and fees if adopted broadly. Meanwhile, Solana's ecosystem has experimented with opt-in wallet-level protections using hash-based one-time signatures for users who want extra security now. This approach is useful as a stopgap, but not a full network-wide migration plan.</p>`
},
{
slug: "alt-ch15-s1", section: "alt-ch15", title: "Section I: The Core Mechanism",
body: `<p>Picture an election night: commentators debate on tv, polls show conflicting results, and everyone waits for official vote counts. Meanwhile, in a parallel universe, thousands of people are putting real money behind their beliefs about the outcome, creating a live, publicly observable feed that continuously updates the probability of said outcome, which often proves more accurate than any expert analysis.</p>
<p>This is the core insight behind <strong>prediction markets</strong>: when people risk their own money on future events, they reveal information that polls and punditry cannot capture. Unlike traditional betting sites that simply offer odds set by bookmakers, prediction markets create a mechanism where the collective wisdom of participants determines prices through supply and demand.</p>
<p>The fundamental mechanism works through <strong>binary outcome tokens</strong>: for a presidential election, a trader might buy "Candidate A wins" tokens at 45 cents each. If Candidate A wins, each token pays out $1. If they lose, the tokens become worthless. The current price (45 cents) represents the market's collective assessment that Candidate A has a 45% chance of winning.</p>
<p>This creates a powerful information aggregation system. People with inside knowledge, superior analysis, or different perspectives can profit by trading against the consensus, which moves prices toward more accurate probabilities. The result is often remarkably precise forecasting that outperforms traditional polling and expert predictions.</p>
<p>The empirical evidence is compelling. Academic research consistently finds prediction markets outperform polls in a majority of elections. This superior accuracy stems from fundamental structural advantages. Traditional polling faces declining response rates (now under 5% for many surveys), difficulty reaching certain demographics, and social desirability bias where respondents may not truthfully report unpopular preferences. Prediction markets circumvent these issues by requiring participants to put money at stake, creating stronger incentives for accuracy than answering survey questions. Rather than relying on representative sampling, markets aggregate the beliefs of people willing to back their convictions with capital.</p>
<p>This raises a fundamental design question: should these markets be run by centralized companies or decentralized protocols?</p>`
},
{
slug: "alt-ch15-s2", section: "alt-ch15", title: "Section II: The Case for Decentralization",
body: `<p>Decentralized prediction markets remove central authorities from the equation entirely. Rather than relying on bookmakers to set odds and manage payouts, these platforms use smart contracts to automatically match traders, execute transactions, and resolve outcomes through predetermined oracle mechanisms (oracle infrastructure is covered in Chapter VII). This fundamental shift creates distinct advantages over traditional betting platforms.</p>
<p>The most immediate benefit is transparency. Every transaction, position, and resolution mechanism exists on-chain for anyone to verify. Traditional betting sites operate as black boxes where users must simply trust the house's odds, calculations, and fairness. Decentralized markets make these elements mathematically verifiable, eliminating the need for trust.</p>
<p>Equally important is <strong>censorship resistance</strong>. When a prediction market is fully decentralized, no single authority can shut down markets or restrict trading on sensitive topics. This becomes crucial for politically charged predictions where traditional platforms might face pressure to delist certain markets. The protocol continues operating regardless of external pressures.</p>
<p>Permissionless access fundamentally changes market dynamics. Anyone with a crypto wallet can trade immediately without identity documents, verification delays, or geographic restrictions. Traditional platforms must verify identities and restrict users by jurisdiction, creating significant friction. Decentralized prediction markets sidestep these barriers entirely, tapping into global liquidity from anyone holding stablecoins or any other crypto asset the platform accepts. The difference in accessible user base can be orders of magnitude larger, though as discussed below, this advantage exists in tension with regulatory realities.</p>
<p>Beyond scale, the absence of identity requirements enables uninhibited information flow. Industry insiders, political operatives, and individuals with material knowledge can trade without creating identity trails that might trigger professional or legal consequences. Consider a campaign staffer who knows internal polling data, or a corporate executive aware of upcoming announcements. On traditional platforms, they must weigh their information's value against the risk of exposure. On decentralized platforms, they can trade pseudonymously, immediately incorporating valuable information into market prices.</p>
<p>From a pure market efficiency perspective, this accelerates price discovery. The participants with the most valuable information are precisely those filtered out by KYC (know-your-customer identity checks) requirements. When these informed traders can contribute their knowledge without reservation, markets converge on true probabilities faster.</p>
<p>Yet these same advantages create profound regulatory tensions. What prediction market advocates describe as "superior information aggregation" overlaps significantly with what securities regulators call "insider trading." This activity, when involving securities in traditional markets, is illegal precisely because it advantages those with privileged access over ordinary participants. The ethical and legal contradictions here are not easily dismissed.</p>
<p>Decentralized platforms have historically operated by basing themselves in jurisdictions with looser rules while blocking users from certain countries at the website level. This approach enables the permissionless access and information aggregation discussed above, but it comes with substantial risk. The 2022 action by the CFTC, the main U.S. derivatives regulator, against Polymarket demonstrated that operating without a license still carries real enforcement consequences. While decentralized architecture complicates regulatory action, platforms remain vulnerable to scrutiny, fines, and operational restrictions.</p>`
},
{
slug: "alt-ch15-s3", section: "alt-ch15", title: "Section III: The Early Failures",
body: `<p>To understand why pragmatism on user experience, liquidity, and resolution mechanisms became decisive, consider the first wave of decentralized platforms. The advantages of decentralized prediction markets (transparency, censorship resistance, and global liquidity) motivated significant investment and development in the mid-2010s, with Gnosis and Augur emerging as the most prominent attempts to build this infrastructure. Both projects raised substantial funding and generated considerable excitement, yet neither achieved meaningful adoption. Understanding their failures reveals the challenges that later platforms would need to overcome.</p>
<h3>Gnosis</h3>
<p>Gnosis, launched in 2017 after raising $12.5 million in one of the fastest public sales in history (12 minutes), suffered from a classic case of premature optimization. The platform was technically sophisticated, featuring complex market-making algorithms and a dual-token system, but this complexity created barriers for ordinary users. The interface was confusing, the market creation process was cumbersome, and the economic model was difficult to understand.</p>
<p>More fundamentally, Gnosis focused on building infrastructure rather than creating compelling markets. The platform could theoretically support any type of prediction market, but it launched with few interesting markets and little marketing to attract users. Without adequate <strong>liquidity</strong> (the depth of orders that enables traders to get good prices with tight spreads), even technically superior infrastructure becomes worthless.</p>
<h3>Augur</h3>
<p>Augur took a different approach, launching in 2018 after years of development and positioning itself as a fully decentralized oracle and prediction market platform. Augur’s key innovation was its decentralized resolution mechanism: instead of relying on a single trusted oracle, market outcomes were decided by holders of its native REP (“reputation”) token. These token holders could stake their REP to report what actually happened in the real world. If they reported the outcome that the wider community ultimately agreed on, they earned fees; if they lied or tried to manipulate results, they risked losing part of their stake. In theory, this financial carrot-and-stick was supposed to make telling the truth the most profitable strategy.</p>
<p>However, Augur's decentralized purity became its weakness. The resolution process was slow and complex, often taking weeks to finalize results. The platform attracted controversial markets (including assassination markets) that created regulatory concerns and public relations problems. Gas fees on Ethereum made small bets economically unviable, while the user experience remained clunky and intimidating for mainstream users.</p>
<p>Both platforms suffered from the chicken-and-egg problem that plagues many two-sided markets: traders need liquidity to get good prices, but liquidity providers need traders to make money. Without either, markets remained thin and unattractive. The platforms also launched during crypto bear markets when speculation was limited and mainstream attention was minimal.</p>
<p>Most critically, both Gnosis and Augur prioritized decentralization over user experience and market quality. While philosophically appealing, this approach created friction that prevented the network effects necessary for prediction market success. Users don't care about decentralization if the platform is difficult to use and the markets are illiquid.</p>
<p>The timing was also problematic. Ethereum's high gas fees and slow transaction times made frequent trading expensive and frustrating. The broader crypto ecosystem lacked the infrastructure that would later make DeFi accessible to mainstream users, including user-friendly wallets, easy ways to convert regular money into crypto, and polished mobile interfaces.</p>`
},
{
slug: "alt-ch15-s4", section: "alt-ch15", title: "Section IV: The Breakthrough",
body: `<p>Understanding why earlier platforms failed reveals what Polymarket did differently. The 2024 election cycle marked a turning point for prediction markets, with Polymarket achieving unprecedented mainstream adoption. Its success came from learning the lessons of earlier failures, though at the cost of many of the decentralization principles that motivated the space initially.</p>
<p>Polymarket processed over $3 billion in trading volume during the 2024 election cycle. Built on Polygon, a faster and cheaper network than Ethereum's base layer, Polymarket made several key design decisions that differentiated it from earlier attempts. Instead of complex tokenomics, it used simple USDC-denominated markets where everything was priced in dollars. Crucially, Polymarket also reduced funding friction by handling the technical complexity of moving money onto the platform behind the scenes, so many users never have to think about blockchain mechanics at all.</p>
<p>Instead of decentralized resolution, it used a system where anyone can propose an outcome, and if no one disputes it within a short window, the outcome is accepted as true. This "optimistic" approach assumes proposals are correct unless challenged (similar to optimistic rollups in Chapter II), enabling faster resolution than earlier platforms that required active voting on every market. Market creation was curated rather than permissionless, which ensured well-defined questions with adequate liquidity but also introduced centralized gatekeeping that could limit controversial or niche markets.</p>
<p>The platform prioritized user experience above all else, with an interface resembling traditional trading platforms more than crypto applications. Heavy investment in liquidity provision ensured tight spreads and deep order books that made trading attractive, though this created dependence on market makers whose incentives don't always align with retail traders.</p>
<p>The platform's regulatory approach proved crucial. By operating offshore without KYC requirements (following a $1.4 million CFTC settlement in 2022), Polymarket enabled permissionless global access while sidestepping complex regulatory battles. This created ongoing uncertainty about long-term viability but allowed focus on product development and captured liquidity that fully compliant platforms couldn't access. It’s worth noting that Polymarket is geo-blocked by IP address in many jurisdictions (including the U.S., UK, France, etc.) but it’s still possible to avoid these restrictions by using VPNs.</p>
<p>Polymarket's breakthrough came through focus on high-visibility events. Rather than trying to be everything to everyone, it concentrated on major political and current events markets, essentially cherry-picking the topics most likely to generate volume. The 2024 presidential election provided the ideal catalyst: a globally significant event with massive public interest, clear binary outcomes, and strong opinions that people were willing to back with money.</p>
<p>Presidential elections combine several factors that make prediction markets particularly compelling: massive public interest, clear binary outcomes, strong partisan opinions, and extended time horizons that allow for meaningful price discovery. Unlike sports betting, which appeals primarily to gambling enthusiasts, election markets attract politically engaged users who view their participation as informed analysis rather than pure speculation. The 2024 cycle also benefited from unique circumstances: unprecedented polarization, questions about polling accuracy, and a media environment hungry for new ways to analyze and predict outcomes.</p>
<h3>Kalshi: The Compliance Alternative</h3>
<p>While Polymarket took the offshore route, Kalshi chose the opposite path. As a CFTC-regulated Designated Contract Market, Kalshi operates within regulatory frameworks across more than 100 countries. The platform requires KYC verification from users worldwide and uses a traditional central limit order book (the same matching engine found in regulated stock exchanges) rather than blockchain settlement.</p>
<p>Unlike platforms with region-specific markets, Kalshi maintains a single unified liquidity pool connecting traders worldwide to the same events. This positions it as the only major prediction market platform operating both globally and within regulatory frameworks, creating what the company calls a next-generation CME for the 21st century.</p>
<p>Kalshi's approach to crypto is equally compliance-focused. While the platform accepts deposits in USDC, Bitcoin, and other cryptocurrencies, these deposits are immediately converted to dollars. In practice, Kalshi never holds cryptocurrency on its books. Everything is denominated and settled in USD through conventional clearing procedures. Traditional funding methods like bank transfers and card payments work alongside crypto deposits, all flowing into the same dollar-based system.</p>
<p>Recently, Kalshi has pushed further into crypto-native distribution. In December 2025 it began rolling out tokenized prediction positions on Solana (Chapter III), making Kalshi-linked event positions tradeable as tokens that can be bought and sold through popular crypto wallets. These tokenized positions can be traded without going through Kalshi's identity verification process, since users are swapping tokens rather than trading directly on the platform. However, the system is not fully permissionless: access is geo-fenced from the U.S., and a centralized settlement authority still determines outcomes and handles payouts.</p>
<p>This competitive landscape recently shifted dramatically. In a $112 million deal, Polymarket acquired QCEX, a CFTC-regulated derivatives exchange. The acquisition gives Polymarket the regulatory infrastructure to operate legally in the United States, setting up a direct showdown with Kalshi. Polymarket plans to run both platforms simultaneously: its existing offshore, permissionless platform for global users who don't want KYC requirements, and the new QCEX-based platform with full compliance for the U.S. market.</p>
<p>That strategy is already taking shape. On its U.S. page, Polymarket says the app is now being rolled out to those on the waitlist with invites going out on a rolling basis, and the initial offering focused on sports event contracts. This effectively sets up a two-track approach: a regulated U.S. product alongside the offshore crypto-native platform that drove its breakout. The dual-platform strategy lets Polymarket maintain its permissionless edge internationally while competing head-to-head with Kalshi for American traders and KYC-compliant global users.</p>`
},
{
slug: "alt-ch15-s5", section: "alt-ch15", title: "Section V: The Technical Architecture Behind the Success",
body: `<p>Polymarket's breakthrough came from a pragmatic compromise: use blockchain where it matters most, but don't let decentralization ideology get in the way of a good product.</p>
<h3>Selective Decentralization</h3>
<p>The platform operates through selective decentralization. By building on Polygon (an Ethereum Layer 2, as discussed in Chapter II) rather than Ethereum's base layer, Polymarket avoided the high gas fees that made Augur's small bets economically unviable. Smart contracts handle the critical functions (custody of funds and settlement of bets) while centralized systems handle everything else for speed and efficiency.</p>
<p>Users maintain complete control of their money through smart contract wallets (a concept introduced in Chapter II and Chapter V) that feel like normal email-based accounts. This solved a key UX problem: you get self-custody without needing to manage seed phrases or understand blockchain mechanics. Polymarket cannot access user funds, and winners redeem directly through smart contracts when markets resolve.</p>
<p>The full collateralization model is simple: one USDC mints one YES token and one NO token. This guarantees there's always exactly enough money to pay winners, eliminating the counterparty risk inherent in traditional betting sites where you trust the house has funds.</p>
<p>But order matching, market creation, and most trading infrastructure runs on traditional centralized servers. This hybrid approach solved Augur and Gnosis's fatal flaw: trying to decentralize everything made those platforms slow, expensive, and unusable.</p>
<h3>Optimistic Resolution</h3>
<p>For market resolution, Polymarket uses an <strong>optimistic oracle</strong> system (similar in philosophy to the optimistic rollups described in Chapter II) where anyone can propose an outcome with a bond (typically $750). If no one disputes within two hours, the outcome is accepted. Disputes trigger token holder voting. This balances speed with accuracy. It's much faster than Augur's lengthy voting process, while maintaining economic incentives for honest reporting.</p>
<p>By handling blockchain complexity behind the scenes, Polymarket made decentralization invisible to users. The tradeoff: you're trusting centralized operators for order matching and market curation, though they can't steal your money.</p>`
},
{
slug: "alt-ch15-s6", section: "alt-ch15", title: "Section VI: The Network Effects of Political Prediction",
body: `<p>Technical infrastructure alone doesn't explain Polymarket's breakthrough. The platform succeeded because it became information infrastructure integrated into how people followed and understood the 2024 election, creating self-reinforcing network effects that transcended its role as a simple trading platform.</p>
<h3>Media Integration</h3>
<p>Media integration became a crucial factor. Major news outlets began citing prediction market odds alongside traditional polling data, treating them as legitimate indicators of electoral sentiment. This created a feedback loop: media coverage drove more users to the platforms, increasing liquidity and accuracy, which justified more media coverage. Polymarket odds were regularly featured on CNN, Fox News, and major newspapers, giving the platform unprecedented mainstream visibility.</p>
<p>This created what researchers call "<strong>information cascades</strong>": as prediction markets became more accurate and widely followed, they attracted more sophisticated traders, which improved accuracy further. Professional political analysts, campaign operatives, and institutional investors began participating, bringing additional information and capital that enhanced market quality.</p>
<p>The real-time information processing capabilities of prediction markets proved particularly valuable during a volatile election cycle. While polls are snapshots taken at specific moments, prediction markets continuously incorporate new information. Major events produced immediate market reactions: During the 2024 US election cycle, Donald Trump's Manhattan conviction moved odds from 54% to 47% within hours, then recovered to 52% as traders assessed the actual electoral impact. When Joe Biden withdrew from the race, Kamala Harris's odds subsequently surged from 15% to 38% in under 24 hours, faster than any polling could capture.</p>
<p>Social media amplification proved crucial to these platforms' success. The prediction market odds themselves became highly shareable content, with users posting screenshots of their positions and market movements across social platforms. This created viral, user-driven marketing, though the line between "authentic social proof" and gambling promotion was often blurred. Polymarket's social media presence generated significant attention, including mentions by Donald Trump in interviews, though whether political candidates citing betting odds on themselves represents validation or circular self-promotion remains debatable.</p>
<p>Institutional adoption began emerging as hedge funds and political organizations started using prediction markets for both information and hedging purposes. Campaign strategists could monitor market reactions to their messaging in real-time, while investors could hedge political risk in their portfolios. This institutional participation added significant liquidity and legitimacy to the markets.</p>
<h3>The 2024 Results</h3>
<p>The results vindicated the prediction market consensus. National polls showed the race within 1-2 percentage points throughout October, suggesting a coin-flip election. Pennsylvania, Michigan, and Wisconsin polls all showed Harris with slight leads or ties within days of the election. Yet when it was all said and done, Trump won Pennsylvania by 2.2%, Michigan by 1.4%, and Wisconsin by 0.9%, outperforming polls by an average of 2-3 points (similar to the polling errors in 2016 and 2020). Polymarket, meanwhile, showed Trump favored in all three states during the final week, with Pennsylvania odds at 57% Trump to 43% Harris.</p>`
},
{
slug: "alt-ch15-s7", section: "alt-ch15", title: "Section VII: The Future of Information Markets",
body: `<p>The breakthrough success of prediction markets during 2024 has catalyzed broader interest in information markets beyond political events. The same mechanisms that proved effective for election forecasting are now being applied to economic indicators, corporate earnings, regulatory decisions, and even scientific research outcomes.</p>
<p>However, significant challenges remain before prediction markets can become universal truth-seeking mechanisms.</p>
<h3>The Challenge of Manipulation and Market Depth</h3>
<p>Manipulation concerns persist, particularly for markets with smaller participant bases or where interested parties have significant resources. The structure of prediction markets creates perverse incentives. Wealthy individuals or campaigns could potentially move odds in their favor to create favorable media narratives, even if it means losing money on the bets themselves.</p>
<p>The obvious antidote is deeper liquidity. But liquidity is not just "more money." It requires better market structure: tighter spreads, stronger competition among market makers, and faster arbitrage across venues. As markets mature, the manipulation problem becomes less about stopping large traders from taking positions. Instead, it becomes more about ensuring the system remains thick enough that trying to "buy a narrative" becomes prohibitively expensive.</p>
<h3>The Scalability Question</h3>
<p>Scalability questions remain, though Polymarket has demonstrated more staying power than critics initially expected. The platform continues processing over $1 billion in monthly volume a year after the 2024 election. This suggests it successfully diversified beyond presidential politics into international events, economic indicators, and cultural phenomena.</p>
<p>However, liquidity concentration persists. High-profile markets about geopolitical events, major elections, and crypto prices dominate volume, while niche markets struggle to attract sustained participation. Creating profitable liquidity for specialized topics (like local elections, academic predictions, and industry-specific forecasts) remains an unsolved challenge.</p>
<p>This could limit how comprehensively prediction markets can serve as "truth-seeking" mechanisms. The platform has proven prediction markets can sustain interest beyond quadrennial election cycles. But whether they can profitably support the long tail of markets that proponents envision is still an open question.</p>
<h3>Moving the Rails On-Chain Without Losing the UX</h3>
<p>The next phase of prediction markets is less about shiny new features and more about hardening the substrate. From the user's perspective, the product is already "good enough." You tap a few buttons, move dollars in and out, and see prices update in real time. The real question is whether that experience can survive contact with the two forces that eventually arrive for every successful market: scale and pressure.</p>
<p>The critical question is no longer "Can we put this on a blockchain?" but "How hard is it to turn this off?" The most important advances are those that push more of the critical path on-chain (custody, collateral, settlement integrity, and censorship resistance) without forcing the user to think about chains, bridges, or gas.</p>
<p>#### A Native Stablecoin That Earns Yield by Default</p>
<p>Once deposits are native, the next improvement is making collateral more efficient without changing the mental model for users. The clean pattern is this: users deposit any major stablecoin, the system swaps into a protocol-native "market dollar," and balances remain stablecoin-denominated while quietly earning the yield generated by the underlying collateral strategy. Users only swap back out when withdrawing. Done right, the UX stays "I hold dollars," but the economics shift from dead collateral to productive collateral. This can subsidize fees, tighten spreads, or simply make participation more attractive.</p>
<p>#### Off-Chain Speed, On-Chain Verifiability</p>
<p>Centralized order matching is the quiet tradeoff behind most "great UX" markets. It makes things fast, but it creates a single operator chokepoint. The frontier architecture keeps the off-chain orderbook for speed, while making the matching verifiable and permissionless. Orders can be disseminated openly so anyone can run a matcher. Matchers submit batches, and an on-chain verifier accepts only provably correct executions using cryptographic mechanisms that make cheating impossible even if the operator is malicious. This shifts the system from "trust the matching engine" to "verify the matching engine," while preserving the feel of a modern exchange.</p>
<p>#### Plural Interfaces: Third-Party UIs as a Resilience Layer</p>
<p>The final step is accepting a reality about censorship and jurisdiction. Frontends get blocked, apps get delisted, domains get seized. If the protocol is truly neutral infrastructure, it should survive the loss of any single interface. That means explicitly supporting third-party UIs, alternative clients, and static frontends that can be hosted anywhere, while the core protocol only accepts correctly verified batches and valid settlement. In that world, a company can ship the official interface, but the market itself is not dependent on it. Users get continuity, and the protocol becomes harder to extinguish because there is no single GUI you can kill to kill the market.</p>
<p>#### The Likely Equilibrium: A Two-Track Ecosystem</p>
<p>On one side, you get markets that are increasingly permissionless at the protocol level. Custody, collateral, and verification live on-chain while feeling, to most users, like a normal fintech app. The experience gets so good that the average participant never thinks about chains, bridging, or decentralization at all. They just see dollars in and probabilities out. Power users, meanwhile, route around local restrictions by using third-party clients and alternative frontends. They access the same underlying markets through interfaces that are harder to block and easier to replicate.</p>
<p>On the other side, you get jurisdiction-specific venues designed to be boring in the way regulators like. These venues are fully compliant, KYC'd, and integrated with traditional legal and banking infrastructure. These country-level prediction markets (whether a regulated Polymarket US/EU-style product or a Kalshi-style model) will resemble conventional exchanges more than crypto protocols. The tradeoff is straightforward: less permissionless reach and less censorship resistance, in exchange for clarity, distribution, and legal permanence in major markets.</p>
<p>If prediction markets become enduring information infrastructure, it will likely be because both tracks reinforce each other. The permissionless substrate keeps the mechanism global, resilient, and hard to extinguish. Meanwhile, regulated frontends provide a legitimate on-ramp for mainstream users and institutions who need compliance more than composability.</p>
<p>If this trajectory continues, the most important prediction markets will look boring at the surface and extremely hard to kill underneath. Interfaces may come and go, companies may pivot or be regulated away, but the core markets will live on-chain: collateral, contracts, and oracles that are forkable and globally accessible. What began as speculative crypto experiments could end up as a piece of planetary information infrastructure that no single corporation, regulator, or regime can fully control.</p>
<h3>Advanced Market Structures</h3>
<p>As the foundations harden, the design space for what these markets can express becomes much larger. Today's flagship markets are mostly simple binaries: "Candidate X wins," "Rate cut by December," "ETF approved by date Y." They are powerful because they compress complex realities into a single number. But the world is not binary, and neither are the questions that most people actually care about.</p>
<p>More sophisticated structures allow participants to trade on richer hypotheses. Conditional, combinatorial, and path-dependent markets can express much more. Instead of just "Who wins the election?", traders can price joint scenarios like "Trump wins AND Republicans control the Senate," or contingent questions such as "If interest rates are above 4% in 2026, what is the probability of a recession by 2027?" These markets do not just predict isolated events. They map out possible worlds and the dependencies between them.</p>
<p>Once markets become resilient enough to persist and cheap enough to trade frequently, they can start to function as a general-purpose calculus for beliefs. A campaign can see how its odds shift conditional on specific messaging choices. A company can hedge the risk of both regulatory outcomes and macroeconomic conditions simultaneously. Researchers can turn competing models into directly comparable, tradeable objects. The "truth-seeking machine" moves from forecasting single headlines to exploring entire scenario trees.</p>
<p>If the infrastructural evolution succeeds, prediction markets become something closer to a global coordination primitive. Markets that are easy to use, hard to shut down, and expressive enough to capture real-world complexity offer a live, continuously updated map of collective expectations about the future. The story traced in this chapter is ultimately about building that map. From early decentralized failures, through Polymarket's pragmatic breakthrough, to the emerging arms race over infrastructure and regulation, it's a story about creating a system of markets that anyone can tap into, but no one can unilaterally erase.</p>`
}

// ============================================================
// MODE STATE
// ============================================================
let currentMode = 'study'; // 'study', 'alt', or 'toolkit'

function getActiveSections() {
    return currentMode === 'study' ? SECTIONS : currentMode === 'alt' ? ALT_SECTIONS : TOOLKIT_SECTIONS;
}
function getActivePages() {
    return currentMode === 'study' ? PAGES : currentMode === 'alt' ? ALT_PAGES : TOOLKIT_PAGES;
}
function getDefaultSlug() {
    return currentMode === 'study' ? 'welcome' : currentMode === 'alt' ? 'alt-welcome' : 'tk-hash';
}

// ============================================================
// BUILD SIDEBAR
// ============================================================
function buildSidebar() {
    const sb = document.getElementById('sidebar');
    const sections = getActiveSections();
    const pages = getActivePages();
    let html = '';
    sections.forEach(sec => {
        const secPages = pages.filter(p => p.section === sec.id);
        html += `<div class="sb-section" data-section="${sec.id}">
            <div class="sb-header" data-section="${sec.id}">
                <span class="sb-arrow">▶</span> ${sec.label}
            </div>
            <div class="sb-pages">
                ${secPages.map(p => `<div class="sb-link" data-slug="${p.slug}">${p.title}</div>`).join('')}
            </div>
        </div>`;
    });
    sb.innerHTML = html;

    // Section toggle
    sb.querySelectorAll('.sb-header').forEach(h => {
        h.addEventListener('click', () => {
            h.parentElement.classList.toggle('open');
        });
    });

    // Page click
    sb.querySelectorAll('.sb-link').forEach(link => {
        link.addEventListener('click', () => {
            location.hash = link.dataset.slug;
            document.getElementById('sidebar').classList.remove('open');
        });
    });
}

// ============================================================
// RENDER PAGE
// ============================================================
function renderPage(slug) {
    const pages = getActivePages();
    const sections = getActiveSections();
    const page = pages.find(p => p.slug === slug);
    if (!page) { location.hash = getDefaultSlug(); return; }

    const idx = pages.indexOf(page);
    const prev = idx > 0 ? pages[idx - 1] : null;
    const next = idx < pages.length - 1 ? pages[idx + 1] : null;
    const sec = sections.find(s => s.id === page.section);

    let html = `<div class="page-section-tag">${sec ? sec.label : ''}</div>`;
    html += `<h1 class="page-title">${page.title}</h1>`;
    if (page.meta) html += `<div class="page-meta">${page.meta}</div>`;
    html += `<div class="page-body">${page.body}</div>`;

    // Connection box (Study only)
    if (page.connection) {
        html += `<div class="connection-box">
            <div class="connection-box-label">Connection to Thermoeconomics</div>
            <div class="connection-box-text">${page.connection}</div>
        </div>`;
    }

    // Author's notes
    if (page.notes && page.notes.length) {
        page.notes.forEach(n => {
            html += `<div class="notes-box">
                <button class="notes-toggle" onclick="this.parentElement.classList.toggle('open')">
                    📝 Author's Notes <span style="font-weight:300;color:var(--text-muted);margin-left:8px;">${n.date || ''}</span>
                </button>
                <div class="notes-body">${n.text}</div>
            </div>`;
        });
    }

    // Prev / Next
    html += `<div class="page-nav">`;
    if (prev) {
        html += `<div class="page-nav-btn prev" onclick="location.hash='${prev.slug}'">
            <span class="page-nav-dir">← Previous</span>
            <span class="page-nav-title">${prev.title}</span>
        </div>`;
    } else {
        html += `<div class="page-nav-placeholder"></div>`;
    }
    html += `<div class="page-nav-map" onclick="openMap()" title="Map">⊞</div>`;
    if (next) {
        html += `<div class="page-nav-btn next" onclick="location.hash='${next.slug}'">
            <span class="page-nav-dir">Next →</span>
            <span class="page-nav-title">${next.title}</span>
        </div>`;
    } else {
        html += `<div class="page-nav-placeholder"></div>`;
    }
    html += `</div>`;

    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('mainContent').scrollTop = 0;
    window.scrollTo(0, 0);

    // Update sidebar active state
    document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
    const activeLink = document.querySelector(`.sb-link[data-slug="${slug}"]`);
    if (activeLink) {
        activeLink.classList.add('active');
        const secEl = activeLink.closest('.sb-section');
        if (secEl && !secEl.classList.contains('open')) secEl.classList.add('open');
    }

    // Wire up internal links
    document.querySelectorAll('[data-goto]').forEach(a => {
        a.style.cursor = 'pointer';
        a.addEventListener('click', (e) => { e.preventDefault(); location.hash = a.dataset.goto; });
    });

    // Render KaTeX if loaded
    if (typeof renderMathInElement === 'function') {
        renderMathInElement(document.getElementById('mainContent'), {
            delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false }
            ]
        });
    }

    // Initialize toolkit interactive elements
    if (slug.startsWith('tk-') && typeof tkInitPage === 'function') {
        setTimeout(() => tkInitPage(slug), 50);
    }
}

// ============================================================
// MAP
// ============================================================
function openMap() {
    const overlay = document.getElementById('mapOverlay');
    const modal = document.getElementById('mapModal');
    const currentSlug = (location.hash || '#' + getDefaultSlug()).slice(1);
    const sections = getActiveSections();
    const pages = getActivePages();
    const modeLabel = currentMode === 'study' ? 'The Study — Map' : currentMode === 'alt' ? 'How Crypto Works — Map' : 'Interactive Toolkit — Map';
    let html = '<h2>' + modeLabel + '</h2>';
    sections.forEach(sec => {
        const secPages = pages.filter(p => p.section === sec.id);
        html += `<div class="map-section-title">${sec.label}</div><div class="map-grid">`;
        secPages.forEach(p => {
            html += `<div class="map-node ${p.slug === currentSlug ? 'active' : ''}" onclick="location.hash='${p.slug}';document.getElementById('mapOverlay').classList.remove('open');">${p.title}</div>`;
        });
        html += '</div>';
    });
    modal.innerHTML = html;
    overlay.classList.add('open');
}

document.getElementById('mapOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
});

// ============================================================
// SEARCH
// ============================================================
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (q.length < 2) { searchResults.classList.remove('open'); return; }
    const pages = getActivePages();
    const sections = getActiveSections();
    const matches = pages.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.body.toLowerCase().includes(q) ||
        (p.connection && p.connection.toLowerCase().includes(q))
    ).slice(0, 8);
    if (!matches.length) { searchResults.classList.remove('open'); return; }
    const sec = (id) => { const s = sections.find(s => s.id === id); return s ? s.label : ''; };
    searchResults.innerHTML = matches.map(p =>
        `<div class="search-result" onclick="location.hash='${p.slug}';searchInput.value='';searchResults.classList.remove('open');">
            <div class="search-result-title">${p.title}</div>
            <div class="search-result-section">${sec(p.section)}</div>
        </div>`
    ).join('');
    searchResults.classList.add('open');
});

document.addEventListener('click', (e) => {
    if (!searchResults.contains(e.target) && e.target !== searchInput) searchResults.classList.remove('open');
});

// ============================================================
// MODE SWITCHING (Right Sidebar)
// ============================================================
function switchMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;

    // Update right sidebar buttons
    document.querySelectorAll('.rsidebar-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.rsidebar-btn[data-mode="${mode}"]`).classList.add('active');

    // Update topbar label
    document.getElementById('topbarLabel').textContent = mode === 'study' ? 'The Study' : mode === 'alt' ? 'How Crypto Works' : 'Interactive Toolkit';

    // Rebuild left sidebar
    buildSidebar();

    // Navigate to default page of new mode
    location.hash = getDefaultSlug();
}

document.querySelectorAll('.rsidebar-btn[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
        switchMode(btn.dataset.mode);
    });
});

// ============================================================
// ROUTING
// ============================================================
function route() {
    let slug = (location.hash || '#' + getDefaultSlug()).slice(1) || getDefaultSlug();

    // Auto-detect mode from slug
    if (slug.startsWith('tk-') && currentMode !== 'toolkit') {
        currentMode = 'toolkit';
        document.querySelectorAll('.rsidebar-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.rsidebar-btn[data-mode="toolkit"]').classList.add('active');
        document.getElementById('topbarLabel').textContent = 'Interactive Toolkit';
        buildSidebar();
    } else if (slug.startsWith('alt-') && currentMode !== 'alt') {
        currentMode = 'alt';
        document.querySelectorAll('.rsidebar-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.rsidebar-btn[data-mode="alt"]').classList.add('active');
        document.getElementById('topbarLabel').textContent = 'How Crypto Works';
        buildSidebar();
    } else if (!slug.startsWith('alt-') && !slug.startsWith('tk-') && currentMode !== 'study') {
        currentMode = 'study';
        document.querySelectorAll('.rsidebar-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.rsidebar-btn[data-mode="study"]').classList.add('active');
        document.getElementById('topbarLabel').textContent = 'The Study';
        buildSidebar();
    }

    renderPage(slug);
}
window.addEventListener('hashchange', route);

document.getElementById('sidebarOverlay').addEventListener('click', () => {

});

const SHA256=(()=>{

      let a=h0,b=h1,c=h2,d=h3,e2=h4,f=h5,g=h6,h=h7;for(let i=0;i<64;i++){const t1=(h+(r(e2,6)^r(e2,11)^r(e2,25))+((e2&f)^(~e2&g))+K[i]+W[i])|0,t2=((r(a,2)^r(a,13)^r(a,22))+((a&b)^(a&c)^(b&c)))|0;h=g;g=f;f=e2;e2=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;}

      pd.set(mb);pd[mb.length]=0x80;const dv=new DataView(pd.buffer);dv.setUint32(pl-4,bl,false);

// ===== AUTO MINE =====
function tkAutoMine(cid,num){
  let b=0;
  function mineNext(){
    if(b>=num)return;const s=tkChains[cid]||tkTxChains[cid];if(!s)return;
    const isChain=!!tkChains[cid];let n=0;
    !function step(){for(let i=0;i<5000&&n<=TK_MAX_NONCE;i++,n++){
      if(isChain){s[b].nonce=String(n);const nel=document.getElementById(`cn-${cid}-${b}`);if(nel)nel.value=n;const h=SHA256.hash(tkChainText(cid,b));
        if(h.startsWith(TK_ZEROS)){tkChainUpdate(cid,b,num);b++;mineNext();return;}}
      else{s[b].nonce=String(n);const nel=document.getElementById(`txn-${cid}-${b}`);if(nel)nel.value=n;const h=SHA256.hash(tkTxChainText(cid,b));
        if(h.startsWith(TK_ZEROS)){tkTxChainUpdate(cid,b,num);b++;mineNext();return;}}
    }if(n<TK_MAX_NONCE){if(isChain)tkChainUpdate(cid,b,num);else tkTxChainUpdate(cid,b,num);requestAnimationFrame(step);}
    }();
  }
  mineNext();
}

// ===== ECDSA HELPERS =====
function tkBufToHex(buf){return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function tkHexToBuf(hex){const a=new Uint8Array(hex.length/2);for(let i=0;i<hex.length;i+=2)a[i/2]=parseInt(hex.substr(i,2),16);return a.buffer;}
async function tkEcGenKey(){
  const kp=await crypto.subtle.generateKey({name:'ECDSA',namedCurve:'P-256'},true,['sign','verify']);
  const priv=await crypto.subtle.exportKey('pkcs8',kp.privateKey),pub=await crypto.subtle.exportKey('spki',kp.publicKey);
  return{privateKey:kp.privateKey,publicKey:kp.publicKey,privHex:tkBufToHex(priv),pubHex:tkBufToHex(pub)};
}
async function tkEcSign(privateKey,message){
  const enc=new TextEncoder().encode(message);const sig=await crypto.subtle.sign({name:'ECDSA',hash:'SHA-256'},privateKey,enc);return tkBufToHex(sig);
}
async function tkEcVerify(publicKey,message,sigHex){
  const enc=new TextEncoder().encode(message);try{return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-256'},publicKey,tkHexToBuf(sigHex),enc);}catch(e){return false;}
}
